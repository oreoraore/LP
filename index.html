<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --border: #222; --text: #fff; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .page { display: none; opacity: 0; transition: 0.3s; padding: 130px 10px 80px; }
        .page.active { display: block; opacity: 1; }
        
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .btn-s { padding: 8px 12px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: #888; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); }
        .total { position: fixed; top: 72px; right: 15px; font-size: 12px; font-weight: bold; color: var(--accent); z-index: 950; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        @media (min-width: 800px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; } }
        .lp-item { aspect-ratio: 1/1; background: #111; border-radius: 4px; overflow: hidden; position: relative; border: 2px solid transparent; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); }
        .is-dimmed { opacity: 0.4; filter: brightness(1.5); }

        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left, .d-right { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { .d-flex { flex-direction: column; } }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #222; text-align: left; font-size: 12px; }
        
        input, select, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .price-row { display: grid; grid-template-columns: 70px 1fr 1fr; gap: 5px; }
        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1500; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginPage" style="display:none; text-align:center; padding-top:30vh;">
    <h1>VINYL ARCHIVE</h1>
    <input type="password" id="pin" style="width:200px; text-align:center;" placeholder="PASSWORD" onkeyup="if(event.keyCode==13)login()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="backBtn" class="btn-s" style="display:none;" onclick="go('list')">← BACK</button>
            <span style="font-weight:900; letter-spacing:2px; margin-left:10px;">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="vIcon" onclick="toggleV()" style="cursor:pointer; font-size:20px;">▦</span>
            <button onclick="go('add')" style="background:var(--accent); color:#000; border:none; padding:6px 15px; border-radius:20px; font-weight:bold;">ADD</button>
            <span onclick="toggleEdit()" id="eBtn" style="cursor:pointer; color:#888; font-size:13px;">EDIT</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <button id="s-id" class="btn-s active" onclick="setSort('id')">등록순 ↓</button>
        <button id="s-title" class="btn-s" onclick="setSort('title')">앨범명</button>
        <button id="s-artist" class="btn-s" onclick="setSort('artist')">가수명</button>
        <button id="s-price" class="btn-s" onclick="setSort('price')">가격순</button>
        <button onclick="fCountry()" class="btn-s" id="fc">나라: 전체</button>
    </div>
    <div class="total" id="totalCnt">0</div>

    <main>
        <section id="list" class="page active">
            <div id="grid-view" class="grid"></div>
            <div id="table-view" style="display:none;">
                <table><thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th></tr></thead><tbody id="t-body"></tbody></table>
            </div>
        </section>

        <section id="add" class="page">
            <input type="hidden" id="edit-id">
            <label style="display:block; margin-bottom:10px;"><input type="checkbox" id="f-owned" checked> 보유 중</label>
            <input type="file" id="f-img" accept="image/*" multiple onchange="handleImg(this)">
            <input type="text" id="f-title" placeholder="앨범명">
            <input type="text" id="f-artist" placeholder="가수명">
            <select id="f-country"><option value="한국">한국</option><option value="일본">일본</option><option value="기타">기타</option></select>
            <div class="price-row">
                <select id="f-lcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-lprice" placeholder="정가">
                <input type="number" id="f-lex" value="1" placeholder="환율">
            </div>
            <div class="price-row">
                <select id="f-pcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-pprice" placeholder="구매가">
                <input type="number" id="f-pex" value="1" placeholder="환율">
            </div>
            <input type="date" id="f-rd" placeholder="발매일">
            <input type="date" id="f-pd" placeholder="구매일">
            <textarea id="f-memo" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">SAVE</button>
        </section>
    </main>
</div>

<div id="detail">
    <button onclick="closeD()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(255,255,255,0.2); border:none; color:#fff; width:40px; height:40px; border-radius:50%;">←</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img" style="max-width:100%;"></div>
        <div class="d-right">
            <h1 id="d-title"></h1><p id="d-artist" style="color:#888;"></p>
            <div id="d-info" style="line-height:2;"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="editStart()" style="flex:1; padding:10px; background:#222; color:#fff; border:1px solid #444;">EDIT</button>
                <button id="delBtn" style="flex:1; padding:10px; background:none; color:red; border:1px solid red;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<div id="batch-bar"><span id="selCnt">0 SELECTED</span><button onclick="delBatch()">DELETE ALL</button></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwgPWlmQ3Vyuhze4NEbmu6rwAYdFrPFARk3l6LCwansXz3H--z_qQRpCrvWA1IO5W8Y/exec';
    const PASS = '142857';
    let db = [], selected = [], isE = false, view = 'grid', sortK = 'id', isAsc = false, filterC = 'All', tempImg = "";

    window.onload = () => { if(localStorage.getItem('v_auth')==='true') start(); else document.getElementById('loginPage').style.display='block'; };
    function login() { if(document.getElementById('pin').value===PASS){ localStorage.setItem('v_auth','true'); start(); } else alert('Fail'); }

    async function start() { document.getElementById('loginPage').style.display='none'; document.getElementById('app').style.display='block'; await load(); }
    async function load() { try { const r = await fetch(GAS_URL); db = await r.json(); render(); } catch(e){ alert('로드 실패: URL을 확인하세요'); } }

    function go(p) { 
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('backBtn').style.display = (p==='list'?'none':'block');
        document.getElementById('toolbar').style.display = (p==='list'?'flex':'none');
    }

    async function handleImg(input) {
        if(input.files.length > 1) { // 일괄업로드
            for(let f of input.files) {
                const b64 = await compress(f);
                await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'add', id:'V'+Date.now()+Math.random(), title:'새 앨범', image:b64, owned:true, country:'기타', l_curr:'₩', l_ex:1, p_curr:'₩', p_ex:1})});
            }
            location.reload();
        } else { tempImg = await compress(input.files[0]); }
    }

    function compress(file) {
        return new Promise(res => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = 600; cvs.height = 600;
                    const ctx = cvs.getContext('2d');
                    const s = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, 600, 600);
                    res(cvs.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    function render() {
        let f = db.filter(i => filterC === 'All' || i.country === filterC);
        const today = new Date().toISOString().split('T')[0];

        f.sort((a, b) => {
            let vA = a[sortK], vB = b[sortK];
            if(sortK === 'price') { vA = (a.list_price||0)*(a.l_ex||1); vB = (b.list_price||0)*(b.l_ex||1); }
            return isAsc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
        });

        document.getElementById('totalCnt').innerText = `TOTAL: ${f.length}`;
        if(view === 'grid') {
            document.getElementById('table-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'grid';
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const dim = (!i.owned || i.release_date > today) ? 'is-dimmed' : '';
                const sel = selected.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="itemClick('${i.id}')"><img src="${i.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('table-view').style.display = 'block';
            document.getElementById('t-body').innerHTML = f.map((i, idx) => `<tr onclick="itemClick('${i.id}')"><td>${idx+1}</td><td><img src="${i.image}" style="width:30px"></td><td>${i.title}</td><td>${i.artist}</td></tr>`).join('');
        }
    }

    function itemClick(id) {
        if(isE) {
            const s = String(id);
            if(selected.includes(s)) selected = selected.filter(x => x!==s); else selected.push(s);
            document.getElementById('selCnt').innerText = `${selected.length} SELECTED`;
            render();
        } else openD(id);
    }

    function openD(id) {
        const i = db.find(x => String(x.id) === String(id));
        window.activeId = id;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title;
        document.getElementById('d-artist').innerText = i.artist;
        document.getElementById('d-info').innerHTML = `나라: ${i.country}<br>발매일: ${i.release_date}<br>구매일: ${i.purchase_date}<br>정가: ${i.l_curr}${i.list_price} (₩${Math.floor(i.list_price*i.l_ex)})<br>메모: ${i.memo}`;
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => delOne(id);
    }

    async function save() {
        const eid = document.getElementById('edit-id').value;
        const payload = {
            action: eid ? 'edit' : 'add', id: eid || 'V'+Date.now(),
            owned: document.getElementById('f-owned').checked, title: document.getElementById('f-title').value,
            artist: document.getElementById('f-artist').value, country: document.getElementById('f-country').value,
            l_curr: document.getElementById('f-lcurr').value, l_ex: document.getElementById('f-lex').value,
            list_price: document.getElementById('f-lprice').value, p_curr: document.getElementById('f-pcurr').value,
            p_ex: document.getElementById('f-pex').value, purchase_price: document.getElementById('f-pprice').value,
            release_date: document.getElementById('f-rd').value, purchase_date: document.getElementById('f-pd').value,
            memo: document.getElementById('f-memo').value, image: tempImg || (eid ? db.find(x=>x.id==eid).image : "")
        };
        await fetch(GAS_URL, {method:'POST', body:JSON.stringify(payload)});
        location.reload();
    }

    async function delOne(id) { if(confirm('삭제?')) { await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'delete', id:String(id)})}); location.reload(); } }
    async function delBatch() { if(confirm('전체삭제?')) { await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'delete', id:selected})}); location.reload(); } }
    
    function setSort(k) { if(sortK===k) isAsc=!isAsc; else { sortK=k; isAsc=false; } render(); }
    function toggleV() { view = (view==='grid'?'table':'grid'); render(); }
    function toggleEdit() { isE=!isE; selected=[]; document.getElementById('batch-bar').style.display=(isE?'flex':'none'); render(); }
    function closeD() { document.getElementById('detail').style.display='none'; }
    function editStart() { const i = db.find(x=>x.id==window.activeId); closeD(); go('add'); document.getElementById('edit-id').value=i.id; document.getElementById('f-title').value=i.title; }
</script>
</body>
</html>
