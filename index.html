<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00f2ff; --text: #fff; --dim: #888; --border: #222; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* 애니메이션 */
        .page { display: none; opacity: 0; transition: 0.3s; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 네비게이션 & 툴바 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
        .btn-s { padding: 8px 14px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; white-space: nowrap; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); }
        .total-label { position: fixed; top: 72px; right: 15px; font-size: 12px; font-weight: bold; color: var(--accent); z-index: 950; }

        main { padding: 130px 10px 80px; }
        
        /* 그리드: 모바일 3열 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        @media (min-width: 800px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; position: relative; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); }
        .lp-item.selected::after { content: '✓'; position: absolute; inset: 0; background: rgba(0,242,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: bold; }
        .is-dimmed { opacity: 0.4; filter: brightness(1.5); }

        /* 상세 페이지 */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .d-right { flex: 5; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { .d-flex { flex-direction: column; } .d-left { height: 45vh; } .d-right { padding: 20px; } }

        /* 테이블 뷰 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #222; text-align: left; font-size: 12px; }
        .t-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        /* 입력 폼 */
        input, select, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .price-row { display: grid; grid-template-columns: 70px 1fr 1fr; gap: 5px; }
        .check-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; cursor: pointer; }
        .check-wrap input { width: 20px; height: 20px; margin: 0; }

        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 1500; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">처리 중...</div>

<div id="loginPage" style="display:none; text-align:center; padding-top:30vh;">
    <h1 style="letter-spacing:8px;">VINYL ARCHIVE</h1>
    <input type="password" id="pin" style="width:200px; text-align:center;" placeholder="PIN" onkeyup="if(event.keyCode==13)login()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="navBack" class="btn-s" style="display:none;" onclick="go('list')">← BACK</button>
            <span style="font-weight:900; letter-spacing:2px; font-size:18px; margin-left:10px;">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="viewIcon" onclick="toggleView()" style="cursor:pointer; font-size:20px;">▦</span>
            <button onclick="go('add')" style="background:var(--accent); color:#000; border:none; padding:6px 15px; border-radius:20px; font-weight:bold; font-size:12px;">ADD</button>
            <span onclick="toggleEditMode()" id="editBtn" style="cursor:pointer; color:var(--dim); font-size:13px;">EDIT</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <button id="s-id" class="btn-s active" onclick="setSort('id')">등록순 ↓</button>
        <button id="s-title" class="btn-s" onclick="setSort('title')">앨범명</button>
        <button id="s-artist" class="btn-s" onclick="setSort('artist')">가수명</button>
        <button id="s-release_date" class="btn-s" onclick="setSort('release_date')">발매일</button>
        <button id="s-purchase_date" class="btn-s" onclick="setSort('purchase_date')">구매일</button>
        <button id="s-price" class="btn-s" onclick="setSort('price')">가격순</button>
        <button id="s-country" class="btn-s" onclick="setSort('country')">나라순</button>
        <button id="f-c" class="btn-s" onclick="filterCountry()">나라: 전체</button>
        <button id="f-o" class="btn-s" onclick="filterOwned()">보유: 전체</button>
    </div>
    <div class="total-label" id="totalCount">0</div>

    <main>
        <section id="list" class="page active">
            <div id="grid-view" class="grid"></div>
            <div id="table-view" style="display:none;">
                <table>
                    <thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add" class="page">
            <h2 id="formTitle">NEW ARCHIVE</h2>
            <input type="hidden" id="edit-id">
            <label class="check-wrap"><input type="checkbox" id="field-owned" checked> 보유 중</label>
            <label style="font-size:11px; color:var(--dim);">PHOTO (일괄 선택 가능)</label>
            <input type="file" id="field-img" accept="image/*" multiple onchange="handleImages(this)">
            <input type="text" id="field-title" placeholder="앨범명">
            <input type="text" id="field-artist" placeholder="가수명">
            <select id="field-country"><option value="한국">한국</option><option value="일본">일본</option><option value="기타">기타</option></select>
            
            <div class="price-row">
                <select id="field-lcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="field-lprice" placeholder="정가">
                <input type="number" id="field-lex" value="1">
            </div>
            <div class="price-row">
                <select id="field-pcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="field-pprice" placeholder="구매가">
                <input type="number" id="field-pex" value="1">
            </div>
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px;">발매일</label><input type="date" id="field-rd"></div>
                <div style="flex:1;"><label style="font-size:11px;">구매일</label><input type="date" id="field-pd"></div>
            </div>
            <textarea id="field-memo" rows="4" placeholder="메모 입력..."></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:8px; font-weight:bold; font-size:16px;">SAVE</button>
        </section>
    </main>
</div>

<div id="detail">
    <button onclick="closeDetail()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(255,255,255,0.2); border:none; color:#fff; width:40px; height:40px; border-radius:50%;">←</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img" style="max-width:90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
        <div class="d-right">
            <h1 id="d-title" style="margin:0;"></h1>
            <p id="d-artist" style="font-size:20px; color:var(--dim); margin: 10px 0 30px 0;"></p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; border-top:1px solid #222; padding-top:20px;">
                <div><label style="font-size:10px; color:var(--dim);">COUNTRY</label><div id="d-c"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">STATUS</label><div id="d-s"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">RELEASE</label><div id="d-rd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">PURCHASE</label><div id="d-pd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">LIST PRICE</label><div id="d-lp"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">BUY PRICE</label><div id="d-pp"></div></div>
            </div>
            <div id="d-memo" style="margin-top:30px; background:#111; padding:20px; border-radius:8px; white-space:pre-wrap; line-height:1.6;"></div>
            <div style="margin-top:40px; display:flex; gap:10px;">
                <button onclick="editStart()" style="flex:1; padding:15px; background:#222; color:#fff; border:1px solid #444; border-radius:8px;">EDIT</button>
                <button id="singleDelBtn" style="flex:1; padding:15px; background:none; color:#ff4d4d; border:1px solid #ff4d4d; border-radius:8px;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<div id="batch-bar">
    <span id="selCount">0 SELECTED</span>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleEditMode()" style="background:none; border:1px solid #000; padding:8px 15px; border-radius:4px;">CANCEL</button>
        <button onclick="deleteBatch()" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:4px;">DELETE ALL</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymwGJacJnrgbaJjcoZJTUB9bxFS6uQlFUTMZ1LcLgUPLbMTIJd5wlFDncIfInJLXeg/exec';
    const PIN = '142857';

    let db = [], selected = [], isEdit = false, view = 'grid', sortK = 'id', isAsc = false;
    let filterC = 'All', filterO = 'All', currentImg = "";

    window.onload = () => {
        if(localStorage.getItem('vinyl_auth') === 'true') start();
        else document.getElementById('loginPage').style.display = 'block';
    };

    function login() {
        if(document.getElementById('pin').value === PIN) {
            localStorage.setItem('vinyl_auth', 'true');
            start();
        } else alert('Wrong PIN');
    }

    async function start() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await load();
    }

    async function load() {
        loading(true);
        try {
            const r = await fetch(SCRIPT_URL);
            db = await r.json();
            render();
        } catch(e) { console.error(e); }
        loading(false);
    }

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('navBack').style.display = (id === 'list' ? 'none' : 'block');
        document.getElementById('toolbar').style.display = (id === 'list' ? 'flex' : 'none');
    }

    function formatDate(s) {
        if(!s || s.length < 10) return s || '-';
        const p = s.split('-');
        return `${p[0]}년 ${parseInt(p[1])}월 ${parseInt(p[2])}일`;
    }

    async function handleImages(input) {
        if(!input.files.length) return;
        if(input.files.length > 1) { // 일괄 업로드
            loading(true);
            for(let f of input.files) {
                const b64 = await compress(f);
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({
                    action: 'add', id: 'V' + Date.now() + Math.random().toString(36).substr(2,5),
                    owned: true, title: '새 앨범', artist: '-', country: '기타',
                    l_curr: '₩', l_ex: 1, p_curr: '₩', p_ex: 1, list_price: 0, purchase_price: 0,
                    release_date: '', purchase_date: new Date().toISOString().split('T')[0],
                    memo: '', image: b64
                })});
            }
            location.reload();
        } else {
            currentImg = await compress(input.files[0]);
        }
    }

    async function compress(file) {
        return new Promise(res => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    cvs.width = 600; cvs.height = 600;
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0,0,600,600);
                    res(cvs.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    function render() {
        const today = new Date().toISOString().split('T')[0];
        let f = db.filter(i => (filterC === 'All' || i.country === filterC));
        if(filterO !== 'All') f = f.filter(i => (filterO === '보유' ? i.owned : !i.owned));
        
        const coll = new Intl.Collator('ja', { sensitivity: 'base' });
        f.sort((a, b) => {
            let vA = a[sortK], vB = b[sortK];
            if(sortK === 'price') {
                vA = Number(a.list_price||0) * Number(a.l_ex||1);
                vB = Number(b.list_price||0) * Number(b.l_ex||1);
            } else if(sortK === 'country') {
                const p = {"한국":1, "일본":2, "기타":3};
                vA = p[vA]||9; vB = p[vB]||9;
            } else if(['title', 'artist'].includes(sortK)) {
                const getP = (s) => {
                    const c = String(s||"").charAt(0);
                    if(/[ㄱ-ㅎ가-힣]/.test(c)) return 1;
                    if(/[\u3040-\u30ff\u4e00-\u9faf]/.test(c)) return 2;
                    return 3;
                };
                if(getP(vA) !== getP(vB)) return isAsc ? getP(vA) - getP(vB) : getP(vB) - getP(vA);
                return isAsc ? coll.compare(vA, vB) : coll.compare(vB, vA);
            }
            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.getElementById('totalCount').innerText = `TOTAL: ${f.length}`;
        document.querySelectorAll('.toolbar .btn-s').forEach(b => {
            b.classList.remove('active');
            if(b.id === 's-'+sortK) {
                b.classList.add('active');
                b.innerText = b.innerText.split(' ')[0] + (isAsc ? ' ↑' : ' ↓');
            }
        });

        if(view === 'grid') {
            document.getElementById('table-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'grid';
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const dim = (!i.owned || (i.release_date && i.release_date > today)) ? 'is-dimmed' : '';
                const sel = selected.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="itemClick('${i.id}')"><img src="${i.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('table-view').style.display = 'block';
            document.getElementById('table-body').innerHTML = f.map((i, idx) => {
                const sel = selected.includes(String(i.id)) ? 'selected' : '';
                return `<tr onclick="itemClick('${i.id}')" class="${sel}"><td>${idx+1}</td><td><img src="${i.image}" class="t-img"></td><td>${i.title}</td><td>${i.artist}</td><td>${i.release_date}</td><td>${i.purchase_date}</td></tr>`;
            }).join('');
        }
    }

    function itemClick(id) {
        if(isEdit) {
            const sid = String(id);
            if(selected.includes(sid)) selected = selected.filter(x => x !== sid);
            else selected.push(sid);
            document.getElementById('selCount').innerText = `${selected.length} SELECTED`;
            render();
        } else openDetail(id);
    }

    function openDetail(id) {
        const i = db.find(x => String(x.id) === String(id));
        if(!i) return;
        window.activeId = id;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title;
        document.getElementById('d-artist').innerText = i.artist;
        document.getElementById('d-c').innerText = i.country;
        document.getElementById('d-s').innerText = i.owned ? "보유 중" : "미보유";
        document.getElementById('d-rd').innerText = formatDate(i.release_date);
        document.getElementById('d-pd').innerText = formatDate(i.purchase_date);
        document.getElementById('d-memo').innerText = i.memo || "메모가 없습니다.";
        
        const pr = (v, c, e) => {
            if(!v || v == 0) return (c||'₩') + " 0";
            if(c === '₩') return `₩ ${Number(v).toLocaleString()}`;
            return `${c}${Number(v).toLocaleString()} (약 ₩${Math.floor(v*e).toLocaleString()})`;
        };
        document.getElementById('d-lp').innerText = pr(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('d-pp').innerText = pr(i.purchase_price, i.p_curr, i.p_ex);
        document.getElementById('detail').style.display = 'block';
        document.getElementById('singleDelBtn').onclick = () => deleteOne(id);
    }

    async function deleteOne(id) {
        if(!confirm('삭제하시겠습니까?')) return;
        loading(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: String(id) }) });
        location.reload();
    }

    async function deleteBatch() {
        if(!selected.length || !confirm('선택 항목을 모두 삭제하시겠습니까?')) return;
        loading(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: selected.map(String) }) });
        location.reload();
    }

    async function save() {
        const eid = document.getElementById('edit-id').value;
        loading(true);
        const payload = {
            action: eid ? 'edit' : 'add',
            id: eid || 'V' + Date.now() + Math.random().toString(36).substr(2,5),
            owned: document.getElementById('field-owned').checked,
            title: document.getElementById('field-title').value,
            artist: document.getElementById('field-artist').value,
            country: document.getElementById('field-country').value,
            l_curr: document.getElementById('field-lcurr').value,
            l_ex: document.getElementById('field-lex').value,
            p_curr: document.getElementById('field-pcurr').value,
            p_ex: document.getElementById('field-pex').value,
            list_price: document.getElementById('field-lprice').value,
            purchase_price: document.getElementById('field-pprice').value,
            release_date: document.getElementById('field-rd').value,
            purchase_date: document.getElementById('field-pd').value,
            memo: document.getElementById('field-memo').value,
            image: currentImg || (eid ? db.find(x => String(x.id) === String(eid)).image : "")
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function editStart() {
        const i = db.find(x => String(x.id) === String(window.activeId));
        closeDetail(); go('add');
        document.getElementById('formTitle').innerText = "EDIT ARCHIVE";
        document.getElementById('edit-id').value = i.id;
        document.getElementById('field-owned').checked = i.owned;
        document.getElementById('field-title').value = i.title;
        document.getElementById('field-artist').value = i.artist;
        document.getElementById('field-country').value = i.country;
        document.getElementById('field-lcurr').value = i.l_curr;
        document.getElementById('field-lex').value = i.l_ex;
        document.getElementById('field-lprice').value = i.list_price;
        document.getElementById('field-pcurr').value = i.p_curr;
        document.getElementById('field-pex').value = i.p_ex;
        document.getElementById('field-pprice').value = i.purchase_price;
        document.getElementById('field-rd').value = i.release_date;
        document.getElementById('field-pd').value = i.purchase_date;
        document.getElementById('field-memo').value = i.memo;
    }

    function setSort(k) { if(sortK === k) isAsc = !isAsc; else { sortK = k; isAsc = (k==='id'?false:true); } render(); }
    function toggleView() { view = (view==='grid'?'table':'grid'); document.getElementById('viewIcon').innerText = (view==='grid'?'▦':'≡'); render(); }
    function toggleEditMode() { isEdit = !isEdit; selected = []; document.getElementById('batch-bar').style.display = (isEdit?'flex':'none'); render(); }
    function filterCountry() { const opts = ['All', '한국', '일본', '기타']; filterC = opts[(opts.indexOf(filterC)+1)%opts.length]; document.getElementById('f-c').innerText = `나라: ${filterC}`; render(); }
    function filterOwned() { const opts = ['All', '보유', '미보유']; filterO = opts[(opts.indexOf(filterO)+1)%opts.length]; document.getElementById('f-o').innerText = `보유: ${filterO}`; render(); }
    function loading(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function closeDetail() { document.getElementById('detail').style.display = 'none'; }
</script>
</body>
</html>
