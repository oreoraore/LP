<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000000; --card: #111111; --text: #ffffff; --accent: #bb86fc; --dim: #888; --border: #222; --danger: #ff4444; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Animation & Transition */
        .fade { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Header & Nav */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border); padding: 0 15px; }
        .back-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; display: none; margin-right: 10px; }

        /* Tool Bar & Sort */
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; align-items: center; }
        .sort-container { display: flex; gap: 8px; overflow-x: auto; flex: 1; padding-right: 10px; scrollbar-width: none; }
        .sort-container::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 12px; border-radius: 15px; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(187,134,252,0.1); font-weight: bold; }
        .total-label { font-size: 12px; color: var(--accent); font-weight: bold; border-left: 1px solid var(--border); padding-left: 10px; white-space: nowrap; }

        /* Content Area */
        main { padding: 130px 15px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        /* Viewer: Grid & Table */
        .lp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 768px) { .lp-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; } }
        .lp-item { position: relative; aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); opacity: 0.7; }

        /* 무조건 밝게 투명화 (미보유/미발매) */
        .is-dimmed { filter: opacity(0.4) brightness(1.7); }

        .table-wrap { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #1a1a1a; color: var(--dim); font-weight: normal; font-size: 11px; }
        .t-img { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
        .t-no { color: var(--accent); font-weight: bold; width: 40px; text-align: center; }

        /* Form */
        input, select, textarea { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; color: #fff; margin-bottom: 12px; }
        .price-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .batch-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; border: 1px dashed #444; padding: 10px; margin-bottom: 15px; }
        .batch-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; opacity: 0.5; border: 2px solid transparent; }
        .batch-thumb.active { opacity: 1; border-color: var(--accent); }

        /* Detail (50:50) */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-container { display: flex; min-height: 100vh; }
        .d-img-box { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; position: sticky; top: 0; height: 100vh; }
        .d-img-box img { max-width: 100%; max-height: 90%; object-fit: contain; }
        .d-info-box { flex: 5; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) {
            .d-container { flex-direction: column; }
            .d-img-box { height: 50vh; position: relative; }
            .d-info-box { padding: 30px 20px; }
        }

        /* Utils */
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 1500; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p id="loadMsg" style="margin-top:10px; font-size:12px; color:var(--accent);">데이터 처리 중...</p></div>

<div id="loginView" style="display:none; text-align:center; padding-top:40vh;">
    <h2 style="letter-spacing:10px; font-size:18px; margin-bottom:30px;">VINYL ARCHIVE</h2>
    <input type="password" id="pw" style="width:200px; text-align:center;" placeholder="PASSWORD" onkeyup="if(event.keyCode==13)doLogin()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button class="back-btn" id="navBack" onclick="go('list')">←</button>
            <span style="font-weight:900; letter-spacing:2px; font-size:14px; cursor:pointer;" onclick="go('list')">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <span onclick="go('add')" style="cursor:pointer; font-size:14px; font-weight:bold;">ADD</span>
            <span onclick="toggleView()" id="viewIcon" style="cursor:pointer; font-size:18px;">≡</span>
            <span onclick="toggleEdit()" id="editBtn" style="cursor:pointer; font-size:13px; color:var(--accent);">편집</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <div class="sort-container">
            <button id="s-id" class="sort-btn active" onclick="sortData('id')">등록순 ↓</button>
            <button id="s-title" class="sort-btn" onclick="sortData('title')">앨범명</button>
            <button id="s-artist" class="sort-btn" onclick="sortData('artist')">가수명</button>
            <button id="s-release_date" class="sort-btn" onclick="sortData('release_date')">발매일</button>
            <button id="s-purchase_date" class="sort-btn" onclick="sortData('purchase_date')">구매일</button>
            <button id="s-price" class="sort-btn" onclick="sortData('price')">가격순</button>
            <button id="s-country" class="sort-btn" onclick="sortData('country')">나라순</button>
            <button onclick="filterCountry()" class="sort-btn" id="f-c">국가: 전체</button>
            <button onclick="filterOwned()" class="sort-btn" id="f-o">상태: 전체</button>
        </div>
        <div class="total-label" id="totalCount">TOTAL 0</div>
    </div>

    <main class="fade">
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="table-view" class="table-wrap" style="display:none;">
                <table>
                    <thead><tr><th class="t-no">No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add">
            <h3 id="formTitle" style="margin-top:0;">ADD NEW VINYL</h3>
            <input type="hidden" id="editId">
            <label style="display:flex; align-items:center; gap:8px; margin-bottom:15px; font-size:14px;">
                <input type="checkbox" id="isOwned" checked style="width:auto; margin:0;"> 현재 보유 중
            </label>
            
            <p style="font-size:11px; color:var(--dim); margin-bottom:5px;">사진 업로드 (여러 장 선택 시 일괄 등록 준비)</p>
            <input type="file" id="fileIn" accept="image/*" multiple onchange="handleFiles(this)">
            <div id="batchArea" class="batch-preview" style="display:none;"></div>

            <input type="text" id="in-title" placeholder="앨범명">
            <input type="text" id="in-artist" placeholder="가수명">
            <select id="in-country">
                <option value="한국">한국</option><option value="일본">일본</option><option value="미국">미국</option><option value="유럽">유럽</option><option value="기타">기타</option>
            </select>
            
            <div class="price-row">
                <select id="l-curr" style="margin:0;"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="in-lprice" placeholder="정가" style="margin:0;">
                <input type="number" id="l-ex" placeholder="환율" value="1" style="margin:0;">
            </div>
            <div class="price-row">
                <select id="p-curr" style="margin:0;"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="in-pprice" placeholder="구매가" style="margin:0;">
                <input type="number" id="p-ex" placeholder="환율" value="1" style="margin:0;">
            </div>

            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">발매일</label><input type="date" id="in-rd"></div>
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">구매일</label><input type="date" id="in-pd"></div>
            </div>
            <textarea id="in-memo" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">SAVE ARCHIVE</button>
        </section>
    </main>
</div>

<div id="batch-bar">
    <span id="selCount">0 SELECTED</span>
    <div>
        <button onclick="toggleEdit()" style="background:none; border:1px solid #000; padding:8px 15px; border-radius:5px; margin-right:10px;">취소</button>
        <button onclick="batchDelete()" style="background:#000; color:#fff; border:none; padding:8px 20px; border-radius:5px;">일괄 삭제</button>
    </div>
</div>

<div id="detail" class="fade">
    <button onclick="closeDetail()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(0,0,0,0.5); color:#fff; border:1px solid #444; width:40px; height:40px; border-radius:50%; font-size:20px;">←</button>
    <div class="d-container">
        <div class="d-img-box"><img id="d-img" src=""></div>
        <div class="d-info-box">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <span id="d-country" style="background:var(--accent); color:#000; padding:4px 10px; border-radius:5px; font-size:11px; font-weight:bold;"></span>
                <span id="d-status" style="background:#222; padding:4px 10px; border-radius:5px; font-size:11px;"></span>
            </div>
            <h1 id="d-title" style="margin:0; font-size:30px;"></h1>
            <h2 id="d-artist" style="margin:10px 0 30px; font-size:18px; color:var(--dim); font-weight:normal;"></h2>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; border-top:1px solid #222; padding-top:25px;">
                <div><label style="color:var(--dim); font-size:11px;">발매일</label><p id="d-rd" style="margin:5px 0;"></p></div>
                <div><label style="color:var(--dim); font-size:11px;">구매일</label><p id="d-pd" style="margin:5px 0;"></p></div>
                <div><label style="color:var(--dim); font-size:11px;">정가(출고가)</label><p id="d-lp" style="margin:5px 0; color:var(--accent); font-weight:bold;"></p></div>
                <div><label style="color:var(--dim); font-size:11px;">실구매가</label><p id="d-pp" style="margin:5px 0; color:var(--accent); font-weight:bold;"></p></div>
            </div>
            <div style="margin:30px 0; background:#111; padding:15px; border-radius:6px; border-left:3px solid var(--accent); white-space:pre-wrap; font-size:14px; line-height:1.6;" id="d-memo"></div>
            <div style="display:flex; gap:10px; margin-top:auto;">
                <button onclick="startEdit()" style="flex:1; padding:15px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:8px;">수정하기</button>
                <button id="delBtn" style="flex:1; padding:15px; background:none; color:var(--danger); border:1px solid var(--danger); border-radius:8px;">삭제하기</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwjp9soR-s225GM7FGr_Dw9ld7-8tfxng2MhOYESQ1a9VwucZyX3svFd0zBE3NOQeqS/exec';
    const ACCESS_PW = '142857';

    let items = [], selIds = [], isEdit = false;
    let currentView = 'grid', sortKey = 'id', isAsc = false;
    let filterC = 'All', filterO = 'All';
    let tempImages = [];

    window.onload = () => {
        if(localStorage.getItem('vinyl_auth') === 'true') startApp();
        else document.getElementById('loginView').style.display = 'block';
    };

    function doLogin() {
        if(document.getElementById('pw').value === ACCESS_PW) {
            localStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else alert('틀렸습니다.');
    }

    async function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await loadData();
    }

    async function loadData() {
        loader(true, '아카이브 동기화 중...');
        try {
            const res = await fetch(SCRIPT_URL);
            items = await res.json();
            sortData('id');
        } catch(e) { console.error(e); }
        loader(false);
    }

    function go(page) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(page).classList.add('active');
        document.getElementById('navBack').style.display = (page === 'list') ? 'none' : 'block';
        document.getElementById('toolbar').style.display = (page === 'list') ? 'flex' : 'none';
        if(page === 'list') render(); else if(page === 'add') resetForm();
    }

    // 사진 압축 및 처리
    async function handleFiles(input) {
        if(!input.files.length) return;
        loader(true, '이미지 최적화 중...');
        const area = document.getElementById('batchArea');
        area.innerHTML = ""; area.style.display = "grid";
        tempImages = [];

        for(let file of input.files) {
            const base64 = await processImage(file);
            tempImages.push(base64);
            const img = document.createElement('img');
            img.src = base64; img.className = 'batch-thumb';
            img.onclick = function() {
                document.querySelectorAll('.batch-thumb').forEach(t=>t.classList.remove('active'));
                this.classList.add('active'); window.activeTempImg = base64;
            };
            area.appendChild(img);
        }
        if(tempImages.length) { area.firstChild.classList.add('active'); window.activeTempImg = tempImages[0]; }
        loader(false);
    }

    async function processImage(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    canvas.width = 600; canvas.height = 600;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 600, 600);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // 정렬 알고리즘 (한/일/영 대응 및 토글)
    function sortData(key) {
        if(sortKey === key) isAsc = !isAsc;
        else { sortKey = key; isAsc = (key === 'id' ? false : true); }

        const jaCol = new Intl.Collator('ja', { sensitivity: 'base', numeric: true });

        items.sort((a, b) => {
            let vA = a[key], vB = b[key];
            
            if(key === 'price') {
                vA = Number(a.list_price||0) * (a.l_curr === '₩' ? 1 : Number(a.l_ex||1));
                vB = Number(b.list_price||0) * (b.l_curr === '₩' ? 1 : Number(b.l_ex||1));
            } else if(key === 'country') {
                const order = {"한국":1, "일본":2};
                vA = order[vA]||3; vB = order[vB]||3;
            } else if(['title', 'artist'].includes(key)) {
                const getP = (s) => {
                    if(!s) return 4;
                    if(/[ㄱ-ㅎ가-힣]/.test(s[0])) return 1;
                    if(/[\u3040-\u30ff\uff66-\uff9f\u4e00-\u9faf]/.test(s[0])) return 2;
                    if(/[a-zA-Z]/.test(s[0])) return 3;
                    return 4;
                };
                const pA = getP(vA), pB = getP(vB);
                if(pA !== pB) return isAsc ? pA - pB : pB - pA;
                return isAsc ? jaCol.compare(vA, vB) : jaCol.compare(vB, vA);
            }

            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('s-'+key);
        if(btn) {
            btn.classList.add('active');
            btn.innerText = btn.innerText.split(' ')[0] + (isAsc ? ' ↑' : ' ↓');
        }
        render();
    }

    function render() {
        const today = new Date(); today.setHours(0,0,0,0);
        let f = items.filter(i => (filterC === 'All' || i.country === filterC));
        if(filterO !== 'All') f = f.filter(i => String(i.owned) === (filterO === '보유' ? 'true' : 'false'));
        
        document.getElementById('totalCount').innerText = `TOTAL ${f.length}`;

        if(currentView === 'grid') {
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const isFuture = i.release_date && new Date(i.release_date) > today;
                const dim = (String(i.owned) === 'false' || isFuture) ? 'is-dimmed' : '';
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="clickItem('${i.id}')"><img src="${i.image}" loading="lazy"></div>`;
            }).join('');
        } else {
            document.getElementById('table-body').innerHTML = f.map((i, idx) => {
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<tr class="${sel}" onclick="clickItem('${i.id}')">
                    <td class="t-no">${idx + 1}</td>
                    <td><img src="${i.image}" class="t-img"></td>
                    <td style="font-weight:bold;">${i.title || '-'}</td>
                    <td>${i.artist || '-'}</td>
                    <td>${(i.release_date||"").slice(0,10)}</td>
                    <td>${(i.purchase_date||"").slice(0,10)}</td>
                </tr>`;
            }).join('');
        }
    }

    function clickItem(id) {
        if(isEdit) {
            if(selIds.includes(id)) selIds = selIds.filter(x => x !== id);
            else selIds.push(id);
            document.getElementById('selCount').innerText = `${selIds.length} SELECTED`;
            render();
        } else openDetail(id);
    }

    function openDetail(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title || "Unknown Title";
        document.getElementById('d-artist').innerText = i.artist || "Unknown Artist";
        document.getElementById('d-country').innerText = i.country || "기타";
        document.getElementById('d-status').innerText = String(i.owned) === 'true' ? "보유 중" : "미보유";
        document.getElementById('d-rd').innerText = (i.release_date||"").slice(0,10) || "-";
        document.getElementById('d-pd').innerText = (i.purchase_date||"").slice(0,10) || "-";
        document.getElementById('d-memo').innerText = i.memo || "";
        
        const priceFmt = (v, c, e) => {
            if(!v) return "미기입";
            const cur = Number(v).toLocaleString();
            if(c === '₩') return `₩ ${cur}`;
            const krw = Math.round(v * (e||1)).toLocaleString();
            return `${c}${cur} (약 ₩ ${krw})`;
        };
        document.getElementById('d-lp').innerText = priceFmt(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('d-pp').innerText = priceFmt(i.purchase_price, i.p_curr, i.p_ex);

        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => deleteOne(i.id);
        window.activeId = id;
    }

    async function save() {
        const eid = document.getElementById('editId').value;
        let img = eid ? items.find(x => x.id == eid).image : window.activeTempImg;
        if(!img) return alert('사진을 업로드하세요.');

        loader(true, '저장 중...');
        const data = {
            action: eid ? 'edit' : 'add',
            id: eid || Date.now(),
            owned: document.getElementById('isOwned').checked,
            title: document.getElementById('in-title').value,
            artist: document.getElementById('in-artist').value,
            country: document.getElementById('in-country').value,
            l_curr: document.getElementById('l-curr').value,
            l_ex: document.getElementById('l-ex').value || 1,
            p_curr: document.getElementById('p-curr').value,
            p_ex: document.getElementById('p-ex').value || 1,
            list_price: document.getElementById('in-lprice').value,
            purchase_price: document.getElementById('in-pprice').value,
            release_date: document.getElementById('in-rd').value,
            purchase_date: document.getElementById('in-pd').value,
            memo: document.getElementById('in-memo').value,
            image: img
        };

        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        
        if(!eid && tempImages.length > 1) {
            tempImages = tempImages.filter(x => x !== window.activeTempImg);
            const area = document.getElementById('batchArea');
            area.innerHTML = "";
            tempImages.forEach(s => {
                const img = document.createElement('img');
                img.src = s; img.className = 'batch-thumb';
                img.onclick = function() { 
                    document.querySelectorAll('.batch-thumb').forEach(t=>t.classList.remove('active'));
                    this.classList.add('active'); window.activeTempImg = s;
                };
                area.appendChild(img);
            });
            area.firstChild.classList.add('active'); window.activeTempImg = tempImages[0];
            resetPartial(); loader(false); alert('저장되었습니다. 다음 항목을 입력하세요.');
        } else {
            location.reload();
        }
    }

    function toggleView() {
        currentView = (currentView === 'grid') ? 'table' : 'grid';
        document.getElementById('viewIcon').innerText = (currentView === 'grid') ? '≡' : '▦';
        document.getElementById('grid-view').style.display = (currentView === 'grid') ? 'grid' : 'none';
        document.getElementById('table-view').style.display = (currentView === 'table') ? 'block' : 'none';
        render();
    }
    function toggleEdit() {
        isEdit = !isEdit; selIds = [];
        document.getElementById('editBtn').innerText = isEdit ? "취소" : "편집";
        document.getElementById('batch-bar').style.display = isEdit ? "flex" : "none";
        render();
    }
    async function batchDelete() {
        if(!selIds.length || !confirm('선택 항목을 영구 삭제할까요?')) return;
        loader(true, '일괄 삭제 중...');
        for(let id of selIds) await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'delete', id}) });
        location.reload();
    }
    async function deleteOne(id) {
        if(!confirm('삭제할까요?')) return;
        loader(true, '삭제 중...');
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'delete', id}) });
        location.reload();
    }
    function startEdit() {
        const i = items.find(x => x.id == window.activeId);
        closeDetail(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('isOwned').checked = String(i.owned) === 'true';
        document.getElementById('in-title').value = i.title || "";
        document.getElementById('in-artist').value = i.artist || "";
        document.getElementById('in-country').value = i.country || "한국";
        document.getElementById('l-curr').value = i.l_curr || "₩";
        document.getElementById('l-ex').value = i.l_ex || 1;
        document.getElementById('in-lprice').value = i.list_price || "";
        document.getElementById('p-curr').value = i.p_curr || "₩";
        document.getElementById('p-ex').value = i.p_ex || 1;
        document.getElementById('in-pprice').value = i.purchase_price || "";
        document.getElementById('in-rd').value = (i.release_date||"").slice(0,10);
        document.getElementById('in-pd').value = (i.purchase_date||"").slice(0,10);
        document.getElementById('in-memo').value = i.memo || "";
        document.getElementById('formTitle').innerText = "EDIT ARCHIVE";
        document.getElementById('batchArea').style.display = "none";
    }
    function resetForm() {
        resetPartial();
        document.getElementById('editId').value = "";
        document.getElementById('fileIn').value = "";
        document.getElementById('batchArea').innerHTML = "";
        document.getElementById('batchArea').style.display = "none";
        document.getElementById('formTitle').innerText = "ADD NEW VINYL";
    }
    function resetPartial() {
        document.getElementById('in-title').value = ""; document.getElementById('in-artist').value = "";
        document.getElementById('in-lprice').value = ""; document.getElementById('in-pprice').value = "";
        document.getElementById('in-rd').value = ""; document.getElementById('in-pd').value = "";
        document.getElementById('in-memo').value = "";
    }
    function filterCountry() {
        const c = ['All', '한국', '일본', '미국', '유럽', '기타'];
        filterC = c[(c.indexOf(filterC) + 1) % c.length];
        document.getElementById('f-c').innerText = `국가: ${filterC==='All'?'전체':filterC}`;
        render();
    }
    function filterOwned() {
        const s = ['All', '보유', '미보유'];
        filterO = s[(s.indexOf(filterO) + 1) % s.length];
        document.getElementById('f-o').innerText = `상태: ${filterO==='All'?'전체':filterO}`;
        render();
    }
    function closeDetail() { document.getElementById('detail').style.display = 'none'; }
    function loader(show, m) { 
        document.getElementById('loadMsg').innerText = m || "";
        document.getElementById('loader').style.display = show ? 'flex' : 'none'; 
    }
</script>
</body>
</html>
