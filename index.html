<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; overflow-x: hidden; }
        
        /* 애니메이션 */
        .fade-in { opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 상단 네비게이션 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid var(--border); padding: 0 15px; }
        .nav-left, .nav-right { display: flex; gap: 5px; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px; transition: 0.2s; }
        nav button:hover { color: var(--accent); }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* 보기 방식 전환 버튼 (아이콘 느낌) */
        .view-toggle { font-size: 18px !important; padding: 10px 15px !important; }

        /* 정렬 바 */
        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 6px; overflow-x: auto; z-index: 90; border-bottom: 1px solid #222; scrollbar-width: none; }
        .sort-bar::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 12px; cursor: pointer; transition: 0.2s; }
        .sort-btn:hover { border-color: #555; color: #fff; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; transition: padding 0.3s; }
        section { display: none; }
        section.active { display: block; }

        /* --- 보기 방식 1: 그리드 (기존 자켓 위주) --- */
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .lp-item:hover { transform: scale(1.03); z-index: 2; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .flag-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.7); padding: 2px 7px; border-radius: 4px; font-size: 10px; color: var(--accent); border: 1px solid var(--accent); font-weight: bold; }

        /* --- 보기 방식 2: 리스트 (상세 정보 위주) --- */
        .lp-list { display: flex; flex-direction: column; gap: 8px; }
        .list-item { background: var(--card); border-radius: 8px; padding: 10px; display: grid; grid-template-columns: 60px 2fr 1.5fr 1fr 1fr; gap: 15px; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .list-item:hover { border-color: var(--accent); background: #222; }
        
        .list-img { width: 60px; height: 60px; border-radius: 4px; overflow: hidden; background: #000; }
        .list-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .list-info { display: flex; flex-direction: column; overflow: hidden; }
        .list-title { font-weight: bold; color: #fff; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-artist { color: var(--dim); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .list-date { font-size: 13px; color: #ccc; text-align: center; }
        .list-label { display: none; color: var(--dim); font-size: 11px; } /* 모바일용 라벨 */

        /* 리스트 모바일 반응형 */
        @media (max-width: 768px) {
            .list-item { grid-template-columns: 50px 1fr; grid-template-rows: auto auto; gap: 10px; padding: 12px; }
            .list-img { width: 50px; height: 50px; grid-row: 1 / 3; }
            .list-info { grid-column: 2; grid-row: 1; }
            .list-dates-mobile { grid-column: 2; grid-row: 2; display: flex; gap: 15px; border-top: 1px solid #333; padding-top: 8px; }
            .list-date { text-align: left; font-size: 12px; display: flex; align-items: center; gap: 5px; }
            .list-label { display: inline; }
            /* PC용 컬럼 숨김 */
            .list-item > .list-date { display: none; } 
        }

        /* 상세보기 (Full Screen) */
        #detail { position: fixed; inset: 0; background: #000; z-index: 500; display: none; overflow-y: auto; }
        .d-container { display: flex; min-height: 100vh; width: 100%; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; height: 100vh; padding: 20px; }
        .d-img-side img { max-width: 100%; max-height: 85%; object-fit: contain; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 4px; }
        .d-info-side { flex: 0 0 50%; padding: 60px; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        @media (max-width: 900px) {
            .d-container { flex-direction: column; }
            .d-img-side { flex: none; height: 45vh; position: relative; padding: 15px; border-bottom: 1px solid var(--border); }
            .d-info-side { flex: none; padding: 30px 20px; }
        }

        .dt-country { display: inline-block; padding: 4px 10px; background: var(--accent); color: #000; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; width: fit-content; }
        .dt-title { font-size: 26px; font-weight: 800; color: #fff; margin: 0; line-height: 1.2; }
        .dt-artist { font-size: 18px; color: var(--dim); margin: 8px 0 25px 0; }
        
        .dt-price-box { margin-bottom: 20px; padding-bottom: 10px; }
        .dt-price-item { margin-bottom: 10px; }
        .dt-label { font-size: 11px; color: var(--dim); display: block; text-transform: uppercase; letter-spacing: 1px; }
        .dt-val { font-size: 19px; font-weight: bold; color: var(--accent); }

        .dt-dates-box { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 18px 0; margin-bottom: 20px; }
        .dt-date-row { font-size: 16px; margin-bottom: 6px; color: #fff; display: flex; align-items: center; }
        .dt-date-label { color: var(--dim); width: 80px; font-size: 14px; }

        .dt-memo { font-size: 15px; line-height: 1.8; color: #ccc; background: #151515; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 4px solid var(--accent); }
        
        /* 폼 & 버튼 */
        .f-group { margin-bottom: 15px; }
        label { display: block; color: var(--dim); margin-bottom: 5px; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; transition: 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); background: #222; }
        .save-btn { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .save-btn:hover { opacity: 0.8; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .edit-btn { background: #333; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 14px; cursor: pointer; }
        .delete-btn { background: transparent; color: #ff5555; border: 1px solid #ff5555; padding: 12px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 14px; cursor: pointer; }
        .close-x { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 24px; cursor: pointer; z-index: 600; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* 로딩 & 로그인 */
        #loginView { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { text-align: center; width: 280px; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; color: #fff; flex-direction: column; gap: 10px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>처리 중...</span></div>

<div id="loginView">
    <div class="login-box fade-in">
        <h1 style="color:#fff; margin-bottom:30px; letter-spacing:5px; font-size: 18px;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="padding:15px; border-radius:10px; text-align:center;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left">
            <button onclick="go('list')" id="nav-view" class="active">VIEW</button>
            <button onclick="go('add')" id="nav-add">ADD</button>
        </div>
        <div class="nav-right">
            <button onclick="switchView('grid')" id="btn-grid" class="view-toggle active">▦</button>
            <button onclick="switchView('list')" id="btn-list" class="view-toggle">▤</button>
            <button onclick="go('set')" id="nav-set" style="font-size:18px;">⚙</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <button class="sort-btn active" onclick="sortData('id')">등록순</button>
        <button class="sort-btn" onclick="sortData('artist')">가수순</button>
        <button class="sort-btn" onclick="sortData('list_price_krw')">출고가순</button>
        <button class="sort-btn" onclick="sortData('purchase_price_krw')">구매가순</button>
        <button class="sort-btn" onclick="sortData('release_date')">발매일순</button>
        <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라: All</button>
    </div>

    <main class="fade-in">
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="list-view" class="lp-list" style="display:none;"></div>
        </section>

        <section id="add">
            <h2 id="formTitle" style="font-weight:900; font-size:24px; margin-bottom:20px;">새 앨범 등록</h2>
            <input type="hidden" id="editId">
            <div class="f-group"><label>앨범 자켓 사진</label><input type="file" id="file" accept="image/*"></div>
            <div class="f-group"><input type="text" id="t" placeholder="앨범 제목 (필수)"></div>
            <div class="f-group"><input type="text" id="a" placeholder="아티스트(가수)명"></div>
            <div class="f-group">
                <label>구매 국가 (화폐 단위)</label>
                <select id="country">
                    <option value="한국">한국 (₩)</option>
                    <option value="일본">일본 (¥)</option>
                    <option value="미국">미국 ($)</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="f-group">
                <label>적용 환율 (1단위당 원화 가격)</label>
                <input type="number" id="ex_rate" step="0.01" placeholder="예: 9.1 (엔화), 1350 (달러)">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <div><label>출고가 (현지 화폐)</label><input type="number" id="lp_raw" placeholder="0"></div>
                <div><label>구매가 (현지 화폐)</label><input type="number" id="pp_raw" placeholder="0"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <div><label>발매일</label><input type="date" id="rd"></div>
                <div><label>구매일</label><input type="date" id="pd"></div>
            </div>
            <div class="f-group"><textarea id="m" rows="5" placeholder="메모 (감상평, 상태 등)"></textarea></div>
            <button class="save-btn" id="saveBtn" onclick="save()">컬렉션에 저장</button>
            <button class="save-btn" id="cancelBtn" style="background:#444; color:#fff; margin-top:10px; display:none;" onclick="location.reload()">수정 취소</button>
        </section>

        <section id="set">
            <h2 style="font-weight:900; font-size:24px; margin-bottom:20px;">설정</h2>
            <button class="save-btn" style="background:#333; color:#fff;" onclick="logout()">로그아웃</button>
        </section>
    </main>
</div>

<div id="detail">
    <button class="close-x" onclick="closeD()">✕</button>
    <div class="d-container fade-in">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <span id="dc" class="dt-country"></span>
            <h1 id="dt" class="dt-title"></h1>
            <p id="da" class="dt-artist"></p>
            
            <div class="dt-price-box">
                <div class="dt-price-item">
                    <span class="dt-label">List Price (출고가)</span>
                    <span id="dlp" class="dt-val"></span>
                </div>
                <div class="dt-price-item">
                    <span class="dt-label">Purchase Price (구매가)</span>
                    <span id="dpp" class="dt-val"></span>
                </div>
            </div>

            <div class="dt-dates-box">
                <div class="dt-date-row"><span class="dt-date-label">발매일</span> <span id="drd"></span></div>
                <div class="dt-date-row"><span class="dt-date-label">구매일</span> <span id="dpd"></span></div>
            </div>

            <div id="dm" class="dt-memo"></div>
            
            <div class="btn-row">
                <button class="edit-btn" id="editActionBtn">정보 수정</button>
                <button class="delete-btn" id="delBtn">앨범 삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ [필수 수정] 구글 앱 스크립트 배포 URL과 사용할 비밀번호를 입력하세요.
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyuoRW9cIe35YTqdQF6iBP937apMEO2IK91CFlWxQb_z-nJ6JGg198kNJTmIWTd1H0A/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All';
    let currentView = 'grid'; // 현재 보기 방식 (grid 또는 list)

    // 1. 로그인 로직
    function doLogin() {
        if(document.getElementById('pw').value === MY_PASSWORD) {
            sessionStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else {
            alert('비밀번호가 맞지 않습니다.');
            document.getElementById('pw').value = '';
        }
    }
    function logout() { sessionStorage.removeItem('vinyl_auth'); location.reload(); }

    // 앱 시작
    function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        // 저장된 보기 방식 불러오기
        const savedView = localStorage.getItem('vinyl_view');
        if (savedView) currentView = savedView;
        switchView(currentView);
        loadData();
    }

    // 2. 데이터 불러오기
    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(WEB_APP_URL);
            items = await res.json();
            // 날짜 데이터 포맷 정리 (YYYY-MM-DD)
            items.forEach(i => {
                if(i.release_date) i.release_date = String(i.release_date).split('T')[0];
                if(i.purchase_date) i.purchase_date = String(i.purchase_date).split('T')[0];
            });
            sortData('id'); // 기본 등록순 정렬
        } catch(e) {
            alert("데이터를 불러오지 못했습니다. URL과 네트워크를 확인하세요.");
        }
        document.getElementById('loader').style.display = 'none';
    }

    // 보기 방식 전환 (그리드 <-> 리스트)
    function switchView(viewType) {
        currentView = viewType;
        localStorage.setItem('vinyl_view', viewType); // 방식 저장

        // 버튼 스타일 변경
        document.querySelectorAll('.view-toggle').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${viewType}`).classList.add('active');

        // 컨텐츠 표시 변경
        const gridDiv = document.getElementById('grid-view');
        const listDiv = document.getElementById('list-view');

        if (viewType === 'grid') {
            gridDiv.style.display = 'grid';
            listDiv.style.display = 'none';
        } else {
            gridDiv.style.display = 'none';
            listDiv.style.display = 'flex';
        }
        render(); // 다시 그리기
    }

    // 3. 정렬 및 필터 로직
    function sortData(key) {
        // 정렬 버튼 스타일 변경
        if(event && event.target.classList && event.target.classList.contains('sort-btn')) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // 정렬 수행
        items.sort((a, b) => {
            if(key === 'artist') return String(a.artist).localeCompare(String(b.artist)); // 가수는 오름차순
            // 숫자, 날짜, ID는 내림차순 (최신/높은 가격이 위로)
            const vA = a[key] || 0; const vB = b[key] || 0;
            return (vB > vA) ? 1 : -1;
        });
        render();
    }

    function filterCountry() {
        const countries = ['All', ...new Set(items.map(i => i.country).filter(c => c))];
        const nextIdx = (countries.indexOf(currentFilter) + 1) % countries.length;
        currentFilter = countries[nextIdx];
        document.getElementById('filterBtn').innerText = `나라: ${currentFilter}`;
        render();
    }

    // 4. 화면 그리기 (렌더링)
    function render() {
        const gridDiv = document.getElementById('grid-view');
        const listDiv = document.getElementById('list-view');
        
        // 필터링 적용
        const filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        
        if (filtered.length === 0) {
            const noMsg = '<p style="text-align:center; grid-column:1/-1; color:#555; padding:50px 0;">앨범이 없습니다.</p>';
            gridDiv.innerHTML = noMsg;
            listDiv.innerHTML = noMsg;
            return;
        }

        // 현재 방식에 맞춰 HTML 생성
        if (currentView === 'grid') {
            // 그리드 보기 생성 (기존 방식)
            gridDiv.innerHTML = filtered.map(i => `
                <div class="lp-item fade-in" onclick="openD('${i.id}')">
                    <img src="${i.image || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='}" loading="lazy">
                    <div class="flag-badge">${i.country || '기타'}</div>
                </div>
            `).join('');
        } else {
            // 리스트 보기 생성 (새 방식)
            // 왼쪽부터: 사진 > 앨범명(가수) > 발매일 > 구매일
            listDiv.innerHTML = filtered.map(i => `
                <div class="list-item fade-in" onclick="openD('${i.id}')">
                    <div class="list-img">
                        <img src="${i.image || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='}" loading="lazy">
                    </div>
                    <div class="list-info">
                        <div class="list-title">${i.title}</div>
                        <div class="list-artist">${i.artist || 'Unknown'}</div>
                    </div>
                    <div class="list-date">${i.release_date || '-'}</div>
                    <div class="list-date">${i.purchase_date || '-'}</div>
                    
                    <div class="list-dates-mobile">
                        <div class="list-date"><span class="list-label">발매</span>${i.release_date || '-'}</div>
                        <div class="list-date"><span class="list-label">구매</span>${i.purchase_date || '-'}</div>
                    </div>
                </div>
            `).join('');
        }
    }

    // 5. 저장/수정/삭제 기능
    async function save() {
        const title = document.getElementById('t').value;
        const editId = document.getElementById('editId').value;
        if(!title) return alert('앨범 제목은 꼭 입력해야 합니다.');

        document.getElementById('loader').style.display = 'flex';
        
        // 이미지 파일 처리
        const fileInput = document.getElementById('file');
        let imageData = "";
        if (fileInput.files.length > 0) {
            imageData = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(e.target.result);
                r.readAsDataURL(fileInput.files[0]);
            });
        }

        // 전송할 데이터 구성
        const payload = {
            action: editId ? 'edit' : 'add',
            id: editId || Date.now(),
            title: title, 
            artist: document.getElementById('a').value,
            list_price: document.getElementById('lp_raw').value || 0,
            purchase_price: document.getElementById('pp_raw').value || 0,
            release_date: document.getElementById('rd').value,
            purchase_date: document.getElementById('pd').value, 
            memo: document.getElementById('m').value,
            image: imageData, // 신규 등록 혹은 수정한 경우에만 데이터가 있음
            country: document.getElementById('country').value,
            ex_rate: document.getElementById('ex_rate').value || 1
        };

        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.text();
            if(result.includes('Success')) {
                alert('저장되었습니다.');
                location.reload();
            } else { alert('저장 중 오류가 발생했습니다.'); }
        } catch(err) { 
            alert("서버 전송 실패"); 
        }
        document.getElementById('loader').style.display = 'none';
    }

    // 상세보기 모달 열기
    function openD(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        
        // 데이터 채우기
        document.getElementById('di').src = i.image || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist || 'Unknown Artist';
        document.getElementById('dc').innerText = i.country || '기타';
        
        // 가격 병기 (현지통화 + 원화 환산)
        document.getElementById('dlp').innerText = i.list_price_display || '-';
        document.getElementById('dpp').innerText = i.purchase_price_display || '-';
        
        // 날짜 (강조된 스타일)
        document.getElementById('drd').innerText = i.release_date || '-';
        document.getElementById('dpd').innerText = i.purchase_date || '-';

        // 메모 (줄바꿈 처리)
        document.getElementById('dm').innerHTML = (i.memo || '작성된 메모가 없습니다.').replace(/\n/g, '<br>');
        
        // 버튼 이벤트 바인딩
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        document.getElementById('editActionBtn').onclick = () => startEdit(i.id);
        
        // 모달 표시 및 스크롤 방지
        document.getElementById('detail').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    // 수정 모드 진입
    function startEdit(id) {
        const i = items.find(x => x.id == id);
        closeD(); // 모달 닫기
        go('add'); // ADD 섹션으로 이동
        
        // 폼에 기존 데이터 채우기
        document.getElementById('formTitle').innerText = "앨범 정보 수정";
        document.getElementById('editId').value = i.id;
        document.getElementById('t').value = i.title;
        document.getElementById('a').value = i.artist;
        document.getElementById('country').value = i.country;
        document.getElementById('ex_rate').value = i.ex_rate;
        document.getElementById('lp_raw').value = i.list_price;
        document.getElementById('pp_raw').value = i.purchase_price;
        document.getElementById('rd').value = i.release_date;
        document.getElementById('pd').value = i.purchase_date;
        document.getElementById('m').value = (i.memo || '').replace(/<br>/g, '\n');
        
        // 버튼 UI 변경
        document.getElementById('saveBtn').innerText = "수정 완료";
        document.getElementById('cancelBtn').style.display = "block";
    }

    // 모달 닫기
    function closeD() { 
        document.getElementById('detail').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
    }

    // 삭제 로직
    async function deleteItem(id) {
        if(!confirm('정말로 이 앨범을 컬렉션에서 삭제할까요?')) return;
        document.getElementById('loader').style.display = 'flex';
        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
            location.reload();
        } catch(e) { alert('삭제 실패'); }
        document.getElementById('loader').style.display = 'none';
    }

    // 6. 섹션 네비게이션
    function go(id) {
        // 섹션 활성화
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // 하단 탭 스타일
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${id}`).classList.add('active');
        
        // VIEW 섹션에서만 정렬바/보기전환 표시
        if(id === 'list') {
            document.getElementById('sortBar').style.display = 'flex';
            document.querySelectorAll('.view-toggle').forEach(b => b.style.display = 'block');
            document.querySelector('main').style.paddingTop = '130px';
        } else {
            document.getElementById('sortBar').style.display = 'none';
            document.querySelectorAll('.view-toggle').forEach(b => b.style.display = 'none');
            document.querySelector('main').style.paddingTop = '80px';
        }

        // ADD 모드 초기화
        if(id === 'add' && !document.getElementById('editId').value) {
            document.getElementById('formTitle').innerText = "새 앨범 등록";
            document.getElementById('saveBtn').innerText = "컬렉션에 저장";
            document.getElementById('cancelBtn').style.display = "none";
        }
        window.scrollTo(0,0);
    }

    // 페이지 로드 시 자동 로그인 확인
    window.onload = () => { if(sessionStorage.getItem('vinyl_auth') === 'true') startApp(); };
</script>
</body>
</html>
