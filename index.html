<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
        
        /* 네비게이션 & 정렬바 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid var(--border); padding: 0 15px; }
        .nav-left, .nav-right { display: flex; gap: 5px; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px; }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view-toggle { font-size: 18px !important; opacity: 0.5; cursor: pointer; }
        .view-toggle.active { opacity: 1; color: var(--accent); }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 6px; overflow-x: auto; z-index: 90; border-bottom: 1px solid #222; scrollbar-width: none; }
        .sort-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 12px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        /* --- 그리드 보기 --- */
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 리스트 보기 (모바일 날짜 표시 수정) --- */
        .lp-list { display: flex; flex-direction: column; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .list-header { background: #111; padding: 12px 15px; display: grid; grid-template-columns: 60px 2fr 1.5fr 1fr 1fr; gap: 15px; font-size: 12px; color: var(--dim); font-weight: bold; border-bottom: 1px solid var(--border); }
        .list-item { padding: 12px 15px; display: grid; grid-template-columns: 60px 2fr 1.5fr 1fr 1fr; gap: 15px; align-items: center; cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s; }
        .list-item:hover { background: #252525; }
        .list-img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .list-title { color: #fff; font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-artist { color: #bbb; font-size: 14px; }
        .list-date { color: var(--dim); font-size: 13px; }

        /* 모바일 리스트 반응형 (날짜 2개 강제 표시) */
        @media (max-width: 768px) {
            .list-header { display: none; }
            .list-item { 
                grid-template-columns: 60px 1fr auto; 
                grid-template-rows: auto auto; 
                gap: 5px 15px; 
                padding: 12px; 
            }
            .list-img { grid-row: 1 / 3; width: 60px; height: 60px; }
            .list-title { grid-column: 2; font-size: 15px; margin-bottom: -2px; }
            .list-artist { grid-column: 2; color: var(--accent); font-size: 13px; }
            
            /* 날짜 영역: 우측에 위아래로 배치 */
            .list-date-group {
                grid-column: 3;
                grid-row: 1 / 3;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-end;
                gap: 4px;
                min-width: 85px;
            }
            .list-date { 
                display: block; 
                font-size: 11px; 
                text-align: right;
                color: #888;
            }
            .list-date::before { 
                content: attr(data-label); 
                font-size: 9px; 
                margin-right: 4px; 
                opacity: 0.6;
                text-transform: uppercase;
            }
            /* 기존 PC용 날짜 칸은 숨김 */
            .list-item > .list-date { display: none; }
        }

        /* --- 상세 페이지 모달 --- */
        #detail { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; overflow-y: auto; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 1100; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #444; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); }

        .d-container { display: flex; min-height: 100vh; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; height: 100vh; padding: 40px; }
        .d-img-side img { max-width: 100%; max-height: 90%; object-fit: contain; }
        .d-info-side { flex: 0 0 50%; padding: 60px; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; }

        @media (max-width: 900px) {
            .d-container { flex-direction: column; }
            .d-img-side { flex: none; height: 50vh; position: relative; padding: 30px; }
            .d-info-side { flex: none; padding: 30px 20px 60px; }
        }

        .dt-country { padding: 4px 10px; background: var(--accent); color: #000; border-radius: 4px; font-size: 12px; font-weight: bold; width: fit-content; margin-bottom: 15px; }
        .dt-title { font-size: 28px; font-weight: 800; color: #fff; margin: 0; }
        .dt-artist { font-size: 18px; color: var(--dim); margin: 8px 0 25px; }
        .dt-val { font-size: 19px; font-weight: bold; color: var(--accent); }
        .dt-date-row { font-size: 15px; margin-bottom: 6px; color: #eee; display: flex; }
        .dt-date-label { color: var(--dim); width: 90px; font-size: 13px; }
        .dt-memo { font-size: 15px; line-height: 1.7; color: #ccc; background: #151515; padding: 20px; border-radius: 10px; border-left: 4px solid var(--accent); white-space: pre-wrap; }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="loginView">
    <div style="text-align: center; padding-top: 25vh;">
        <h1 style="color:#fff; letter-spacing:5px; font-size: 18px; margin-bottom:30px;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="text-align:center; padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:10px; width:240px;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left">
            <button onclick="go('list')" id="nav-list" class="active">VIEW</button>
            <button onclick="go('add')" id="nav-add">ADD</button>
        </div>
        <div class="nav-right">
            <button onclick="switchView('grid')" id="btn-grid" class="view-toggle">▦</button>
            <button onclick="switchView('list')" id="btn-list" class="view-toggle">▤</button>
            <button onclick="go('set')" id="nav-set" style="font-size:18px;">⚙</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <button class="sort-btn active" onclick="sortData('id')">등록순</button>
        <button class="sort-btn" onclick="sortData('artist')">가수순</button>
        <button class="sort-btn" onclick="sortData('release_date')">발매일순</button>
        <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라: All</button>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="list-view" class="lp-list" style="display:none;"></div>
        </section>

        <section id="add">
            <h2 id="formTitle">새 앨범 등록</h2>
            <input type="hidden" id="editId">
            <div style="display:flex; flex-direction:column; gap:12px;">
                <input type="file" id="file" accept="image/*" style="padding:10px; background:#1a1a1a; border:1px solid #333; color:#fff;">
                <input type="text" id="t" placeholder="앨범 제목" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                <input type="text" id="a" placeholder="아티스트명" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                <select id="country" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                    <option value="한국">한국 (₩)</option><option value="일본">일본 (¥)</option><option value="미국">미국 ($)</option><option value="기타">기타</option>
                </select>
                <input type="number" id="ex_rate" step="0.01" placeholder="환율 (예: 9.1)" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="number" id="lp_raw" placeholder="출고가" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                    <input type="number" id="pp_raw" placeholder="구매가" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label style="font-size:11px; color:#666;">발매일</label><input type="date" id="rd" style="width:100%; padding:12px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                    <div><label style="font-size:11px; color:#666;">구매일</label><input type="date" id="pd" style="width:100%; padding:12px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;"></div>
                </div>
                <textarea id="m" rows="4" placeholder="메모" style="padding:15px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px;"></textarea>
                <button onclick="save()" id="saveBtn" style="padding:18px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold;">저장</button>
            </div>
        </section>

        <section id="set">
            <button onclick="logout()" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:10px;">로그아웃</button>
        </section>
    </main>
</div>

<div id="detail">
    <div class="back-btn" onclick="closeD()">←</div>
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <div id="dc" class="dt-country"></div>
            <h1 id="dt" class="dt-title"></h1>
            <p id="da" class="dt-artist"></p>
            <div style="border-bottom:1px solid #222; padding-bottom:15px; margin-bottom:15px;">
                <div style="margin-bottom:8px;"><span style="font-size:11px; color:#666;">LIST PRICE</span><br><span id="dlp" class="dt-val"></span></div>
                <div><span style="font-size:11px; color:#666;">PURCHASE PRICE</span><br><span id="dpp" class="dt-val"></span></div>
            </div>
            <div style="margin-bottom:20px;">
                <div class="dt-date-row"><span class="dt-date-label">발매일</span><span id="drd"></span></div>
                <div class="dt-date-row"><span class="dt-date-label">구매일</span><span id="dpd"></span></div>
            </div>
            <div id="dm" class="dt-memo"></div>
            <div style="display:flex; gap:10px; margin-top:30px;">
                <button class="action-btn" id="editActionBtn" style="flex:1; padding:15px; background:#222; color:#fff; border:1px solid #444; border-radius:10px;">수정</button>
                <button class="action-btn" id="delBtn" style="flex:1; padding:15px; background:transparent; color:#ff5555; border:1px solid #ff5555; border-radius:10px;">삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ [필수] 본인의 Google Web App URL과 비밀번호를 입력하세요.
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx-t0O5X-mApH5mu_XMRzU2lwF1KtTrnr6NPNLxh1GiLofgMH_C0zk38mC1TGnwQiq8/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All';
    let currentView = localStorage.getItem('vinyl_view') || 'grid';

    function doLogin() {
        if(document.getElementById('pw').value === MY_PASSWORD) {
            sessionStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else alert('비번 틀림');
    }
    function logout() { sessionStorage.removeItem('vinyl_auth'); location.reload(); }

    function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        switchView(currentView);
        loadData();
    }

    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(WEB_APP_URL);
            items = await res.json();
            items.forEach(i => {
                if(i.release_date) i.release_date = String(i.release_date).split('T')[0];
                if(i.purchase_date) i.purchase_date = String(i.purchase_date).split('T')[0];
            });
            sortData('id');
        } catch(e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function switchView(type) {
        currentView = type;
        localStorage.setItem('vinyl_view', type);
        document.querySelectorAll('.view-toggle').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        document.getElementById('grid-view').style.display = (type === 'grid' ? 'grid' : 'none');
        document.getElementById('list-view').style.display = (type === 'list' ? 'flex' : 'none');
        render();
    }

    function sortData(key) {
        items.sort((a, b) => {
            if(key === 'artist') return String(a.artist).localeCompare(String(b.artist));
            return (b[key] || 0) > (a[key] || 0) ? 1 : -1;
        });
        render();
    }

    function render() {
        const filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        
        // 그리드 렌더링
        document.getElementById('grid-view').innerHTML = filtered.map(i => `
            <div class="lp-item" onclick="openD('${i.id}')"><img src="${i.image}" loading="lazy"></div>
        `).join('');

        // 리스트 렌더링 (모바일 날짜 표시용 list-date-group 추가)
        document.getElementById('list-view').innerHTML = `
            <div class="list-header"><div>Cover</div><div>Album</div><div>Artist</div><div>Released</div><div>Purchased</div></div>
            ${filtered.map(i => `
                <div class="list-item" onclick="openD('${i.id}')">
                    <img src="${i.image}" class="list-img">
                    <div class="list-title">${i.title}</div>
                    <div class="list-artist">${i.artist || '-'}</div>
                    <div class="list-date">${i.release_date || '-'}</div>
                    <div class="list-date">${i.purchase_date || '-'}</div>
                    <div class="list-date-group">
                        <span class="list-date" data-label="Rel.">${i.release_date || '-'}</span>
                        <span class="list-date" data-label="Pur.">${i.purchase_date || '-'}</span>
                    </div>
                </div>
            `).join('')}
        `;
    }

    function openD(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist;
        document.getElementById('dc').innerText = i.country;
        document.getElementById('dlp').innerText = i.list_price_display;
        document.getElementById('dpp').innerText = i.purchase_price_display;
        document.getElementById('drd').innerText = i.release_date || '-';
        document.getElementById('dpd').innerText = i.purchase_date || '-';
        document.getElementById('dm').innerText = i.memo || '';
        document.getElementById('detail').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        document.getElementById('editActionBtn').onclick = () => startEdit(i.id);
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; document.body.style.overflow = 'auto'; }

    async function save() {
        const editId = document.getElementById('editId').value;
        document.getElementById('loader').style.display = 'flex';
        const fileInput = document.getElementById('file');
        let imageData = "";
        if (fileInput.files.length > 0) {
            imageData = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(e.target.result);
                r.readAsDataURL(fileInput.files[0]);
            });
        }
        const payload = {
            action: editId ? 'edit' : 'add', id: editId || Date.now(),
            title: document.getElementById('t').value, artist: document.getElementById('a').value,
            list_price: document.getElementById('lp_raw').value, purchase_price: document.getElementById('pp_raw').value,
            release_date: document.getElementById('rd').value, purchase_date: document.getElementById('pd').value,
            memo: document.getElementById('m').value, image: imageData,
            country: document.getElementById('country').value, ex_rate: document.getElementById('ex_rate').value
        };
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function startEdit(id) {
        const i = items.find(x => x.id == id);
        closeD(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('t').value = i.title;
        document.getElementById('a').value = i.artist;
        document.getElementById('lp_raw').value = i.list_price;
        document.getElementById('pp_raw').value = i.purchase_price;
        document.getElementById('rd').value = i.release_date;
        document.getElementById('pd').value = i.purchase_date;
        document.getElementById('m').value = i.memo;
        document.getElementById('country').value = i.country;
        document.getElementById('ex_rate').value = i.ex_rate;
        document.getElementById('formTitle').innerText = "앨범 수정하기";
    }

    async function deleteItem(id) {
        if(!confirm('정말 삭제?')) return;
        document.getElementById('loader').style.display = 'flex';
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
        location.reload();
    }

    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sortBar').style.display = (id === 'list' ? 'flex' : 'none');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(id === 'list') document.getElementById('nav-list').classList.add('active');
        if(id === 'add') document.getElementById('nav-add').classList.add('active');
    }

    window.onload = () => { if(sessionStorage.getItem('vinyl_auth') === 'true') startApp(); };
</script>
</body>
</html>
