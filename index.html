<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid var(--border); padding: 0 15px; }
        .nav-left, .nav-right { display: flex; gap: 5px; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px; transition: 0.2s; }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view-toggle { font-size: 18px !important; opacity: 0.4; cursor: pointer; }
        .view-toggle.active { opacity: 1; color: var(--accent); }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; align-items: center; gap: 6px; z-index: 90; border-bottom: 1px solid #222; }
        .sort-inner { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .sort-inner::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 12px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }
        .total-count { font-size: 11px; color: var(--accent); font-weight: bold; padding-left: 10px; white-space: nowrap; border-left: 1px solid #333; margin-left: 5px; }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }
        .is-dimmed { opacity: 0.4 !important; filter: grayscale(0.7); }

        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Form styling */
        .batch-box { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 2px dashed #333; margin-bottom: 30px; text-align: center; }
        .batch-box label { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        
        input, select, textarea { width: 100%; padding: 14px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 10px; font-size: 14px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .currency-select { width: 85px !important; flex-shrink: 0; }
        .check-container { display: flex; align-items: center; gap: 10px; background: #151515; padding: 14px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; }
        .check-container input { width: auto; margin: 0; }
        
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: var(--accent); font-size: 14px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Detail View */
        #detail { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; overflow-y: auto; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 1100; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #444; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .d-container { display: flex; min-height: 100vh; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; height: 100vh; padding: 40px; }
        .d-img-side img { max-width: 100%; max-height: 90%; object-fit: contain; }
        .d-info-side { flex: 0 0 50%; padding: 60px; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 900px) { .d-container { flex-direction: column; } .d-img-side { flex: none; height: 45vh; position: relative; padding: 20px; } .d-info-side { flex: none; padding: 30px 20px 60px; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="loadMsg">Processing...</div></div>

<div id="loginView">
    <div style="text-align: center; padding-top: 30vh;">
        <h1 style="color:#fff; letter-spacing:8px; font-size: 16px; margin-bottom:30px; opacity:0.8;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="width:220px; text-align:center;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left"><button onclick="go('list')" id="nav-list" class="active">VIEW</button><button onclick="go('add')" id="nav-add">ADD</button></div>
        <div class="nav-right">
            <button onclick="switchView('grid')" id="btn-grid" class="view-toggle">▦</button>
            <button onclick="go('set')" style="font-size:18px;">⚙</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <div class="sort-inner">
            <button class="sort-btn active" onclick="sortData('id')">최신순</button>
            <button class="sort-btn" onclick="sortData('artist')">가수순</button>
            <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라: All</button>
            <button id="statusBtn" class="sort-btn" onclick="filterStatus()">상태: All</button>
        </div>
        <div id="totalLabel" class="total-count">Total: 0</div>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
        </section>

        <section id="add">
            <div class="batch-box">
                <label>🚀 사진 여러 장 한꺼번에 올리기 (최대 10장)</label>
                <input type="file" id="batchFiles" accept="image/*" multiple onchange="batchUpload(this)" style="background:transparent; border:none; padding:0;">
                <p style="font-size:11px; color:#666; margin-top:10px;">사진만 먼저 털어넣고 나중에 하나씩 수정할 수 있습니다.</p>
            </div>

            <hr style="border:0; border-top:1px solid #333; margin:40px 0;">

            <h2 id="formTitle" style="font-size:18px; margin-bottom:20px;">개별 등록/수정</h2>
            <input type="hidden" id="editId">
            <label class="check-container"><input type="checkbox" id="owned" checked><span>현재 보유 중</span></label>
            <label>Cover Image (Auto Compress)</label>
            <input type="file" id="file" accept="image/*">
            <input type="text" id="t" placeholder="Album Title">
            <input type="text" id="a" placeholder="Artist">
            <label>제조국</label>
            <select id="country"><option value="한국">한국</option><option value="일본">일본</option><option value="미국">미국</option><option value="유럽">유럽</option><option value="기타">기타</option></select>
            <label>출고가 / 구매가</label>
            <div class="form-row">
                <select id="l_curr" class="currency-select"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="lp_raw" placeholder="List Price">
            </div>
            <div class="form-row">
                <select id="p_curr" class="currency-select"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="pp_raw" placeholder="Purchase Price">
            </div>
            <label>환율</label><input type="number" id="ex_rate" step="0.01" value="1.00">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div><label>발매일</label><input type="date" id="rd"></div>
                <div><label>구매일</label><input type="date" id="pd"></div>
            </div>
            <textarea id="m" rows="5" placeholder="Memo..."></textarea>
            <button onclick="save()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold;">SAVE VINYL</button>
        </section>

        <section id="set"><button onclick="logout()" style="width:100%; padding:15px; background:#222; color:#fff; border:none; border-radius:8px;">Logout</button></section>
    </main>
</div>

<div id="detail">
    <div class="back-btn" onclick="closeD()">←</div>
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <div style="display:flex; gap:10px; margin-bottom:12px;"><div id="dc" style="background:var(--accent); color:#000; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:bold;"></div><div id="ds" style="background:#444; color:#fff; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:bold;"></div></div>
            <h1 id="dt" style="font-size:28px; margin:0;"></h1>
            <p id="da" style="font-size:18px; color:var(--dim); margin:8px 0 25px;"></p>
            <div id="dm" style="background:#151515; padding:20px; border-radius:10px; border-left:3px solid var(--accent); white-space:pre-wrap; margin-bottom:20px;"></div>
            <div style="display:flex; gap:10px;"><button onclick="startEdit()" style="flex:1; padding:15px; background:#222; color:#fff; border:1px solid #333; border-radius:8px;">EDIT</button><button id="delBtn" style="flex:1; padding:15px; background:transparent; color:#ff5555; border:1px solid #ff5555; border-radius:8px;">DELETE</button></div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwZ_E9d7j8DPG50vMhFDW6q8GMi86n1B4BmBuX1T5SXrJeyEeI7ZBhvp7WN24dbrdoH/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All', currentStatus = 'All';

    function doLogin() { if(document.getElementById('pw').value === MY_PASSWORD) { sessionStorage.setItem('vinyl_auth', 'true'); startApp(); } else alert('No'); }
    function logout() { sessionStorage.removeItem('vinyl_auth'); location.reload(); }
    function startApp() { document.getElementById('loginView').style.display = 'none'; document.getElementById('app').style.display = 'block'; loadData(); }

    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try { const res = await fetch(WEB_APP_URL); items = await res.json(); sortData('id'); } catch(e){}
        document.getElementById('loader').style.display = 'none';
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const max = 600;
                    if (width > height) { if (width > max) { height *= max / width; width = max; } } 
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
            };
        });
    }

    // 🚀 일괄 업로드 핵심 함수
    async function batchUpload(input) {
        if (!input.files.length) return;
        const files = Array.from(input.files);
        if (files.length > 10) { alert("한 번에 최대 10장까지만 가능합니다."); return; }

        document.getElementById('loader').style.display = 'flex';
        let count = 0;

        for (let file of files) {
            count++;
            document.getElementById('loadMsg').innerText = `Uploading (${count}/${files.length})...`;
            const compressed = await compressImage(file);
            const payload = {
                action: 'add', id: Date.now() + Math.random(), owned: true,
                title: "정보 입력 필요: " + file.name.split('.')[0],
                artist: "-", country: "기타", l_curr: "₩", list_price: 0, p_curr: "₩", purchase_price: 0,
                release_date: "", purchase_date: "", memo: "사진 선업로드 항목입니다.",
                image: compressed, ex_rate: 1.00
            };
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        }
        location.reload();
    }

    function sortData(key) {
        items.sort((a, b) => {
            if (key === 'artist') return (a.artist || 'ZZZ').localeCompare(b.artist || 'ZZZ');
            return (b[key] || '') > (a[key] || '') ? 1 : -1;
        });
        render();
    }

    function filterCountry() {
        const countries = ['All', '한국', '일본', '미국', '유럽', '기타'];
        currentFilter = countries[(countries.indexOf(currentFilter) + 1) % countries.length];
        document.getElementById('filterBtn').innerText = `나라: ${currentFilter}`;
        render();
    }

    function filterStatus() {
        const statuses = ['All', '보유', '미보유'];
        currentStatus = statuses[(statuses.indexOf(currentStatus) + 1) % statuses.length];
        document.getElementById('statusBtn').innerText = `상태: ${currentStatus}`;
        render();
    }

    function render() {
        let filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        if(currentStatus === '보유') filtered = filtered.filter(i => i.owned === true || i.owned === "true");
        if(currentStatus === '미보유') filtered = filtered.filter(i => i.owned === false || i.owned === "false");

        document.getElementById('totalLabel').innerText = `Total: ${filtered.length}`;
        document.getElementById('grid-view').innerHTML = filtered.map(i => {
            const isUnreleased = i.release_date && i.release_date > new Date().toISOString().split('T')[0];
            const isNotOwned = i.owned === false || i.owned === "false";
            const dim = (isUnreleased || isNotOwned) ? 'is-dimmed' : '';
            return `<div class="lp-item ${dim}" onclick="openD('${i.id}')"><img src="${i.image}" loading="lazy"></div>`;
        }).join('');
    }

    let activeId = null;
    function openD(id) {
        activeId = id; const i = items.find(x => x.id == id);
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist;
        document.getElementById('dc').innerText = i.country;
        document.getElementById('ds').innerText = (i.owned === true || i.owned === "true") ? "보유 중" : "미보유 / 미발매";
        document.getElementById('dm').innerText = i.memo || "";
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; }

    async function save() {
        const editId = document.getElementById('editId').value;
        document.getElementById('loader').style.display = 'flex';
        const fileInput = document.getElementById('file');
        let imageData = "";
        if (fileInput.files.length > 0) imageData = await compressImage(fileInput.files[0]);
        else if (editId) imageData = items.find(x => x.id == editId).image;

        const payload = {
            action: editId ? 'edit' : 'add', id: editId || Date.now(),
            owned: document.getElementById('owned').checked,
            title: document.getElementById('t').value, artist: document.getElementById('a').value,
            country: document.getElementById('country').value,
            l_curr: document.getElementById('l_curr').value, list_price: document.getElementById('lp_raw').value,
            p_curr: document.getElementById('p_curr').value, purchase_price: document.getElementById('pp_raw').value,
            release_date: document.getElementById('rd').value, purchase_date: document.getElementById('pd').value,
            memo: document.getElementById('m').value, image: imageData, ex_rate: document.getElementById('ex_rate').value
        };
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function startEdit() {
        const i = items.find(x => x.id == activeId);
        closeD(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('owned').checked = (i.owned === true || i.owned === "true");
        document.getElementById('t').value = i.title; document.getElementById('a').value = i.artist;
        document.getElementById('country').value = i.country;
        document.getElementById('lp_raw').value = i.list_price; document.getElementById('pp_raw').value = i.purchase_price;
        document.getElementById('m').value = i.memo;
    }

    async function deleteItem(id) { if(confirm('Delete?')) { document.getElementById('loader').style.display = 'flex'; await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) }); location.reload(); } }

    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(id === 'list') document.getElementById('nav-list').classList.add('active');
        if(id === 'add') document.getElementById('nav-add').classList.add('active');
    }
</script>
</body>
</html>
