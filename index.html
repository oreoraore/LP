<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; --danger: #ff5555; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", "Hiragino Kaku Gothic ProN", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; transition: 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Layout & Transitions */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border); padding: 0 15px; }
        section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; padding: 130px 15px 40px; max-width: 1200px; margin: 0 auto; }
        section.active { display: block; opacity: 1; transform: translateY(0); }

        /* Buttons & Sorting */
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; padding: 10px; transition: 0.2s; }
        nav button.active { color: var(--accent); }
        .view-btn { font-size: 22px !important; color: var(--dim); vertical-align: middle; }
        .view-btn.active { color: var(--accent); }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; align-items: center; gap: 8px; z-index: 900; border-bottom: 1px solid #222; }
        .sort-inner { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; -ms-overflow-style: none; }
        .sort-inner::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(187,134,252,0.1); font-weight: bold; }
        .total-count { font-size: 12px; color: var(--accent); font-weight: bold; margin-left: 10px; white-space: nowrap; border-left: 1px solid #333; padding-left: 10px; }

        /* Viewer: Grid (Mobile 3 columns) */
        .lp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 768px) { .lp-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; } }
        .lp-item { position: relative; aspect-ratio: 1/1; background: #000; border-radius: 6px; overflow: hidden; transition: 0.3s; border: 3px solid transparent; cursor: pointer; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); transform: scale(0.93); box-shadow: 0 0 15px rgba(187,134,252,0.4); }
        
        /* Bright Transparency (미보유/미발매) */
        .is-dimmed { opacity: 0.4; filter: brightness(1.7) grayscale(0.2); }

        /* Viewer: Table */
        .table-container { overflow-x: auto; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #222; color: var(--dim); font-size: 11px; text-transform: uppercase; }
        .t-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; background: #000; }
        .col-no { width: 45px; text-align: center; color: var(--accent); font-weight: bold; }

        /* Form & Batch Upload */
        input, select, textarea { width: 100%; padding: 12px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 12px; font-size: 14px; }
        .price-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .batch-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin: 15px 0; border: 1px dashed #444; padding: 10px; border-radius: 8px; }
        .batch-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .batch-thumb.active { border-color: var(--accent); }

        /* Detail View (50:50 Ratio) */
        #detail { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; overflow-y: auto; }
        .d-container { display: flex; min-height: 100vh; }
        .d-img-side { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 40px; position: sticky; top: 0; height: 100vh; }
        .d-img-side img { max-width: 100%; max-height: 90%; object-fit: contain; }
        .d-info-side { flex: 5; padding: 60px; background: var(--bg); display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 900px) { 
            .d-container { flex-direction: column; } 
            .d-img-side { height: 50vh; position: relative; padding: 20px; } 
            .d-info-side { padding: 40px 20px; flex: none; } 
        }

        /* Modal / Loader */
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #batchBar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 2000; font-weight: bold; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p id="loadMsg" style="color:var(--accent); margin-top:12px; font-weight:bold;">처리 중...</p></div>

<div id="loginView" style="display: none; text-align: center; padding-top: 38vh;">
    <h1 style="letter-spacing: 10px; font-size: 18px; color: var(--accent); margin-bottom: 30px;">VINYL ARCHIVE</h1>
    <input type="password" id="pw" style="width: 220px; text-align: center;" placeholder="PASSWORD" onkeyup="if(event.keyCode==13)doLogin()">
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left">
            <button onclick="go('list')" id="nav-list" class="active">LIST</button>
            <button onclick="go('add')" id="nav-add">ADD</button>
        </div>
        <div class="nav-right">
            <button id="btnGrid" onclick="changeView('grid')" class="view-btn active">▦</button>
            <button id="btnTable" onclick="changeView('table')" class="view-btn">≡</button>
            <button id="editModeBtn" onclick="toggleEditMode()" style="color:var(--accent); margin-left:10px; font-size:13px;">편집</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <div class="sort-inner">
            <button id="sort-id" class="sort-btn active" onclick="sortData('id')">등록순 ↓</button>
            <button id="sort-title" class="sort-btn" onclick="sortData('title')">앨범명</button>
            <button id="sort-artist" class="sort-btn" onclick="sortData('artist')">가수명</button>
            <button id="sort-release_date" class="sort-btn" onclick="sortData('release_date')">발매일순</button>
            <button id="sort-purchase_date" class="sort-btn" onclick="sortData('purchase_date')">구매일순</button>
            <button id="sort-list_price" class="sort-btn" onclick="sortData('list_price')">가격순</button>
            <button id="sort-country" class="sort-btn" onclick="sortData('country')">나라순</button>
            <button id="filter-country" class="sort-btn" onclick="filterCountry()">국가: 전체</button>
            <button id="filter-status" class="sort-btn" onclick="filterStatus()">상태: 전체</button>
        </div>
        <div id="totalLabel" class="total-count">TOTAL 0</div>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="table-view" class="table-container" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th class="col-no">No</th>
                            <th>사진</th>
                            <th>앨범명</th>
                            <th>가수명</th>
                            <th>발매일</th>
                            <th>구매일</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add">
            <h2 id="formTitle" style="margin-top:0;">REGISTER VINYL</h2>
            <input type="hidden" id="editId">
            
            <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px; background:#1a1a1a; padding:15px; border-radius:8px;">
                <input type="checkbox" id="owned" checked style="width:auto; margin:0;"> <span>현재 보유 중</span>
            </label>

            <p style="font-size:12px; color:var(--dim); margin-bottom:5px;">사진 업로드 (여러 장 선택 시 일괄 등록 가능)</p>
            <input type="file" id="file" accept="image/*" multiple onchange="handleFiles(this)">
            <div id="batchArea" class="batch-preview" style="display:none;"></div>

            <input type="text" id="t" placeholder="앨범명">
            <input type="text" id="a" placeholder="가수명">
            <select id="country">
                <option value="한국">한국</option>
                <option value="일본">일본</option>
                <option value="미국">미국</option>
                <option value="유럽">유럽</option>
                <option value="기타">기타</option>
            </select>
            
            <div class="price-row">
                <select id="l_curr" style="margin:0;"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="lp_raw" placeholder="정가(출고가)" style="margin:0;">
                <input type="number" id="l_ex" placeholder="환율" value="1" style="margin:0;">
            </div>
            <div class="price-row">
                <select id="p_curr" style="margin:0;"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="pp_raw" placeholder="구매가" style="margin:0;">
                <input type="number" id="p_ex" placeholder="환율" value="1" style="margin:0;">
            </div>

            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">발매일</label><input type="date" id="rd"></div>
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">구매일</label><input type="date" id="pd"></div>
            </div>
            <textarea id="m" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" id="saveBtn" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; font-size:16px;">SAVE ARCHIVE</button>
        </section>
    </main>
</div>

<div id="batchBar">
    <span id="batchCount">0개 선택됨</span>
    <div>
        <button onclick="toggleEditMode()" style="background:none; border:1px solid #000; padding:8px 15px; border-radius:6px; margin-right:10px;">취소</button>
        <button onclick="batchDelete()" style="background:#000; color:#fff; border:none; padding:8px 20px; border-radius:6px;">일괄 삭제</button>
    </div>
</div>

<div id="detail">
    <button onclick="closeD()" style="position:fixed; top:25px; left:25px; z-index:3500; background:rgba(0,0,0,0.6); color:#fff; border:1px solid #444; width:45px; height:45px; border-radius:50%; font-size:24px; cursor:pointer;">✕</button>
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <span id="dc" style="background:var(--accent); color:#000; padding:4px 12px; border-radius:6px; font-size:12px; font-weight:bold;"></span>
                <span id="ds" style="background:#333; padding:4px 12px; border-radius:6px; font-size:12px;"></span>
            </div>
            <h1 id="dt" style="font-size:36px; margin:0; line-height:1.2;"></h1>
            <h2 id="da" style="font-size:22px; color:var(--dim); margin:10px 0 40px; font-weight:normal;"></h2>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px; border-top:1px solid #333; padding-top:30px;">
                <div><label style="color:var(--dim); font-size:12px;">발매일</label><p id="drd" style="margin:5px 0; font-size:15px;"></p></div>
                <div><label style="color:var(--dim); font-size:12px;">구매일</label><p id="dpd" style="margin:5px 0; font-size:15px;"></p></div>
                <div><label style="color:var(--dim); font-size:12px;">정가 (출고가)</label><p id="dlp" style="margin:5px 0; color:var(--accent); font-weight:bold; font-size:15px;"></p></div>
                <div><label style="color:var(--dim); font-size:12px;">실구매가</label><p id="dpp" style="margin:5px 0; color:var(--accent); font-weight:bold; font-size:15px;"></p></div>
            </div>
            
            <div style="margin:40px 0; background:#151515; padding:20px; border-radius:10px; border-left:4px solid var(--accent); white-space:pre-wrap; font-size:14px; line-height:1.6;" id="dm"></div>
            
            <div style="display:flex; gap:12px; margin-top:auto;">
                <button onclick="startEdit()" style="flex:1; padding:18px; background:#222; color:#fff; border:1px solid #444; border-radius:10px; font-weight:bold;">EDIT</button>
                <button id="delBtn" style="flex:1; padding:18px; background:none; color:var(--danger); border:1px solid var(--danger); border-radius:10px; font-weight:bold;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwjp9soR-s225GM7FGr_Dw9ld7-8tfxng2MhOYESQ1a9VwucZyX3svFd0zBE3NOQeqS/exec'; 
    const PASSWORD = '142857';

    let items = [], selectedIds = [], isEditMode = false;
    let currentView = 'grid', currentSort = 'id', isAsc = false;
    let filterC = 'All', filterS = 'All';
    let tempImages = []; // 일괄 업로드용 임시 저장

    window.onload = () => {
        if(localStorage.getItem('vinyl_auth') === 'true') startApp();
        else document.getElementById('loginView').style.display = 'block';
    };

    function doLogin() {
        if(document.getElementById('pw').value === PASSWORD) {
            localStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else alert('비밀번호가 올바르지 않습니다.');
    }

    async function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await loadData();
    }

    async function loadData() {
        showLoader('데이터 로딩 중...');
        try {
            const res = await fetch(WEB_APP_URL);
            items = await res.json();
            sortData('id'); // 기본 정렬: 등록순
        } catch(e) { console.error(e); }
        hideLoader();
    }

    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(id === 'list') {
            document.getElementById('nav-list').classList.add('active');
            render();
        } else {
            document.getElementById('nav-add').classList.add('active');
            if(id === 'add') resetForm();
        }
    }

    // 일괄 업로드 처리
    async function handleFiles(input) {
        if(!input.files.length) return;
        showLoader('이미지 압축 및 처리 중...');
        const area = document.getElementById('batchArea');
        area.innerHTML = "";
        area.style.display = "grid";
        tempImages = [];

        for(let file of input.files) {
            const base64 = await processImg(file);
            tempImages.push(base64);
            const img = document.createElement('img');
            img.src = base64;
            img.className = 'batch-thumb';
            img.onclick = function() {
                document.querySelectorAll('.batch-thumb').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                window.currentTempImg = base64;
            };
            area.appendChild(img);
        }
        if(tempImages.length > 0) {
            area.firstChild.classList.add('active');
            window.currentTempImg = tempImages[0];
        }
        hideLoader();
    }

    async function processImg(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    canvas.width = 600; canvas.height = 600;
                    const ctx = canvas.getContext('2d');
                    // 1:1 Center Crop
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 600, 600);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // 정렬 알고리즘
    function sortData(key) {
        if(currentSort === key) isAsc = !isAsc;
        else {
            currentSort = key;
            // 이름이나 날짜는 기본 오름차순, 나머지는 내림차순
            isAsc = ['title', 'artist', 'release_date', 'purchase_date'].includes(key);
        }
        
        const collator = new Intl.Collator(['ko', 'ja', 'en'], { sensitivity: 'base', numeric: true });

        items.sort((a, b) => {
            let vA = a[key], vB = b[key];
            
            // 가격 정렬: 환산된 KRW 기준
            if(key === 'list_price') {
                vA = Number(a.list_price || 0) * (a.l_curr === '₩' ? 1 : Number(a.l_ex || 1));
                vB = Number(b.list_price || 0) * (b.l_curr === '₩' ? 1 : Number(b.l_ex || 1));
            }
            // 나라 정렬: 한국 -> 일본 -> 기타
            else if(key === 'country') {
                const p = {"한국":1, "일본":2};
                vA = p[vA] || 3; vB = p[vB] || 3;
            }
            // 문자열 정렬 (일어 발음 포함)
            else if(typeof vA === 'string') {
                return isAsc ? collator.compare(vA, vB) : collator.compare(vB, vA);
            }

            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sort-'+key)?.classList.add('active');
        render();
    }

    function render() {
        const today = new Date(); today.setHours(0,0,0,0);
        let f = items.filter(i => (filterC==='All' || i.country === filterC));
        if(filterS !== 'All') f = f.filter(i => String(i.owned) === (filterS === '보유' ? 'true' : 'false'));
        
        document.getElementById('totalLabel').innerText = `TOTAL ${f.length}`;

        if(currentView === 'grid') {
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const future = i.release_date && new Date(i.release_date) > today;
                const dim = (String(i.owned) === 'false' || future) ? 'is-dimmed' : '';
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="handleClick('${i.id}')"><img src="${i.image}" loading="lazy"></div>`;
            }).join('');
        } else {
            document.getElementById('table-body').innerHTML = f.map((i, idx) => {
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                return `<tr class="${sel}" onclick="handleClick('${i.id}')">
                    <td class="col-no">${idx + 1}</td>
                    <td><img src="${i.image}" class="t-img"></td>
                    <td style="font-weight:bold;">${i.title || '-'}</td>
                    <td>${i.artist || '-'}</td>
                    <td>${(i.release_date||"").slice(0,10) || '-'}</td>
                    <td>${(i.purchase_date||"").slice(0,10) || '-'}</td>
                </tr>`;
            }).join('');
        }
    }

    function handleClick(id) {
        if(isEditMode) {
            if(selectedIds.includes(id)) selectedIds = selectedIds.filter(x => x !== id);
            else selectedIds.push(id);
            document.getElementById('batchCount').innerText = `${selectedIds.length}개 선택됨`;
            render();
        } else openD(id);
    }

    function openD(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title || "Untitled";
        document.getElementById('da').innerText = i.artist || "Unknown Artist";
        document.getElementById('dc').innerText = i.country || "기타";
        document.getElementById('ds').innerText = String(i.owned)==='true' ? "보유 중" : "미보유";
        document.getElementById('drd').innerText = (i.release_date||"").slice(0,10) || "-";
        document.getElementById('dpd').innerText = (i.purchase_date||"").slice(0,10) || "-";
        document.getElementById('dm').innerText = i.memo || "";
        
        const priceFmt = (v, c, e) => {
            if(!v) return "미기입";
            const val = Number(v).toLocaleString();
            if(c === '₩') return `₩ ${val}`;
            const krw = Math.round(Number(v) * Number(e||1)).toLocaleString();
            return `${c} ${val} (약 ₩ ${krw})`;
        };
        document.getElementById('dlp').innerText = priceFmt(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('dpp').innerText = priceFmt(i.purchase_price, i.p_curr, i.p_ex);

        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        window.activeId = id;
    }

    async function save() {
        const id = document.getElementById('editId').value;
        const fileInput = document.getElementById('file');
        
        // 업로드할 이미지가 하나도 없는 경우 방지
        let img = id ? items.find(x => x.id == id).image : window.currentTempImg;
        if(!img && !id) { alert('사진을 업로드해주세요.'); return; }

        showLoader('저장 중...');
        const data = {
            action: id ? 'edit' : 'add',
            id: id || Date.now(),
            owned: document.getElementById('owned').checked,
            title: document.getElementById('t').value,
            artist: document.getElementById('a').value,
            country: document.getElementById('country').value,
            l_curr: document.getElementById('l_curr').value,
            l_ex: document.getElementById('l_ex').value || 1,
            p_curr: document.getElementById('p_curr').value,
            p_ex: document.getElementById('p_ex').value || 1,
            list_price: document.getElementById('lp_raw').value,
            purchase_price: document.getElementById('pp_raw').value,
            release_date: document.getElementById('rd').value,
            purchase_date: document.getElementById('pd').value,
            memo: document.getElementById('m').value,
            image: img
        };

        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
        
        // 일괄 등록 시 처리: 남은 사진이 있으면 목록에서 제거, 없으면 새로고침
        if(!id && tempImages.length > 1) {
            tempImages = tempImages.filter(x => x !== window.currentTempImg);
            const area = document.getElementById('batchArea');
            area.innerHTML = "";
            tempImages.forEach(src => {
                const imgTag = document.createElement('img');
                imgTag.src = src; imgTag.className = 'batch-thumb';
                imgTag.onclick = function() { 
                    document.querySelectorAll('.batch-thumb').forEach(t=>t.classList.remove('active'));
                    this.classList.add('active'); window.currentTempImg = src;
                };
                area.appendChild(imgTag);
            });
            area.firstChild.classList.add('active');
            window.currentTempImg = tempImages[0];
            resetFormOnlyText();
            hideLoader();
            alert('저장되었습니다. 남은 사진을 계속 등록하세요.');
        } else {
            location.reload();
        }
    }

    // 기본 함수들
    function changeView(v) {
        currentView = v;
        document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
        document.getElementById('btnTable').classList.toggle('active', v === 'table');
        document.getElementById('grid-view').style.display = v === 'grid' ? 'grid' : 'none';
        document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
        render();
    }
    function toggleEditMode() {
        isEditMode = !isEditMode;
        selectedIds = [];
        document.getElementById('editModeBtn').innerText = isEditMode ? "CANCEL" : "편집";
        document.getElementById('batchBar').style.display = isEditMode ? "flex" : "none";
        render();
    }
    async function batchDelete() {
        if(!selectedIds.length || !confirm('선택한 항목을 모두 삭제할까요?')) return;
        showLoader('일괄 삭제 중...');
        for(let id of selectedIds) { await fetch(WEB_APP_URL, { method:'POST', body:JSON.stringify({action:'delete', id}) }); }
        location.reload();
    }
    async function deleteItem(id) {
        if(!confirm('삭제하시겠습니까?')) return;
        showLoader('삭제 중...');
        await fetch(WEB_APP_URL, { method:'POST', body:JSON.stringify({action:'delete', id}) });
        location.reload();
    }
    function startEdit() {
        const i = items.find(x => x.id == window.activeId);
        closeD(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('owned').checked = String(i.owned) === 'true';
        document.getElementById('t').value = i.title || "";
        document.getElementById('a').value = i.artist || "";
        document.getElementById('country').value = i.country || "한국";
        document.getElementById('l_curr').value = i.l_curr || "₩";
        document.getElementById('l_ex').value = i.l_ex || 1;
        document.getElementById('lp_raw').value = i.list_price || "";
        document.getElementById('p_curr').value = i.p_curr || "₩";
        document.getElementById('p_ex').value = i.p_ex || 1;
        document.getElementById('pp_raw').value = i.purchase_price || "";
        document.getElementById('rd').value = (i.release_date||"").slice(0,10);
        document.getElementById('pd').value = (i.purchase_date||"").slice(0,10);
        document.getElementById('m').value = i.memo || "";
        document.getElementById('formTitle').innerText = "EDIT VINYL";
        document.getElementById('batchArea').style.display = "none";
    }
    function resetForm() {
        resetFormOnlyText();
        document.getElementById('editId').value = "";
        document.getElementById('file').value = "";
        document.getElementById('batchArea').innerHTML = "";
        document.getElementById('batchArea').style.display = "none";
        document.getElementById('formTitle').innerText = "REGISTER VINYL";
    }
    function resetFormOnlyText() {
        document.getElementById('t').value = ""; document.getElementById('a').value = "";
        document.getElementById('lp_raw').value = ""; document.getElementById('pp_raw').value = "";
        document.getElementById('rd').value = ""; document.getElementById('pd').value = "";
        document.getElementById('m').value = "";
    }
    function filterCountry() {
        const c = ['All', '한국', '일본', '미국', '유럽', '기타'];
        filterC = c[(c.indexOf(filterC) + 1) % c.length];
        document.getElementById('filter-country').innerText = `국가: ${filterC==='All'?'전체':filterC}`;
        render();
    }
    function filterStatus() {
        const s = ['All', '보유', '미보유'];
        filterS = s[(s.indexOf(filterS) + 1) % s.length];
        document.getElementById('filter-status').innerText = `상태: ${filterS==='All'?'전체':filterS}`;
        render();
    }
    function closeD() { document.getElementById('detail').style.display = 'none'; }
    function showLoader(m) { document.getElementById('loadMsg').innerText = m; document.getElementById('loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }
</script>
</body>
</html>
