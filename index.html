<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --card: #111; --text: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* 부드러운 전환 */
        .page { display: none; opacity: 0; transition: opacity 0.3s ease; padding: 150px 15px 100px; }
        .page.active { display: block; opacity: 1; }

        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        
        .total-display { width: 100%; text-align: right; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .btn-s { padding: 6px 12px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: #888; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }

        /* 그리드 3열 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        @media (min-width: 800px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; border: 2px solid transparent; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); }
        .lp-item.selected::after { content: '✓'; position: absolute; inset: 0; background: rgba(0,242,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        
        /* 밝은 투명화 */
        .is-dimmed { opacity: 0.45; filter: brightness(1.7) grayscale(0.3); }

        /* 상세창 (5:5 분할) */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .d-right { flex: 5; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { .d-flex { flex-direction: column; } .d-left { height: 40vh; } .d-right { padding: 20px; } }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #222; text-align: left; font-size: 12px; }
        .t-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        /* 입력 폼 */
        input, select, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .price-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-container { display: flex; align-items: center; gap: 10px; margin: 10px 0 20px; font-weight: bold; cursor: pointer; }
        .check-container input { width: 22px; height: 22px; margin: 0; cursor: pointer; }

        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 1500; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">처리 중...</div>

<div id="loginPage" style="display:none; text-align:center; padding-top:35vh;">
    <h1 style="letter-spacing:10px; font-weight:900;">VINYL ARCHIVE</h1>
    <input type="password" id="pw" style="width:200px; text-align:center;" placeholder="••••" onkeyup="if(event.keyCode==13)login()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="backBtn" class="btn-s" style="display:none; margin-right:10px;" onclick="go('list')">← BACK</button>
            <span style="font-weight:900; letter-spacing:2px;">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <span id="viewIcon" onclick="toggleView()" style="cursor:pointer; font-size:20px;">▦</span>
            <button onclick="go('add')" style="background:var(--accent); color:#000; border:none; padding:6px 15px; border-radius:20px; font-weight:bold; font-size:12px;">ADD</button>
            <span onclick="toggleBatch()" id="editMainBtn" style="cursor:pointer; color:#666; font-size:12px;">EDIT</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <button id="s-id" class="btn-s active" onclick="setSort('id')">등록순 ↓</button>
        <button id="s-title" class="btn-s" onclick="setSort('title')">앨범명</button>
        <button id="s-artist" class="btn-s" onclick="setSort('artist')">가수명</button>
        <button id="s-rd" class="btn-s" onclick="setSort('release_date')">발매일</button>
        <button id="s-pd" class="btn-s" onclick="setSort('purchase_date')">구매일</button>
        <button id="s-price" class="btn-s" onclick="setSort('price')">가격순</button>
        <button id="s-country" class="btn-s" onclick="setSort('country')">나라순</button>
        <button id="f-c" class="btn-s" onclick="cycleFilter('country')">나라: 전체</button>
        <button id="f-o" class="btn-s" onclick="cycleFilter('owned')">보유: 전체</button>
        <div class="total-display" id="totalCount">TOTAL: 0</div>
    </div>

    <main>
        <section id="list" class="page active">
            <div id="grid-view" class="grid"></div>
            <div id="table-view" style="display:none; overflow-x:auto;">
                <table>
                    <thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add" class="page">
            <h2 id="form-title">NEW ARCHIVE</h2>
            <input type="hidden" id="edit-id">
            
            <label class="check-container">
                <input type="checkbox" id="f-owned" checked> 보유 중
            </label>

            <label style="font-size:11px; color:#888;">사진 업로드 (여러 장 선택 시 일괄 등록)</label>
            <input type="file" id="f-img" accept="image/*" multiple onchange="handleImg(this)">
            
            <input type="text" id="f-title" placeholder="앨범명">
            <input type="text" id="f-artist" placeholder="가수명">
            <select id="f-country"><option value="한국">한국</option><option value="일본">일본</option><option value="기타">기타</option></select>
            
            <p style="font-size:11px; color:var(--accent); margin:10px 0 5px;">정가 (통화 / 가격 / 환율)</p>
            <div class="price-row">
                <select id="f-lcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-lprice" placeholder="가격">
                <input type="number" id="f-lex" value="1" placeholder="환율">
            </div>
            
            <p style="font-size:11px; color:var(--accent); margin:10px 0 5px;">구매가 (통화 / 가격 / 환율)</p>
            <div class="price-row">
                <select id="f-pcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-pprice" placeholder="가격">
                <input type="number" id="f-pex" value="1" placeholder="환율">
            </div>
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px;">발매일</label><input type="date" id="f-rd"></div>
                <div style="flex:1;"><label style="font-size:11px;">구매일</label><input type="date" id="f-pd"></div>
            </div>
            
            <textarea id="f-memo" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" style="width:100%; padding:16px; background:var(--accent); border:none; border-radius:8px; font-weight:bold; color:#000; cursor:pointer;">SAVE ARCHIVE</button>
        </section>
    </main>
</div>

<div id="detail">
    <button onclick="closeDetail()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(255,255,255,0.1); border:none; color:#fff; width:45px; height:45px; border-radius:50%; font-size:24px;">×</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img" style="max-width:95%; box-shadow:0 10px 40px rgba(0,0,0,0.8);"></div>
        <div class="d-right">
            <h1 id="d-title" style="margin:0 0 5px; font-size:28px;"></h1>
            <p id="d-artist" style="font-size:20px; color:#888; margin-bottom:30px;"></p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; border-top:1px solid #222; padding-top:20px;">
                <div><label style="font-size:10px; color:#555;">COUNTRY</label><div id="d-c"></div></div>
                <div><label style="font-size:10px; color:#555;">OWNED</label><div id="d-o"></div></div>
                <div><label style="font-size:10px; color:#555;">RELEASE</label><div id="d-rd"></div></div>
                <div><label style="font-size:10px; color:#555;">PURCHASE</label><div id="d-pd"></div></div>
                <div><label style="font-size:10px; color:#555;">LIST PRICE</label><div id="d-lp"></div></div>
                <div><label style="font-size:10px; color:#555;">PURCHASE PRICE</label><div id="d-pp"></div></div>
            </div>
            <div id="d-memo" style="margin-top:25px; background:#0a0a0a; padding:15px; border-radius:10px; font-size:14px; color:#bbb; min-height:80px; white-space:pre-wrap;"></div>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <button onclick="edit()" style="flex:1; padding:12px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:6px;">EDIT</button>
                <button id="delBtn" style="flex:1; padding:12px; background:none; color:#ff4d4d; border:1px solid #ff4d4d; border-radius:6px;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<div id="batch-bar">
    <span id="selCountText">0 SELECTED</span>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleBatch()" style="background:none; border:1px solid #000; padding:8px 15px; border-radius:5px;">CANCEL</button>
        <button onclick="deleteBatch()" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:5px;">DELETE ALL</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyutiZNfIMpH8BBj-nPLpFcgSwluocjhg6D0yY5MbEXOo2qXAR39svF55ZqEy6rzgYF/exec';
    const MASTER_PW = '142857';

    let db = [], selectedIds = [], isBatch = false, viewMode = 'grid';
    let sortKey = 'id', isAsc = false, filterC = 'All', filterO = 'All';
    let currentImgBase64 = "";

    window.onload = () => {
        if(sessionStorage.getItem('vinyl_login') === 'true') startApp();
        else document.getElementById('loginPage').style.display = 'block';
    };

    function login() {
        if(document.getElementById('pw').value === MASTER_PW) {
            sessionStorage.setItem('vinyl_login', 'true');
            startApp();
        } else alert('비밀번호 불일치');
    }

    async function startApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await loadData();
    }

    async function loadData() {
        showLoader(true);
        try {
            const r = await fetch(GAS_URL);
            db = await r.json();
            render();
        } catch(e) { console.error(e); }
        showLoader(false);
    }

    function go(p) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('backBtn').style.display = (p === 'list' ? 'none' : 'block');
        document.getElementById('toolbar').style.display = (p === 'list' ? 'flex' : 'none');
        if(p === 'add') {
            document.getElementById('form-title').innerText = "NEW ARCHIVE";
            document.getElementById('edit-id').value = "";
            currentImgBase64 = "";
        }
    }

    async function handleImg(input) {
        if(!input.files.length) return;
        if(input.files.length > 1) {
            showLoader(true);
            for(let f of input.files) {
                const b64 = await processImg(f);
                await fetch(GAS_URL, {method:'POST', body:JSON.stringify({
                    action:'add', id:'V'+Date.now()+Math.random().toString(36).substr(2,4),
                    owned:true, title:'New Vinyl', artist:'-', country:'기타',
                    l_curr:'₩', l_ex:1, p_curr:'₩', p_ex:1, list_price:0, purchase_price:0,
                    release_date:'', purchase_date: new Date().toISOString().split('T')[0],
                    memo:'', image:b64
                })});
            }
            location.reload();
        } else {
            currentImgBase64 = await processImg(input.files[0]);
        }
    }

    function processImg(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    canvas.width = 600; canvas.height = 600;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 600, 600);
                    res(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    function render() {
        const today = new Date().toISOString().split('T')[0];
        let f = db.filter(i => (filterC === 'All' || i.country === filterC));
        if(filterO !== 'All') f = f.filter(i => (filterO === '보유' ? i.owned : !i.owned));

        // 정렬 (한->일->영 발음순)
        const collator = new Intl.Collator('ja', { sensitivity: 'base' });
        f.sort((a, b) => {
            let vA = a[sortKey], vB = b[sortKey];
            if(sortKey === 'price') {
                vA = Number(a.list_price||0) * Number(a.l_ex||1);
                vB = Number(b.list_price||0) * Number(b.l_ex||1);
            } else if(['title', 'artist'].includes(sortKey)) {
                const getP = (s) => {
                    const c = String(s||"").charAt(0);
                    if(/[ㄱ-ㅎ가-힣]/.test(c)) return 1;
                    if(/[\u3040-\u30ff\u4e00-\u9faf]/.test(c)) return 2;
                    return 3;
                };
                if(getP(vA) !== getP(vB)) return isAsc ? getP(vA) - getP(vB) : getP(vB) - getP(vA);
                return isAsc ? collator.compare(vA, vB) : collator.compare(vB, vA);
            }
            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.getElementById('totalCount').innerText = `TOTAL: ${f.length}`;
        document.querySelectorAll('.toolbar .btn-s').forEach(b => {
            b.classList.remove('active');
            if(b.id === 's-'+sortKey || (sortKey==='release_date'&&b.id==='s-rd') || (sortKey==='purchase_date'&&b.id==='s-pd')) b.classList.add('active');
        });

        if(viewMode === 'grid') {
            document.getElementById('table-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'grid';
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const dim = (!i.owned || (i.release_date && i.release_date > today)) ? 'is-dimmed' : '';
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="clickItem('${i.id}')"><img src="${i.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('table-view').style.display = 'block';
            document.getElementById('table-body').innerHTML = f.map((i, idx) => {
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                return `<tr onclick="clickItem('${i.id}')" class="${sel}"><td>${idx+1}</td><td><img src="${i.image}" class="t-img"></td><td>${i.title}</td><td>${i.artist}</td><td>${fmtD(i.release_date)}</td><td>${fmtD(i.purchase_date)}</td></tr>`;
            }).join('');
        }
    }

    function clickItem(id) {
        if(isBatch) {
            const sid = String(id);
            if(selectedIds.includes(sid)) selectedIds = selectedIds.filter(x => x !== sid);
            else selectedIds.push(sid);
            document.getElementById('selCountText').innerText = `${selectedIds.length} SELECTED`;
            render();
        } else openDetail(id);
    }

    function openDetail(id) {
        const i = db.find(x => String(x.id) === String(id));
        window.curId = id;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title;
        document.getElementById('d-artist').innerText = i.artist;
        document.getElementById('d-c').innerText = i.country;
        document.getElementById('d-o').innerText = i.owned ? "보유" : "미보유";
        document.getElementById('d-rd').innerText = fmtD(i.release_date);
        document.getElementById('d-pd').innerText = fmtD(i.purchase_date);
        document.getElementById('d-lp').innerText = fmtP(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('d-pp').innerText = fmtP(i.purchase_price, i.p_curr, i.p_ex);
        document.getElementById('d-memo').innerText = i.memo || "";
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => del(id);
    }

    async function save() {
        const eid = document.getElementById('edit-id').value;
        showLoader(true);
        const p = {
            action: eid ? 'edit' : 'add', id: eid || 'V'+Date.now(),
            owned: document.getElementById('f-owned').checked,
            title: document.getElementById('f-title').value,
            artist: document.getElementById('f-artist').value,
            country: document.getElementById('f-country').value,
            l_curr: document.getElementById('f-lcurr').value,
            l_ex: document.getElementById('f-lex').value,
            p_curr: document.getElementById('f-pcurr').value,
            p_ex: document.getElementById('f-pex').value,
            list_price: document.getElementById('f-lprice').value,
            purchase_price: document.getElementById('f-pprice').value,
            release_date: document.getElementById('f-rd').value,
            purchase_date: document.getElementById('f-pd').value,
            memo: document.getElementById('f-memo').value,
            image: currentImgBase64 || (eid ? db.find(x => String(x.id) === String(eid)).image : "")
        };
        await fetch(GAS_URL, {method:'POST', body:JSON.stringify(p)});
        location.reload();
    }

    async function del(id) { if(confirm('이 항목만 삭제할까요?')) { showLoader(true); await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'delete', id:String(id)})}); location.reload(); } }
    async function deleteBatch() { if(!selectedIds.length || !confirm('선택한 항목만 삭제할까요?')) return; showLoader(true); await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'delete', id:selectedIds})}); location.reload(); }

    function edit() {
        const i = db.find(x => String(x.id) === String(window.curId));
        closeDetail(); go('add');
        document.getElementById('form-title').innerText = "EDIT ARCHIVE";
        document.getElementById('edit-id').value = i.id;
        document.getElementById('f-owned').checked = i.owned;
        document.getElementById('f-title').value = i.title;
        document.getElementById('f-artist').value = i.artist;
        document.getElementById('f-country').value = i.country;
        document.getElementById('f-lcurr').value = i.l_curr; document.getElementById('f-lex').value = i.l_ex; document.getElementById('f-lprice').value = i.list_price;
        document.getElementById('f-pcurr').value = i.p_curr; document.getElementById('f-pex').value = i.p_ex; document.getElementById('f-pprice').value = i.purchase_price;
        document.getElementById('f-rd').value = i.release_date; document.getElementById('f-pd').value = i.purchase_date;
        document.getElementById('f-memo').value = i.memo;
    }

    function fmtD(s) { if(!s || s.length < 10) return '-'; const p = s.split('-'); return `${p[0]}년 ${parseInt(p[1])}월 ${parseInt(p[2])}일`; }
    function fmtP(v, c, e) {
        if(!v || v == 0) return c === '₩' ? '₩ 0' : `${c} 0 (₩ 0)`;
        const w = Math.floor(v * e);
        return c === '₩' ? `₩ ${Number(v).toLocaleString()}` : `${c} ${Number(v).toLocaleString()} (₩ ${w.toLocaleString()})`;
    }
    function setSort(k) { if(sortKey === k) isAsc = !isAsc; else { sortKey = k; isAsc = (k==='id'?false:true); } render(); }
    function toggleView() { viewMode = (viewMode==='grid'?'table':'grid'); document.getElementById('viewIcon').innerText = (viewMode==='grid'?'▦':'≡'); render(); }
    function toggleBatch() { isBatch = !isBatch; selectedIds = []; document.getElementById('batch-bar').style.display = (isBatch?'flex':'none'); render(); }
    function cycleFilter(t) {
        if(t==='country') { const o=['All','한국','일본','기타']; filterC=o[(o.indexOf(filterC)+1)%o.length]; document.getElementById('f-c').innerText=`나라: ${filterC}`; }
        else { const o=['All','보유','미보유']; filterO=o[(o.indexOf(filterO)+1)%o.length]; document.getElementById('f-o').innerText=`보유: ${filterO}`; }
        render();
    }
    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function closeDetail() { document.getElementById('detail').style.display = 'none'; }
</script>
</body>
</html>
