<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 18px; line-height: 1.6; }
        .fade-in { opacity: 0; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 16px; padding: 10px; }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 12px; display: flex; gap: 8px; overflow-x: auto; z-index: 90; border-bottom: 1px solid #222; }
        .sort-btn { white-space: nowrap; padding: 8px 16px; border-radius: 20px; background: var(--card); border: 1px solid #333; color: var(--dim); font-size: 13px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }

        main { padding: 140px 15px 40px; max-width: 900px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        .lp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(2, 1fr); } }
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .flag-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 5px; font-size: 11px; color: var(--accent); border: 1px solid var(--accent); }

        .f-group { margin-bottom: 20px; }
        label { display: block; color: var(--dim); margin-bottom: 8px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 15px; background: var(--card); border: 1px solid #333; border-radius: 10px; color: var(--text); font-size: 16px; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }

/* 상세보기 레이아웃: 좌우 50대 50 비율 */
#detail { 
    position: fixed; inset: 0; background: #000; z-index: 500; 
    display: none; overflow-y: auto; 
}

.d-container { 
    display: flex; min-height: 100vh; width: 100%; 
}

/* 왼쪽: 사진 영역 (50%) */
.d-img-side { 
    flex: 0 0 50%; background: #050505; 
    display: flex; align-items: center; justify-content: center; 
    position: sticky; top: 0; height: 100vh; 
    padding: 20px;
}

.d-img-side img { 
    max-width: 90%; max-height: 90%; 
    object-fit: contain; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    border-radius: 4px;
}

/* 오른쪽: 정보 영역 (50%) */
.d-info-side { 
    flex: 0 0 50%; padding: 60px; 
    background: #0b0b0b; display: flex; flex-direction: column; 
    justify-content: center;
}

/* 모바일에서는 위아래로 배치 */
@media (max-width: 900px) {
    .d-container { flex-direction: column; }
    .d-img-side { flex: none; height: 50vh; position: relative; }
    .d-info-side { flex: none; padding: 30px; }
}    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>데이터 동기화 중...</span></div>

<div id="loginView">
    <div class="login-card fade-in">
        <h2 style="color:#fff; margin-bottom:30px; letter-spacing:5px;">VINYL ARCHIVE</h2>
        <input type="password" id="pw" style="padding:18px; border-radius:12px; text-align:center; width:260px;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app">
    <nav>
        <button onclick="go('list')">VIEW</button>
        <button onclick="go('add')">ADD</button>
        <button onclick="go('set')">SET</button>
    </nav>

    <div id="sortBar" class="sort-bar">
        <button class="sort-btn active" onclick="sortData('id')">최신순</button>
        <button class="sort-btn" onclick="sortData('artist')">가수순(한/일/영)</button>
        <button class="sort-btn" onclick="sortData('price_val')">가격순</button>
        <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라 필터링: All</button>
    </div>

    <main class="fade-in">
        <section id="list" class="active"><div class="lp-grid" id="grid"></div></section>

        <section id="add">
            <h2 style="font-weight:900; font-size:28px;">새 앨범 등록</h2>
            <div class="f-group"><label>앨범 자켓</label><input type="file" id="file" accept="image/*"></div>
            <div class="f-group"><input type="text" id="t" placeholder="앨범명"></div>
            <div class="f-group"><input type="text" id="a" placeholder="가수명"></div>
            <div class="f-group">
                <label>나라 (Country)</label>
                <select id="country">
                    <option value="한국">한국</option><option value="일본">일본</option>
                    <option value="미국">미국</option><option value="영국">영국</option>
                    <option value="독일">독일</option><option value="프랑스">프랑스</option><option value="기타">기타</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;" class="f-group">
                <select id="currency" style="flex:1;" onchange="toggleExRate()">
                    <option value="KRW">₩ (원)</option><option value="USD">$ (달러)</option><option value="JPY">¥ (엔)</option>
                </select>
                <input type="number" id="price_raw" placeholder="가격 입력" style="flex:2;">
            </div>
            <div id="ex_rate_div" class="f-group" style="display:none;">
                <input type="number" id="ex_rate" placeholder="환율 (1단위당 원화)">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <div><label>발매일</label><input type="date" id="rd"></div>
                <div><label>구매일</label><input type="date" id="pd"></div>
            </div>
            <div class="f-group"><textarea id="m" rows="4" placeholder="메모 및 감상평"></textarea></div>
            <button class="save-btn" onclick="save()">컬렉션에 저장</button>
        </section>

        <section id="set">
            <h3>환경 설정</h3>
            <button class="save-btn" style="background:#333; color:#fff;" onclick="location.reload()">로그아웃 및 초기화</button>
        </section>
    </main>
</div>

<div id="detail">
    <div class="d-container">
        <div class="d-img-side">
            <img id="di" src="">
        </div>
        
        <div class="d-info-side">
            <span id="dc" class="dt-country"></span> <h1 id="dt" class="dt-title"></h1>       <p id="da" class="dt-artist"></p>        <div id="dm" class="dt-memo"></div>      <div style="border-top: 1px solid #333; padding-top: 20px;">
                <p id="dp" style="font-size: 22px; font-weight: bold; color: #bb86fc;"></p>
                <p id="drd" style="color: #777; font-size: 15px;"></p>
                <p id="dpd" style="color: #777; font-size: 15px;"></p>
            </div>
            <button class="delete-btn" id="delBtn">데이터 삭제</button>
        </div>
    </div>
    <button class="back-btn-fixed" onclick="closeD()">← CLOSE</button>
</div>
</div>

<script>
    // ⚠️ 수정 필수: 배포한 URL과 설정한 비밀번호
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx4MqPj5eKKWPeOAp-vvycmZWQSf86ZC2xQnixXahIrTXHcO68MEZkk5qj-4qejkYTS/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All';

    // 1. 로그인 로직 (세션 저장 추가)
    function doLogin() {
        const inputPw = document.getElementById('pw').value;
        if(inputPw === MY_PASSWORD) {
            // 브라우저 탭을 닫기 전까지 로그인 상태 유지
            sessionStorage.setItem('vinyl_logged_in', 'true');
            showApp();
        } else { 
            alert('비밀번호가 다릅니다.'); 
        }
    }

    // 로그인 성공 시 화면 전환 및 데이터 로드
    function showApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        load();
    }

    // 2. 데이터 불러오기
    async function load() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            items = Array.isArray(data) ? data : [];
            
            items.forEach(i => {
                // 가격 정렬용 숫자 추출
                const match = String(i.price).match(/₩([\d,]+)/);
                i.price_val = match ? parseInt(match[1].replace(/,/g, '')) : 0;
                // 날짜 포맷팅 (연-월-일)
                if(i.release_date) i.release_date = String(i.release_date).split('T')[0];
                if(i.purchase_date) i.purchase_date = String(i.purchase_date).split('T')[0];
            });
            sortData('id');
        } catch(e) {
            console.error(e);
            alert("시트 데이터를 가져오지 못했습니다. 앱스 스크립트 배포 설정을 확인하세요.");
        } finally {
            loader.style.display = 'none';
        }
    }

    // 3. 페이지 로드 시 로그인 상태 확인 (핵심!)
    window.onload = () => {
        const isLoggedIn = sessionStorage.getItem('vinyl_logged_in');
        if (isLoggedIn === 'true') {
            showApp();
        }
    };

    // --- 이하 기존 로직 동일 ---

    function getSortPriority(str) {
        if (!str) return 999;
        const char = str.charCodeAt(0);
        if (char >= 0xAC00 && char <= 0xD7A3) return 1; // 한글
        if (char >= 0x3040 && char <= 0x30FF) return 2; // 일본어(통합)
        if ((char >= 65 && char <= 90) || (char >= 97 && char <= 122)) return 3; // 영어
        return 4;
    }

    function sortData(key) {
        // 정렬 버튼 활성화 효과
        if (event && event.target && event.target.classList.contains('sort-btn')) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        items.sort((a, b) => {
            if (key === 'artist') {
                const pA = getSortPriority(a.artist);
                const pB = getSortPriority(b.artist);
                if (pA !== pB) return pA - pB;
                return String(a.artist).localeCompare(String(b.artist));
            }
            if (key === 'id' || key === 'price_val' || key === 'release_date' || key === 'purchase_date') {
                const valA = a[key] || 0;
                const valB = b[key] || 0;
                return (valB > valA) ? 1 : -1;
            }
            return String(a[key]).localeCompare(String(b[key]));
        });
        render();
    }

    function filterCountry() {
        const countries = ['All', ...new Set(items.map(i => i.country).filter(c => c))];
        const nextIdx = (countries.indexOf(currentFilter) + 1) % countries.length;
        currentFilter = countries[nextIdx];
        document.getElementById('filterBtn').innerText = `나라 필터링: ${currentFilter}`;
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        if(filtered.length === 0) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:#555;">표시할 앨범이 없습니다.</p>';
            return;
        }
        grid.innerHTML = filtered.map(i => `
            <div class="lp-item fade-in" onclick="openD('${i.id}')">
                <img src="${i.image}" loading="lazy">
                <div class="flag-badge">${i.country || '기타'}</div>
            </div>
        `).join('');
    }

    function toggleExRate() {
        document.getElementById('ex_rate_div').style.display = (document.getElementById('currency').value === 'KRW') ? 'none' : 'block';
    }

    function save() {
        const f = document.getElementById('file').files[0];
        const title = document.getElementById('t').value;
        if(!f || !title) return alert('사진과 앨범명은 필수입니다.');

        document.getElementById('loader').style.display = 'flex';
        const cur = document.getElementById('currency').value;
        const raw = parseFloat(document.getElementById('price_raw').value) || 0;
        const rate = parseFloat(document.getElementById('ex_rate').value) || 1;
        let pText = (cur === 'KRW') ? `₩${raw.toLocaleString()}` : `${cur==='USD'?'$':'¥'}${raw.toLocaleString()} (₩${Math.round(raw*rate).toLocaleString()})`;

        const r = new FileReader();
        r.onload = async (e) => {
            const data = {
                id: Date.now(), title: title, artist: document.getElementById('a').value,
                price: pText, release_date: document.getElementById('rd').value,
                purchase_date: document.getElementById('pd').value, 
                memo: document.getElementById('m').value,
                image: e.target.result, country: document.getElementById('country').value
            };
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
                location.reload();
            } catch(err) {
                alert("저장 실패");
                document.getElementById('loader').style.display = 'none';
            }
        };
        r.readAsDataURL(f);
    }

    function openD(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist || '아티스트 미상';
        document.getElementById('dc').innerText = i.country || '기타';
        document.getElementById('dm').innerHTML = (i.memo || '등록된 메모가 없습니다.').replace(/\n/g, '<br>');
        document.getElementById('dp').innerText = "가격: " + i.price;
        document.getElementById('drd').innerText = "발매일: " + (i.release_date || '-');
        document.getElementById('dpd').innerText = "구매일: " + (i.purchase_date || '-');
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        document.getElementById('detail').style.display = 'flex';
        history.pushState({modal: true}, "");
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; if(history.state?.modal) history.back(); }
    window.onpopstate = () => document.getElementById('detail').style.display = 'none';

    async function deleteItem(id) {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        document.getElementById('loader').style.display = 'flex';
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
        location.reload();
    }

    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sortBar').style.display = (id === 'list') ? 'flex' : 'none';
    }
</script>
</body>
</html>
