<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
        
        .fade-in { opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-bottom: 1px solid #333; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 15px; padding: 10px; }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 6px; overflow-x: auto; z-index: 90; border-bottom: 1px solid #222; scrollbar-width: none; }
        .sort-bar::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid #333; color: var(--dim); font-size: 12px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        /* 모바일 3열 그리드 적용 */
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .flag-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-size: 10px; color: var(--accent); border: 1px solid var(--accent); }

        /* 상세보기 (요청하신 폰트 사이즈 및 위치 조정) */
        #detail { position: fixed; inset: 0; background: #000; z-index: 500; display: none; overflow-y: auto; }
        .d-container { display: flex; min-height: 100vh; width: 100%; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; height: 100vh; padding: 20px; }
        .d-img-side img { max-width: 100%; max-height: 85%; object-fit: contain; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .d-info-side { flex: 0 0 50%; padding: 60px; background: #0b0b0b; display: flex; flex-direction: column; justify-content: center; }
        
        @media (max-width: 900px) {
            .d-container { flex-direction: column; }
            .d-img-side { flex: none; height: 45vh; position: relative; padding: 15px; }
            .d-info-side { flex: none; padding: 30px 20px; }
        }

        .dt-country { display: inline-block; padding: 4px 10px; background: var(--accent); color: #000; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; width: fit-content; }
        .dt-title { font-size: 30px; font-weight: 800; color: #fff; margin: 0; line-height: 1.2; } /* 폰트 작게 조정 */
        .dt-artist { font-size: 20px; color: var(--dim); margin: 8px 0 25px 0; } /* 폰트 작게 조정 */
        .dt-price { font-size: 22px; font-weight: bold; color: var(--accent); margin-bottom: 15px; }
        .dt-memo { font-size: 17px; line-height: 1.7; color: #ccc; background: #151515; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 4px solid var(--accent); }
        
        .back-btn-fixed { position: fixed; bottom: 20px; left: 20px; padding: 12px 25px; border-radius: 40px; background: #333; color: #fff; border: none; cursor: pointer; z-index: 600; font-weight: bold; }
        .btn-row { display: flex; gap: 10px; margin-top: 30px; }
        .edit-btn { background: #444; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .delete-btn { background: #aa3333; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }

        .f-group { margin-bottom: 15px; }
        label { display: block; color: var(--dim); margin-bottom: 5px; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 12px; background: var(--card); border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 15px; }
        .save-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #loginView { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; color: #fff; flex-direction: column; gap: 10px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>처리 중...</span></div>

<div id="loginView">
    <div style="text-align: center;">
        <h1 style="color:#fff; margin-bottom:30px; letter-spacing:5px; font-size: 20px;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="padding:15px; border-radius:10px; text-align:center; width:240px;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <button onclick="go('list')">VIEW</button>
        <button onclick="go('add')">ADD</button>
        <button onclick="go('set')">SET</button>
    </nav>

    <div id="sortBar" class="sort-bar">
        <button class="sort-btn active" onclick="sortData('id')">등록순</button>
        <button class="sort-btn" onclick="sortData('artist')">가수순</button>
        <button class="sort-btn" onclick="sortData('price_val')">가격순</button>
        <button class="sort-btn" onclick="sortData('release_date')">발매일순</button>
        <button class="sort-btn" onclick="sortData('purchase_date')">구매일순</button>
        <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라: All</button>
    </div>

    <main class="fade-in">
        <section id="list" class="active"><div class="lp-grid" id="grid"></div></section>

        <section id="add">
            <h2 id="formTitle" style="font-weight:900; font-size:24px; margin-bottom:20px;">새 앨범 등록</h2>
            <input type="hidden" id="editId">
            <div class="f-group"><label>앨범 자켓</label><input type="file" id="file" accept="image/*"></div>
            <div class="f-group"><input type="text" id="t" placeholder="앨범 제목"></div>
            <div class="f-group"><input type="text" id="a" placeholder="아티스트명"></div>
            <div class="f-group">
                <select id="country">
                    <option value="한국">한국</option><option value="일본">일본</option>
                    <option value="미국">미국</option><option value="영국">영국</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;" class="f-group">
                <select id="currency" style="flex:1;" onchange="toggleExRate()">
                    <option value="KRW">₩</option><option value="USD">$</option><option value="JPY">¥</option>
                </select>
                <input type="number" id="price_raw" placeholder="가격" style="flex:2;">
            </div>
            <div id="ex_rate_div" class="f-group" style="display:none;"><input type="number" id="ex_rate" placeholder="환율"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <div><label>발매일</label><input type="date" id="rd"></div>
                <div><label>구매일</label><input type="date" id="pd"></div>
            </div>
            <div class="f-group"><textarea id="m" rows="4" placeholder="메모"></textarea></div>
            <button class="save-btn" id="saveBtn" onclick="save()">컬렉션에 저장</button>
            <button class="save-btn" id="cancelBtn" style="background:#444; color:#fff; margin-top:10px; display:none;" onclick="cancelEdit()">수정 취소</button>
        </section>

        <section id="set">
            <button class="save-btn" style="background:#333; color:#fff;" onclick="logout()">로그아웃</button>
        </section>
    </main>
</div>

<div id="detail">
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <span id="dc" class="dt-country"></span>
            <h1 id="dt" class="dt-title"></h1>
            <p id="da" class="dt-artist"></p>
            
            <p id="dp" class="dt-price"></p>
            <div id="dm" class="dt-memo"></div>
            
            <div style="font-size:14px; color:var(--dim); border-top:1px solid #222; padding-top:20px;">
                <p id="drd"></p><p id="dpd"></p>
            </div>
            <div class="btn-row">
                <button class="edit-btn" id="editActionBtn">수정하기</button>
                <button class="delete-btn" id="delBtn">삭제하기</button>
            </div>
        </div>
    </div>
    <button class="back-btn-fixed" onclick="closeD()">← CLOSE</button>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxg6Bib_ehobE_It0Vu1GVszddYgS2bdLi-ETqWEp0mgcz71O8OUD0TepapXM6h9DH-/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All';

    function doLogin() {
        if(document.getElementById('pw').value === MY_PASSWORD) {
            sessionStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else alert('비밀번호 오류');
    }
    function logout() { sessionStorage.removeItem('vinyl_auth'); location.reload(); }

    function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadData();
    }

    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            items = Array.isArray(data) ? data : [];
            items.forEach(i => {
                const match = String(i.price).match(/₩([\d,]+)/);
                i.price_val = match ? parseInt(match[1].replace(/,/g, '')) : 0;
                i.id_num = parseInt(i.id);
                if(i.release_date) i.release_date = String(i.release_date).split('T')[0];
                if(i.purchase_date) i.purchase_date = String(i.purchase_date).split('T')[0];
            });
            sortData('id');
        } catch(e) { alert("데이터 로드 실패"); }
        document.getElementById('loader').style.display = 'none';
    }

    function sortData(key) {
        if(event && event.target.classList.contains('sort-btn')) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        items.sort((a, b) => {
            if(key === 'artist') return String(a.artist).localeCompare(String(b.artist));
            const vA = a[key] || 0; const vB = b[key] || 0;
            return (vB > vA) ? 1 : -1;
        });
        render();
    }

    function filterCountry() {
        const countries = ['All', ...new Set(items.map(i => i.country).filter(c => c))];
        const nextIdx = (countries.indexOf(currentFilter) + 1) % countries.length;
        currentFilter = countries[nextIdx];
        document.getElementById('filterBtn').innerText = `나라: ${currentFilter}`;
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        grid.innerHTML = filtered.map(i => `
            <div class="lp-item fade-in" onclick="openD('${i.id}')">
                <img src="${i.image}" loading="lazy">
                <div class="flag-badge">${i.country || '기타'}</div>
            </div>
        `).join('');
    }

    function toggleExRate() {
        document.getElementById('ex_rate_div').style.display = (document.getElementById('currency').value === 'KRW') ? 'none' : 'block';
    }

    // 수정 모드 전환
    function startEdit(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        closeD();
        go('add');
        document.getElementById('formTitle').innerText = "앨범 정보 수정";
        document.getElementById('editId').value = i.id;
        document.getElementById('t').value = i.title;
        document.getElementById('a').value = i.artist;
        document.getElementById('country').value = i.country;
        document.getElementById('rd').value = i.release_date;
        document.getElementById('pd').value = i.purchase_date;
        document.getElementById('m').value = (i.memo || '').replace(/<br>/g, '\n');
        document.getElementById('saveBtn').innerText = "수정사항 저장";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function cancelEdit() {
        location.reload();
    }

    async function save() {
        const title = document.getElementById('t').value;
        const editId = document.getElementById('editId').value;
        if(!title) return alert('제목은 필수입니다.');

        document.getElementById('loader').style.display = 'flex';
        const cur = document.getElementById('currency').value;
        const raw = parseFloat(document.getElementById('price_raw').value) || 0;
        const rate = parseFloat(document.getElementById('ex_rate').value) || 1;
        let pText = (cur === 'KRW') ? `₩${raw.toLocaleString()}` : `${cur==='USD'?'$':'¥'}${raw.toLocaleString()} (₩${Math.round(raw*rate).toLocaleString()})`;

        const fileInput = document.getElementById('file');
        let imageData = "";
        
        if (fileInput.files.length > 0) {
            imageData = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(e.target.result);
                r.readAsDataURL(fileInput.files[0]);
            });
        }

        const payload = {
            action: editId ? 'edit' : 'add',
            id: editId || Date.now(),
            title: title, artist: document.getElementById('a').value,
            price: pText, release_date: document.getElementById('rd').value,
            purchase_date: document.getElementById('pd').value, 
            memo: document.getElementById('m').value,
            image: imageData, country: document.getElementById('country').value
        };

        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        } catch(err) { alert("저장 실패"); document.getElementById('loader').style.display = 'none'; }
    }

    function openD(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist;
        document.getElementById('dc').innerText = i.country;
        document.getElementById('dm').innerHTML = (i.memo || '메모 없음').replace(/\n/g, '<br>');
        document.getElementById('dp').innerText = i.price;
        document.getElementById('drd').innerText = "발매일: " + (i.release_date || '-');
        document.getElementById('dpd').innerText = "구매일: " + (i.purchase_date || '-');
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        document.getElementById('editActionBtn').onclick = () => startEdit(i.id);
        
        document.getElementById('detail').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; document.body.style.overflow = 'auto'; }

    async function deleteItem(id) {
        if(!confirm('삭제하시겠습니까?')) return;
        document.getElementById('loader').style.display = 'flex';
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
        location.reload();
    }

    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sortBar').style.display = (id === 'list') ? 'flex' : 'none';
        window.scrollTo(0,0);
    }

    window.onload = () => { if(sessionStorage.getItem('vinyl_auth') === 'true') startApp(); };
</script>
</body>
</html>
