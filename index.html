<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; --danger: #ff5555; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border); padding: 0 15px; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px; }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; align-items: center; gap: 6px; z-index: 900; border-bottom: 1px solid #222; }
        .sort-inner { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .sort-inner::-webkit-scrollbar { display: none; }
        .sort-btn { white-space: nowrap; padding: 6px 12px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }
        .total-count { font-size: 11px; color: var(--accent); font-weight: bold; padding-left: 10px; white-space: nowrap; border-left: 1px solid #333; margin-left: 5px; }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        /* Grid View */
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
        .lp-item { position: relative; aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 3px solid transparent; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Table View */
        .table-container { overflow-x: auto; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #222; color: var(--dim); font-weight: normal; font-size: 11px; }
        .table-row { cursor: pointer; transition: 0.2s; }
        .table-row:hover { background: #252525; }
        .table-row.selected { background: rgba(187,134,252,0.15); }

        /* Effects */
        .is-dimmed { opacity: 0.45 !important; filter: brightness(1.7) contrast(0.8); }
        .lp-item.selected { border-color: var(--accent) !important; transform: scale(0.92); z-index: 10; box-shadow: 0 0 15px rgba(187,134,252,0.5); }
        .edit-active .lp-item:not(.selected) { opacity: 0.4; filter: grayscale(0.5); }
        .edit-active .lp-item.selected { opacity: 1 !important; filter: none !important; }

        .select-badge { 
            position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; 
            background: var(--accent); color: #000; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: bold; z-index: 100;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6); pointer-events: none;
        }
        .lp-item.selected .select-badge { display: flex; }

        /* Form & UI */
        input, select, textarea { width: 100%; padding: 14px; background: #151515; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 10px; font-size: 14px; }
        label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; }
        .price-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: var(--accent); }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #batchBar { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: var(--nav-bg); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 2000; border-top: 2px solid var(--accent); }

        #detail { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; overflow-y: auto; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 3100; background: rgba(0,0,0,0.6); color: #fff; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; cursor: pointer; }
        .d-container { display: flex; min-height: 100vh; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; height: 100vh; position: sticky; top: 0; padding: 40px; }
        .d-img-side img { max-width: 100%; max-height: 90%; object-fit: contain; }
        .d-info-side { flex: 0 0 50%; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: var(--bg); }
        @media (max-width: 900px) { .d-container { flex-direction: column; } .d-img-side { flex: none; height: 45vh; position: relative; padding: 20px; } .d-info-side { flex: none; padding: 30px 20px 60px; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="loadMsg">처리 중...</div></div>

<div id="loginView" style="display: none;">
    <div style="text-align: center; padding-top: 35vh;">
        <h1 style="color:#fff; letter-spacing:8px; font-size: 16px; margin-bottom:30px; opacity:0.8;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="width:220px; text-align:center;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left">
            <button onclick="go('list')" id="nav-list" class="active">목록</button>
            <button onclick="go('add')" id="nav-add">추가</button>
        </div>
        <div class="nav-right">
            <button id="viewToggle" onclick="toggleView()" style="color:#888;">표로 보기</button>
            <button id="editModeBtn" onclick="toggleEditMode()" style="color:var(--accent);">편집</button>
            <button onclick="logout()" style="font-size:11px; opacity:0.5;">로그아웃</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <div class="sort-inner">
            <button class="sort-btn active" onclick="sortData('id')">최신순 ↓</button>
            <button class="sort-btn" onclick="sortData('artist')">가수순</button>
            <button class="sort-btn" onclick="sortData('title')">앨범순</button>
            <button class="sort-btn" onclick="sortData('list_price')">출시가순</button>
            <button class="sort-btn" onclick="sortData('release_date')">출시일순</button>
            <button id="filterBtn" class="sort-btn" onclick="filterCountry()">국가: 전체</button>
            <button id="statusBtn" class="sort-btn" onclick="filterStatus()">상태: 전체</button>
        </div>
        <div id="totalLabel" class="total-count">0</div>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="table-view" class="table-container" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;">선택</th>
                            <th>앨범정보</th>
                            <th>국가</th>
                            <th>출시가</th>
                            <th>발매일</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
        
        <section id="add">
            <h2 id="formTitle" style="font-size:18px; margin:30px 0 15px;">바이닐 등록</h2>
            <input type="hidden" id="editId">
            <label style="display:flex; align-items:center; gap:10px; background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:15px; cursor:pointer; border: 1px solid #333;">
                <input type="checkbox" id="owned" checked style="width:auto; margin:0;">
                <span>현재 보유 중</span>
            </label>
            <input type="file" id="file" accept="image/*">
            <input type="text" id="t" placeholder="앨범 제목">
            <input type="text" id="a" placeholder="아티스트">
            <select id="country"><option value="한국">한국</option><option value="일본">일본</option><option value="미국">미국</option><option value="유럽">유럽</option><option value="기타">기타</option></select>
            <div class="price-group">
                <div><label>출시 통화</label><select id="l_curr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select></div>
                <div><label>출시 환율</label><input type="number" id="l_ex" step="0.01" value="1.00"></div>
                <div style="grid-column: span 2;"><label>출시가(현지)</label><input type="number" id="lp_raw" placeholder="0"></div>
                <div style="grid-column: span 2; border-top: 1px solid #222; margin: 5px 0; padding-top: 10px;"></div>
                <div><label>구매 통화</label><select id="p_curr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select></div>
                <div><label>구매 환율</label><input type="number" id="p_ex" step="0.01" value="1.00"></div>
                <div style="grid-column: span 2;"><label>구매가(현지)</label><input type="number" id="pp_raw" placeholder="0"></div>
            </div>
            <div style="display:flex; gap:10px;"><div style="flex:1;"><label>발매일</label><input type="date" id="rd"></div><div style="flex:1;"><label>구매일</label><input type="date" id="pd"></div></div>
            <textarea id="m" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold;">저장하기</button>
        </section>
    </main>
</div>

<div id="batchBar">
    <div id="batchCount" style="font-weight:bold; color:var(--accent); font-size:18px;">0개 선택됨</div>
    <div style="display:flex; gap:15px;">
        <button onclick="toggleEditMode()" style="background:none; border:none; color:#fff; font-weight:bold;">취소</button>
        <button onclick="batchDelete()" style="background:var(--danger); border:none; color:#fff; padding:12px 25px; border-radius:10px; font-weight:bold;">삭제하기</button>
    </div>
</div>

<div id="detail">
    <div class="back-btn" onclick="closeD()">←</div>
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <div style="display:flex; gap:10px; margin-bottom:15px;"><div id="dc" style="background:var(--accent); color:#000; padding:4px 10px; border-radius:4px; font-size:11px; font-weight:bold;"></div><div id="ds" style="background:#444; color:#fff; padding:4px 10px; border-radius:4px; font-size:11px; font-weight:bold;"></div></div>
            <h1 id="dt" style="font-size:32px; margin:0; line-height:1.2;"></h1>
            <p id="da" style="font-size:20px; color:var(--dim); margin:5px 0 25px;"></p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:20px;">
                <div><label>출시가</label><div id="dlp" style="font-size:16px; font-weight:bold; color:var(--accent);"></div><div id="dlp_krw" style="font-size:12px; color:#888;"></div></div>
                <div><label>구매가</label><div id="dpp" style="font-size:16px; font-weight:bold; color:var(--accent);"></div><div id="dpp_krw" style="font-size:12px; color:#888;"></div></div>
                <div><label>발매일</label><div id="drd" style="font-size:14px; color:#ccc;"></div></div>
                <div><label>구매일</label><div id="dpd" style="font-size:14px; color:#ccc;"></div></div>
            </div>
            <div id="dm" style="background:#151515; padding:20px; border-radius:10px; border-left:4px solid var(--accent); white-space:pre-wrap; font-size:14px; margin-bottom:30px; color:#ccc;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="startEdit()" style="flex:1; padding:18px; background:#222; color:#fff; border:1px solid #444; border-radius:10px; font-weight:bold;">수정</button>
                <button id="delSingleBtn" style="flex:1; padding:18px; background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:10px; font-weight:bold;">삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwjp9soR-s225GM7FGr_Dw9ld7-8tfxng2MhOYESQ1a9VwucZyX3svFd0zBE3NOQeqS/exec'; 
    const MY_PASSWORD = '142857';

    let items = [], selectedIds = [], isEditMode = false, currentView = 'grid';
    let currentFilter = 'All', currentStatus = 'All', activeId = null;
    let currentSortKey = 'id', isAscending = false;

    if(localStorage.getItem('vinyl_auth_v9') === 'true') { window.addEventListener('load', startApp); } 
    else { window.addEventListener('load', () => { document.getElementById('loginView').style.display = 'block'; }); }

    function doLogin() {
        if(document.getElementById('pw').value === MY_PASSWORD) { localStorage.setItem('vinyl_auth_v9', 'true'); startApp(); } 
        else alert('비밀번호가 틀렸습니다.');
    }
    function logout() { localStorage.removeItem('vinyl_auth_v9'); location.reload(); }

    async function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await loadData();
    }

    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try { const res = await fetch(WEB_APP_URL); items = await res.json(); sortData('id'); } catch(e){}
        document.getElementById('loader').style.display = 'none';
    }

    function toggleView() {
        currentView = currentView === 'grid' ? 'table' : 'grid';
        document.getElementById('viewToggle').innerText = currentView === 'grid' ? '표로 보기' : '이미지 보기';
        document.getElementById('grid-view').style.display = currentView === 'grid' ? 'grid' : 'none';
        document.getElementById('table-view').style.display = currentView === 'grid' ? 'none' : 'block';
        render();
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        selectedIds = [];
        document.getElementById('editModeBtn').innerText = isEditMode ? "취소" : "편집";
        document.getElementById('batchBar').style.display = isEditMode ? "flex" : "none";
        document.getElementById('batchCount').innerText = "0개 선택됨";
        document.getElementById('grid-view').classList.toggle('edit-active', isEditMode);
        render();
    }

    function handleItemClick(id) {
        id = String(id);
        if (isEditMode) {
            if (selectedIds.includes(id)) selectedIds = selectedIds.filter(x => x !== id);
            else selectedIds.push(id);
            document.getElementById('batchCount').innerText = `${selectedIds.length}개 선택됨`;
            render();
        } else {
            openD(id);
        }
    }

    async function batchDelete() {
        if (selectedIds.length === 0) return;
        if (confirm(`${selectedIds.length}개를 삭제하시겠습니까?`)) {
            document.getElementById('loader').style.display = 'flex';
            for (let id of selectedIds) {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
            }
            location.reload();
        }
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 600;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } } else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
            };
        });
    }

    function sortData(key) {
        if (currentSortKey === key) isAscending = !isAscending;
        else { currentSortKey = key; isAscending = true; }
        items.sort((a, b) => {
            let vA = a[key], vB = b[key];
            if (key.includes('date')) { vA = vA ? new Date(vA) : new Date(0); vB = vB ? new Date(vB) : new Date(0); }
            if (key === 'list_price') { vA = Number(vA || 0); vB = Number(vB || 0); }
            if (vA < vB) return isAscending ? -1 : 1;
            if (vA > vB) return isAscending ? 1 : -1;
            return 0;
        });
        render();
    }

    function filterCountry() {
        const c = ['All', '한국', '일본', '미국', '유럽', '기타'];
        currentFilter = c[(c.indexOf(currentFilter) + 1) % c.length];
        document.getElementById('filterBtn').innerText = `국가: ${currentFilter === 'All' ? '전체' : currentFilter}`;
        render();
    }

    function filterStatus() {
        const s = ['All', '보유', '미보유'];
        currentStatus = s[(s.indexOf(currentStatus) + 1) % s.length];
        document.getElementById('statusBtn').innerText = `상태: ${currentStatus === 'All' ? '전체' : currentStatus}`;
        render();
    }

    function render() {
        const today = new Date(); today.setHours(0,0,0,0);
        let f = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        if(currentStatus === '보유') f = f.filter(i => String(i.owned) === "true");
        if(currentStatus === '미보유') f = f.filter(i => String(i.owned) === "false");
        document.getElementById('totalLabel').innerText = f.length;

        if (currentView === 'grid') {
            document.getElementById('grid-view').innerHTML = f.map(i => {
                const dim = (String(i.owned) === "false" || (i.release_date && new Date(i.release_date) > today)) ? 'is-dimmed' : '';
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="handleItemClick('${i.id}')"><div class="select-badge">✓</div><img src="${i.image}" loading="lazy"></div>`;
            }).join('');
        } else {
            document.getElementById('table-body').innerHTML = f.map(i => {
                const sel = selectedIds.includes(String(i.id)) ? 'selected' : '';
                const dim = (String(i.owned) === "false") ? 'opacity:0.5;' : '';
                return `
                    <tr class="table-row ${sel}" style="${dim}" onclick="handleItemClick('${i.id}')">
                        <td><input type="checkbox" ${sel ? 'checked' : ''} style="width:auto;margin:0;"></td>
                        <td><div style="font-weight:bold;">${i.title}</div><div style="font-size:11px;color:#888;">${i.artist}</div></td>
                        <td style="font-size:11px;">${i.country}</td>
                        <td style="color:var(--accent); font-weight:bold;">${i.l_curr || '₩'} ${Number(i.list_price || 0).toLocaleString()}</td>
                        <td style="font-size:11px; color:#666;">${(i.release_date || "").substring(0,10)}</td>
                    </tr>`;
            }).join('');
        }
    }

    function openD(id) {
        activeId = id; const i = items.find(x => x.id == id);
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist;
        document.getElementById('dc').innerText = i.country;
        document.getElementById('ds').innerText = String(i.owned) === "true" ? "보유 중" : "미보유";
        const lRate = i.l_curr === '₩' ? 1 : Number(i.l_ex || 1);
        const pRate = i.p_curr === '₩' ? 1 : Number(i.p_ex || 1);
        document.getElementById('dlp').innerText = `${i.l_curr || '₩'} ${Number(i.list_price || 0).toLocaleString()}`;
        document.getElementById('dpp').innerText = `${i.p_curr || '₩'} ${Number(i.purchase_price || 0).toLocaleString()}`;
        document.getElementById('dlp_krw').innerText = (i.l_curr && i.l_curr !== '₩') ? `(약 ₩ ${Math.round(i.list_price * lRate).toLocaleString()})` : "";
        document.getElementById('dpp_krw').innerText = (i.p_curr && i.p_curr !== '₩') ? `(약 ₩ ${Math.round(i.purchase_price * pRate).toLocaleString()})` : "";
        document.getElementById('drd').innerText = i.release_date ? i.release_date.substring(0,10) : "-";
        document.getElementById('dpd').innerText = i.purchase_date ? i.purchase_date.substring(0,10) : "-";
        document.getElementById('dm').innerText = i.memo || "";
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delSingleBtn').onclick = () => deleteItem(i.id);
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; }

    async function save() {
        const editId = document.getElementById('editId').value;
        document.getElementById('loader').style.display = 'flex';
        const fileInput = document.getElementById('file');
        let img = (editId && fileInput.files.length === 0) ? items.find(x => x.id == editId).image : "";
        if (fileInput.files.length > 0) img = await compressImage(fileInput.files[0]);
        const payload = {
            action: editId ? 'edit' : 'add', id: editId || Date.now(),
            owned: document.getElementById('owned').checked, title: document.getElementById('t').value, artist: document.getElementById('a').value,
            country: document.getElementById('country').value, l_curr: document.getElementById('l_curr').value, l_ex: document.getElementById('l_ex').value,
            p_curr: document.getElementById('p_curr').value, p_ex: document.getElementById('p_ex').value,
            list_price: document.getElementById('lp_raw').value, purchase_price: document.getElementById('pp_raw').value,
            release_date: document.getElementById('rd').value, purchase_date: document.getElementById('pd').value, memo: document.getElementById('m').value, image: img
        };
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function startEdit() {
        const i = items.find(x => x.id == activeId);
        closeD(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('owned').checked = String(i.owned) === "true";
        document.getElementById('t').value = i.title; document.getElementById('a').value = i.artist;
        document.getElementById('country').value = i.country;
        document.getElementById('l_curr').value = i.l_curr || "₩";
        document.getElementById('l_ex').value = i.l_ex || 1.00;
        document.getElementById('p_curr').value = i.p_curr || "₩";
        document.getElementById('p_ex').value = i.p_ex || 1.00;
        document.getElementById('lp_raw').value = i.list_price || 0;
        document.getElementById('pp_raw').value = i.purchase_price || 0;
        document.getElementById('rd').value = i.release_date ? i.release_date.substring(0,10) : "";
        document.getElementById('pd').value = i.purchase_date ? i.purchase_date.substring(0,10) : "";
        document.getElementById('m').value = i.memo || "";
    }

    async function deleteItem(id) { if(confirm('삭제하시겠습니까?')) { document.getElementById('loader').style.display = 'flex'; await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) }); location.reload(); } }
    
    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(id === 'list') document.getElementById('nav-list').classList.add('active');
        if(id === 'add') document.getElementById('nav-add').classList.add('active');
    }
</script>
</body>
</html>
