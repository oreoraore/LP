<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #00f2ff; --text: #fff; --dim: #888; --border: #262626; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* 인터페이스 부드러운 전환 */
        .page { display: none; opacity: 0; transition: 0.3s ease-in-out; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 상단 바 및 툴바 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; align-items: center; overflow-x: auto; white-space: nowrap; gap: 8px; scrollbar-width: none; }
        .btn-s { padding: 8px 14px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .total-label { position: fixed; top: 72px; right: 15px; font-size: 12px; font-weight: bold; color: var(--accent); z-index: 950; }

        main { padding: 130px 10px 80px; }
        
        /* 그리드 뷰: 모바일 3열 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 800px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; position: relative; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); }
        .lp-item.selected::after { content: '✓'; position: absolute; inset: 0; background: rgba(0,242,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: bold; }
        
        /* 밝은 투명화 (보유X 또는 미출시) */
        .is-dimmed { opacity: 0.4; filter: brightness(1.6); }

        /* 상세 페이지 레이아웃 */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .d-right { flex: 5; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { 
            .d-flex { flex-direction: column; } 
            .d-left { height: 45vh; flex: none; } 
            .d-right { padding: 20px; flex: none; } 
        }

        /* 표 모드 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #222; text-align: left; font-size: 12px; color: var(--text); }
        .t-img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; }

        /* 폼 요소 */
        input, select, textarea { width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none; }
        .price-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; cursor: pointer; width: fit-content; }
        .check-wrap input { width: 22px; height: 22px; margin: 0; cursor: pointer; }

        /* 하단 일괄 삭제 바 */
        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 1500; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader"><div id="lmsg" style="color:var(--accent); font-weight: bold; letter-spacing: 2px;">SYNCING...</div></div>

<div id="loginPage" style="display:none; text-align:center; padding-top:35vh;">
    <h1 style="letter-spacing:10px; margin-bottom:40px;">VINYL ARCHIVE</h1>
    <input type="password" id="pin" style="width:200px; text-align:center; font-size: 20px;" placeholder="PIN" onkeyup="if(event.keyCode==13)doLogin()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="navBack" class="btn-s" style="display:none;" onclick="go('list')">← BACK</button>
            <span style="font-weight:900; letter-spacing:2px; font-size:18px; margin-left:5px;">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:12px; align-items: center;">
            <span id="viewIcon" onclick="toggleView()" style="cursor:pointer; font-size:22px;">▦</span>
            <button onclick="go('add')" style="background:var(--accent); color:#000; border:none; padding:6px 18px; border-radius:20px; font-weight:bold; font-size:12px;">ADD</button>
            <span onclick="toggleEditMode()" id="editToggleBtn" style="cursor:pointer; color:var(--dim); font-size:13px;">EDIT</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <button id="s-id" class="btn-s active" onclick="setSort('id')">등록순 ↓</button>
        <button id="s-title" class="btn-s" onclick="setSort('title')">앨범명</button>
        <button id="s-artist" class="btn-s" onclick="setSort('artist')">가수명</button>
        <button id="s-release_date" class="btn-s" onclick="setSort('release_date')">발매일</button>
        <button id="s-purchase_date" class="btn-s" onclick="setSort('purchase_date')">구매일</button>
        <button id="s-price" class="btn-s" onclick="setSort('price')">가격순</button>
        <button id="s-country" class="btn-s" onclick="setSort('country')">나라순</button>
        <button onclick="fCountry()" class="btn-s" id="fcBtn">나라: 전체</button>
        <button onclick="fOwned()" class="btn-s" id="foBtn">보유여부: 전체</button>
    </div>
    <div class="total-label" id="totalCount">0</div>

    <main>
        <section id="list" class="page active">
            <div id="grid-view" class="grid"></div>
            <div id="table-view" style="display:none;">
                <table>
                    <thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
                <button class="btn-s" style="margin-top:20px;" onclick="go('list')">← BACK</button>
            </div>
        </section>

        <section id="add" class="page">
            <h2 id="formTitle" style="color:var(--accent);">NEW ARCHIVE</h2>
            <input type="hidden" id="edit-id">
            
            <div class="check-wrap">
                <input type="checkbox" id="f-owned" checked>
                <label for="f-owned" style="color:#fff; font-weight:bold;">보유 중</label>
            </div>

            <label style="font-size:11px; color:var(--dim);">ALBUM PHOTO (일괄 업로드 가능)</label>
            <input type="file" id="f-img" accept="image/*" multiple onchange="handleFiles(this)">
            
            <input type="text" id="f-title" placeholder="앨범명">
            <input type="text" id="f-artist" placeholder="가수명">
            
            <label style="font-size:11px; color:var(--dim);">COUNTRY</label>
            <select id="f-country">
                <option value="한국">한국</option>
                <option value="일본">일본</option>
                <option value="기타">기타</option>
            </select>
            
            <label style="font-size:11px; color:var(--dim);">정가 (통화 / 가격 / 환율)</label>
            <div class="price-row">
                <select id="f-lcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-lprice" placeholder="0">
                <input type="number" id="f-lex" value="1">
            </div>

            <label style="font-size:11px; color:var(--dim);">구매가 (통화 / 가격 / 환율)</label>
            <div class="price-row">
                <select id="f-pcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-pprice" placeholder="0">
                <input type="number" id="f-pex" value="1">
            </div>
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">발매일</label><input type="date" id="f-rd"></div>
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">구매일</label><input type="date" id="f-pd"></div>
            </div>

            <textarea id="f-memo" rows="5" placeholder="메모를 입력하세요..."></textarea>
            
            <button onclick="saveArchive()" style="width:100%; padding:20px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">SAVE ARCHIVE</button>
            <button class="btn-s" style="margin-top:20px; width:100%; height:50px;" onclick="go('list')">← BACK</button>
        </section>
    </main>
</div>

<div id="detail">
    <button onclick="closeDetail()" style="position:fixed; top:25px; left:20px; z-index:3000; background:rgba(255,255,255,0.2); color:#fff; border:none; width:45px; height:45px; border-radius:50%; font-size:20px; cursor:pointer;">←</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img" style="max-width:95%; box-shadow: 0 0 30px rgba(0,0,0,0.5);"></div>
        <div class="d-right">
            <h1 id="d-title" style="margin:0; font-size:28px;"></h1>
            <p id="d-artist" style="font-size:18px; color:var(--dim); margin: 8px 0 25px 0;"></p>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; border-top:1px solid #222; padding-top:20px;">
                <div><label style="font-size:10px; color:var(--dim);">COUNTRY</label><div id="d-c"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">STATUS</label><div id="d-s"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">RELEASE DATE</label><div id="d-rd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">PURCHASE DATE</label><div id="d-pd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">LIST PRICE</label><div id="d-lp"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">PURCHASE PRICE</label><div id="d-pp"></div></div>
            </div>
            
            <div id="d-memo" style="margin-top:25px; background:#111; padding:15px; border-radius:8px; line-height:1.6; white-space:pre-wrap; font-size:14px;"></div>
            
            <div style="margin-top:40px; display:flex; gap:12px;">
                <button onclick="startEdit()" style="flex:1; padding:16px; background:#222; color:#fff; border:1px solid #444; border-radius:8px; font-weight:bold; cursor:pointer;">EDIT</button>
                <button id="singleDelBtn" style="flex:1; padding:16px; background:none; color:#ff4d4d; border:1px solid #ff4d4d; border-radius:8px; font-weight:bold; cursor:pointer;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<div id="batch-bar">
    <span id="selCountText">0 SELECTED</span>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleEditMode()" style="background:none; border:1px solid #000; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">CANCEL</button>
        <button onclick="deleteSelected()" style="background:#000; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">DELETE ALL</button>
    </div>
</div>

<script>
    /** 환경 설정 **/
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH2taj9ireUIjWQA_FGP55Z5nKCzLl3Zl5Oh09_HHrXIAU5dYA7w8V3Hokgggsht86/exec'; // 배포된 구글 앱 스크립트 URL을 넣으세요.
    const LOGIN_PIN = '142857'; // 초기 비밀번호

    let db = [], selectedIds = [], isEditMode = false, vMode = 'grid', sortKey = 'id', isAsc = false;
    let currentFilterC = 'All', currentFilterO = 'All', uploadImgB64 = "";

    // 초기 실행
    window.onload = () => {
        if(localStorage.getItem('vinyl_archive_auth') === 'true') {
            initApp();
        } else {
            document.getElementById('loginPage').style.display = 'block';
        }
    };

    function doLogin() {
        if(document.getElementById('pin').value === LOGIN_PIN) {
            localStorage.setItem('vinyl_archive_auth', 'true');
            initApp();
        } else {
            alert('비밀번호가 틀렸습니다.');
        }
    }

    async function initApp() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await refreshData();
    }

    async function refreshData() {
        showLoader(true, '데이터 불러오는 중...');
        try {
            const response = await fetch(SCRIPT_URL);
            db = await response.json();
            renderList();
        } catch(e) { console.error("Data Load Error:", e); }
        showLoader(false);
    }

    function go(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('navBack').style.display = (pageId === 'list' ? 'none' : 'block');
        document.getElementById('toolbar').style.display = (pageId === 'list' ? 'flex' : 'none');
        if(pageId === 'add') {
            document.getElementById('edit-id').value = "";
            resetForm();
        }
    }

    // 날짜 포맷 (2025-11-17 -> 2025년 11월 17일)
    function dateDisplay(str) {
        if(!str || str.length < 10) return str || '-';
        const parts = str.split('-');
        return `${parts[0]}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
    }

    // 이미지 1:1 크롭 및 압축
    async function processImage(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    canvas.width = 600; canvas.height = 600;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, (img.width - size)/2, (img.height - size)/2, size, size, 0, 0, 600, 600);
                    res(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    async function handleFiles(input) {
        if(!input.files.length) return;
        if(input.files.length > 1) { // 일괄 업로드 모드
            showLoader(true, '일괄 업로드 중... 잠시만 기다려주세요.');
            for(let f of input.files) {
                const b64 = await processImage(f);
                const payload = {
                    action: 'add',
                    id: 'V' + Date.now() + Math.random().toString(36).substr(2, 5),
                    owned: true, title: '정보 입력 필요', artist: '-', country: '기타',
                    l_curr: '₩', l_ex: 1, p_curr: '₩', p_ex: 1, list_price: 0, purchase_price: 0,
                    release_date: '', purchase_date: new Date().toISOString().split('T')[0],
                    memo: '', image: b64
                };
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            }
            location.reload();
        } else {
            uploadImgB64 = await processImage(input.files[0]);
        }
    }

    function setSort(key) {
        if(sortKey === key) isAsc = !isAsc;
        else { sortKey = key; isAsc = (key === 'id' ? false : true); }
        renderList();
    }

    function renderList() {
        const today = new Date().toISOString().split('T')[0];
        let filtered = db.filter(item => (currentFilterC === 'All' || item.country === currentFilterC));
        if(currentFilterO !== 'All') filtered = filtered.filter(item => (currentFilterO === '보유' ? item.owned : !item.owned));
        
        // 정렬 로직 (한국-일본-기타 / 한글-일어-영어 / 가격 환산 기준)
        const collator = new Intl.Collator('ja', { sensitivity: 'base' });
        filtered.sort((a, b) => {
            let vA = a[sortKey], vB = b[sortKey];
            if(sortKey === 'price') {
                vA = Number(a.list_price||0) * Number(a.l_ex||1);
                vB = Number(b.list_price||0) * Number(b.l_ex||1);
            } else if(sortKey === 'country') {
                const p = {"한국":1, "일본":2, "기타":3};
                vA = p[vA]||9; vB = p[vB]||9;
            } else if(['title', 'artist'].includes(sortKey)) {
                const getP = (s) => {
                    const c = String(s||"").charAt(0);
                    if(/[ㄱ-ㅎ가-힣]/.test(c)) return 1;
                    if(/[\u3040-\u30ff\u4e00-\u9faf]/.test(c)) return 2;
                    return 3;
                };
                const pA = getP(vA), pB = getP(vB);
                if(pA !== pB) return isAsc ? pA - pB : pB - pA;
                return isAsc ? collator.compare(vA, vB) : collator.compare(vB, vA);
            }
            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.getElementById('totalCount').innerText = `TOTAL: ${filtered.length}`;
        
        // 정렬 버튼 활성화 표시
        document.querySelectorAll('.toolbar .btn-s').forEach(btn => {
            btn.classList.remove('active');
            if(btn.id === 's-'+sortKey) {
                btn.classList.add('active');
                btn.innerText = btn.innerText.split(' ')[0] + (isAsc ? ' ↑' : ' ↓');
            }
        });

        if(vMode === 'grid') {
            document.getElementById('table-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'grid';
            document.getElementById('grid-view').innerHTML = filtered.map(item => {
                const isDim = (!item.owned || (item.release_date && item.release_date > today)) ? 'is-dimmed' : '';
                const isSel = selectedIds.includes(String(item.id)) ? 'selected' : '';
                return `<div class="lp-item ${isDim} ${isSel}" onclick="itemClick('${item.id}')"><img src="${item.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('table-view').style.display = 'block';
            document.getElementById('table-body').innerHTML = filtered.map((item, idx) => {
                const isSel = selectedIds.includes(String(item.id)) ? 'selected' : '';
                return `<tr onclick="itemClick('${item.id}')" class="${isSel}">
                    <td>${idx+1}</td>
                    <td><img src="${item.image}" class="t-img"></td>
                    <td>${item.title}</td><td>${item.artist}</td>
                    <td>${item.release_date}</td><td>${item.purchase_date}</td>
                </tr>`;
            }).join('');
        }
    }

    function itemClick(id) {
        if(isEditMode) {
            const sid = String(id);
            if(selectedIds.includes(sid)) selectedIds = selectedIds.filter(x => x !== sid);
            else selectedIds.push(sid);
            document.getElementById('selCountText').innerText = `${selectedIds.length} SELECTED`;
            renderList();
        } else {
            openDetail(id);
        }
    }

    function openDetail(id) {
        const item = db.find(x => String(x.id) === String(id));
        if(!item) return;
        
        window.activeDetailId = id;
        document.getElementById('d-img').src = item.image;
        document.getElementById('d-title').innerText = item.title;
        document.getElementById('d-artist').innerText = item.artist;
        document.getElementById('d-c').innerText = item.country;
        document.getElementById('d-s').innerText = item.owned ? "보유 중" : "미보유";
        document.getElementById('d-rd').innerText = dateDisplay(item.release_date);
        document.getElementById('d-pd').innerText = dateDisplay(item.purchase_date);
        document.getElementById('d-memo').innerText = item.memo || "메모가 없습니다.";
        
        const priceFmt = (val, curr, ex) => {
            if(!val || val == 0) return (curr || '₩') + " 0";
            if(curr === '₩') return `₩ ${Number(val).toLocaleString()}`;
            return `${curr}${Number(val).toLocaleString()} (약 ₩${Math.floor(val * ex).toLocaleString()})`;
        };
        document.getElementById('d-lp').innerText = priceFmt(item.list_price, item.l_curr, item.l_ex);
        document.getElementById('d-pp').innerText = priceFmt(item.purchase_price, item.p_curr, item.p_ex);
        
        document.getElementById('detail').style.display = 'block';
        
        // 상세창 삭제 버튼 이벤트 (버그 해결 핵심: 클로저 방지 및 정확한 ID 전달)
        const delBtn = document.getElementById('singleDelBtn');
        delBtn.onclick = () => deleteOne(id);
    }

    async function saveArchive() {
        const eid = document.getElementById('edit-id').value;
        showLoader(true, '저장 중...');
        
        const payload = {
            action: eid ? 'edit' : 'add',
            id: eid || ('V' + Date.now() + Math.random().toString(36).substr(2, 5)),
            owned: document.getElementById('f-owned').checked,
            title: document.getElementById('f-title').value,
            artist: document.getElementById('f-artist').value,
            country: document.getElementById('f-country').value,
            l_curr: document.getElementById('f-lcurr').value,
            l_ex: document.getElementById('f-lex').value,
            p_curr: document.getElementById('f-pcurr').value,
            p_ex: document.getElementById('f-pex').value,
            list_price: document.getElementById('f-lprice').value,
            purchase_price: document.getElementById('f-pprice').value,
            release_date: document.getElementById('f-rd').value,
            purchase_date: document.getElementById('f-pd').value,
            memo: document.getElementById('f-memo').value,
            image: uploadImgB64 || (eid ? db.find(x => String(x.id) === String(eid)).image : "")
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        } catch(e) { alert("저장 실패"); showLoader(false); }
    }

    // 단일 삭제 함수 (상세 창 전용)
    async function deleteOne(id) {
        if(!confirm('이 앨범을 삭제하시겠습니까?')) return;
        showLoader(true, '삭제 중...');
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete', id: String(id) }) 
            });
            location.reload();
        } catch(e) { alert("삭제 실패"); showLoader(false); }
    }

    // 선택 삭제 함수
    async function deleteSelected() {
        if(!selectedIds.length) return;
        if(!confirm(`${selectedIds.length}개의 항목을 삭제하시겠습니까?`)) return;
        showLoader(true, '일괄 삭제 중...');
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete', id: selectedIds }) 
            });
            location.reload();
        } catch(e) { alert("삭제 실패"); showLoader(false); }
    }

    function startEdit() {
        const item = db.find(x => String(x.id) === String(window.activeDetailId));
        closeDetail(); 
        go('add');
        document.getElementById('formTitle').innerText = "EDIT ARCHIVE";
        document.getElementById('edit-id').value = item.id;
        document.getElementById('f-owned').checked = item.owned;
        document.getElementById('f-title').value = item.title;
        document.getElementById('f-artist').value = item.artist;
        document.getElementById('f-country').value = item.country;
        document.getElementById('f-lcurr').value = item.l_curr;
        document.getElementById('f-lex').value = item.l_ex;
        document.getElementById('f-lprice').value = item.list_price;
        document.getElementById('f-pcurr').value = item.p_curr;
        document.getElementById('f-pex').value = item.p_ex;
        document.getElementById('f-pprice').value = item.purchase_price;
        document.getElementById('f-rd').value = item.release_date;
        document.getElementById('f-pd').value = item.purchase_date;
        document.getElementById('f-memo').value = item.memo;
    }

    /** UI 제어 함수 **/
    function toggleView() { 
        vMode = (vMode === 'grid' ? 'table' : 'grid'); 
        document.getElementById('viewIcon').innerText = (vMode === 'grid' ? '▦' : '≡'); 
        renderList(); 
    }
    function toggleEditMode() { 
        isEditMode = !isEditMode; 
        selectedIds = []; 
        document.getElementById('batch-bar').style.display = (isEditMode ? 'flex' : 'none'); 
        renderList(); 
    }
    function fCountry() {
        const opts = ['All', '한국', '일본', '기타'];
        currentFilterC = opts[(opts.indexOf(currentFilterC) + 1) % opts.length];
        document.getElementById('fcBtn').innerText = `나라: ${currentFilterC}`;
        renderList();
    }
    function fOwned() {
        const opts = ['All', '보유', '미보유'];
        currentFilterO = opts[(opts.indexOf(currentFilterO) + 1) % opts.length];
        document.getElementById('foBtn').innerText = `보유여부: ${currentFilterO}`;
        renderList();
    }
    function showLoader(s, t) { 
        document.getElementById('lmsg').innerText = t; 
        document.getElementById('loader').style.display = s ? 'flex' : 'none'; 
    }
    function closeDetail() { document.getElementById('detail').style.display = 'none'; }
    function resetForm() { 
        uploadImgB64 = ""; 
        document.getElementById('f-title').value = ""; 
        document.getElementById('f-artist').value = ""; 
        document.getElementById('f-img').value = ""; 
        document.getElementById('f-memo').value = "";
    }
</script>
</body>
</html>
