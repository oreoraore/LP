<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --text: #eee; --accent: #bb86fc; --dim: #888; --nav-bg: rgba(0,0,0,0.9); --border: #333; }
        * { box-sizing: border-box; font-family: -apple-system, "Malgun Gothic", sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; }
        
        /* 네비게이션 & 정렬바 */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid var(--border); padding: 0 15px; }
        .nav-left, .nav-right { display: flex; gap: 5px; }
        nav button { background: none; border: none; color: var(--text); font-weight: bold; cursor: pointer; font-size: 14px; padding: 10px; }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .view-toggle { font-size: 18px !important; padding: 10px 15px !important; opacity: 0.5; }
        .view-toggle.active { opacity: 1; color: var(--accent); }

        .sort-bar { position: fixed; top: 60px; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 6px; overflow-x: auto; z-index: 90; border-bottom: 1px solid #222; scrollbar-width: none; }
        .sort-btn { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--dim); font-size: 12px; cursor: pointer; }
        .sort-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187,134,252,0.1); }

        main { padding: 130px 10px 40px; max-width: 1200px; margin: 0 auto; }
        section { display: none; }
        section.active { display: block; }

        /* --- 그리드 보기 --- */
        .lp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        @media (max-width: 600px) { .lp-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
        .lp-item { aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .flag-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.7); padding: 2px 7px; border-radius: 4px; font-size: 10px; color: var(--accent); border: 1px solid var(--accent); }

        /* --- 리스트 보기 (요청사항 반영) --- */
        .lp-list { display: flex; flex-direction: column; gap: 2px; background: #222; border-radius: 8px; overflow: hidden; }
        .list-header { background: #111; padding: 12px 15px; display: grid; grid-template-columns: 60px 2fr 1.5fr 1fr 1fr; gap: 15px; font-size: 12px; color: var(--dim); font-weight: bold; border-bottom: 1px solid #333; }
        .list-item { background: var(--card); padding: 12px 15px; display: grid; grid-template-columns: 60px 2fr 1.5fr 1fr 1fr; gap: 15px; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #222; }
        .list-item:hover { background: #252525; }
        .list-img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .list-title { color: #fff; font-weight: bold; font-size: 14px; }
        .list-artist { color: #bbb; font-size: 14px; }
        .list-date { color: var(--dim); font-size: 13px; }

        @media (max-width: 768px) {
            .list-header { display: none; }
            .list-item { grid-template-columns: 50px 1.5fr 1fr; grid-template-rows: auto auto; gap: 8px 12px; }
            .list-img { grid-row: 1 / 3; }
            .list-title { grid-column: 2 / 4; font-size: 15px; }
            .list-artist { grid-column: 2; color: var(--accent); font-size: 13px; }
            .list-date { text-align: right; font-size: 11px; }
            .list-date::before { content: attr(data-label) ": "; font-size: 10px; opacity: 0.7; }
        }

        /* 상세보기 모달 */
        #detail { position: fixed; inset: 0; background: #000; z-index: 500; display: none; overflow-y: auto; }
        .d-container { display: flex; min-height: 100vh; }
        .d-img-side { flex: 0 0 50%; background: #050505; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; height: 100vh; padding: 20px; }
        .d-img-side img { max-width: 100%; max-height: 85%; object-fit: contain; }
        .d-info-side { flex: 0 0 50%; padding: 60px; background: #0b0b0b; position: relative; display: flex; flex-direction: column; justify-content: center; }
        
        .dt-dates-box { border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 20px 0; margin: 20px 0; }
        .dt-date-row { font-size: 16px; margin-bottom: 8px; color: #fff; }
        .dt-date-label { color: var(--dim); width: 80px; display: inline-block; font-size: 14px; }
        .dt-memo { font-size: 15px; line-height: 1.8; color: #ccc; background: #151515; padding: 20px; border-radius: 10px; border-left: 4px solid var(--accent); }

        /* 공통 버튼 & 로딩 */
        .close-x { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 24px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; color: #fff; flex-direction: column; gap: 10px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 폼 스타일 */
        .f-group { margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: #fff; }
        .save-btn { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>처리 중...</span></div>

<div id="loginView">
    <div style="text-align: center;">
        <h1 style="color:#fff; margin-bottom:30px; letter-spacing:5px; font-size: 18px;">VINYL ARCHIVE</h1>
        <input type="password" id="pw" style="text-align:center; width:240px;" placeholder="Password" onkeyup="if(event.keyCode==13)doLogin()">
    </div>
</div>

<div id="app" style="display: none;">
    <nav>
        <div class="nav-left">
            <button onclick="go('list')" id="nav-list" class="active">VIEW</button>
            <button onclick="go('add')" id="nav-add">ADD</button>
        </div>
        <div class="nav-right">
            <button onclick="switchView('grid')" id="btn-grid" class="view-toggle active">▦</button>
            <button onclick="switchView('list')" id="btn-list" class="view-toggle">▤</button>
            <button onclick="go('set')" id="nav-set" style="font-size:18px;">⚙</button>
        </div>
    </nav>

    <div id="sortBar" class="sort-bar">
        <button class="sort-btn active" onclick="sortData('id')">등록순</button>
        <button class="sort-btn" onclick="sortData('artist')">가수순</button>
        <button class="sort-btn" onclick="sortData('release_date')">발매일순</button>
        <button id="filterBtn" class="sort-btn" onclick="filterCountry()">나라: All</button>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="list-view" class="lp-list" style="display:none;">
                </div>
        </section>

        <section id="add">
            <h2 id="formTitle">새 앨범 등록</h2>
            <input type="hidden" id="editId">
            <div class="f-group"><label>자켓 사진</label><input type="file" id="file" accept="image/*"></div>
            <div class="f-group"><input type="text" id="t" placeholder="앨범 제목"></div>
            <div class="f-group"><input type="text" id="a" placeholder="아티스트명"></div>
            <div class="f-group">
                <select id="country">
                    <option value="한국">한국 (₩)</option>
                    <option value="일본">일본 (¥)</option>
                    <option value="미국">미국 ($)</option>
                </select>
            </div>
            <div class="f-group"><input type="number" id="ex_rate" step="0.01" placeholder="환율 (엔화 9.1 등)"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <input type="number" id="lp_raw" placeholder="출고가">
                <input type="number" id="pp_raw" placeholder="구매가">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;" class="f-group">
                <div><label>발매일</label><input type="date" id="rd"></div>
                <div><label>구매일</label><input type="date" id="pd"></div>
            </div>
            <div class="f-group"><textarea id="m" rows="5" placeholder="메모"></textarea></div>
            <button class="save-btn" id="saveBtn" onclick="save()">저장하기</button>
        </section>

        <section id="set">
            <button class="save-btn" style="background:#333; color:#fff;" onclick="logout()">로그아웃</button>
        </section>
    </main>
</div>

<div id="detail">
    <button class="close-x" onclick="closeD()">✕</button>
    <div class="d-container">
        <div class="d-img-side"><img id="di" src=""></div>
        <div class="d-info-side">
            <span id="dc" class="dt-country"></span>
            <h1 id="dt" style="font-size:28px; margin:0; color:#fff;"></h1>
            <p id="da" style="font-size:18px; color:var(--dim); margin:10px 0 20px;"></p>
            
            <div style="margin-bottom:20px;">
                <div style="margin-bottom:10px;"><span class="dt-label">List Price</span><span id="dlp" class="dt-val"></span></div>
                <div><span class="dt-label">Purchase Price</span><span id="dpp" class="dt-val"></span></div>
            </div>

            <div class="dt-dates-box">
                <div class="dt-date-row"><span class="dt-date-label">발매일</span><span id="drd"></span></div>
                <div class="dt-date-row"><span class="dt-date-label">구매일</span><span id="dpd"></span></div>
            </div>

            <div id="dm" class="dt-memo"></div>
            
            <div style="display:flex; gap:10px; margin-top:30px;">
                <button class="save-btn" style="background:#333; color:#fff; flex:1;" id="editActionBtn">수정</button>
                <button class="save-btn" style="background:transparent; color:#ff5555; border:1px solid #ff5555; flex:1;" id="delBtn">삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyuoRW9cIe35YTqdQF6iBP937apMEO2IK91CFlWxQb_z-nJ6JGg198kNJTmIWTd1H0A/exec'; 
    const MY_PASSWORD = '142857';

    let items = [];
    let currentFilter = 'All';
    let currentView = localStorage.getItem('vinyl_view') || 'grid';

    function doLogin() {
        if(document.getElementById('pw').value === MY_PASSWORD) {
            sessionStorage.setItem('vinyl_auth', 'true');
            startApp();
        } else alert('비번 오류');
    }
    function logout() { sessionStorage.removeItem('vinyl_auth'); location.reload(); }

    function startApp() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        switchView(currentView);
        loadData();
    }

    async function loadData() {
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(WEB_APP_URL);
            items = await res.json();
            items.forEach(i => {
                if(i.release_date) i.release_date = String(i.release_date).split('T')[0];
                if(i.purchase_date) i.purchase_date = String(i.purchase_date).split('T')[0];
            });
            sortData('id');
        } catch(e) { alert("로드 실패"); }
        document.getElementById('loader').style.display = 'none';
    }

    function switchView(type) {
        currentView = type;
        localStorage.setItem('vinyl_view', type);
        document.querySelectorAll('.view-toggle').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        document.getElementById('grid-view').style.display = (type === 'grid' ? 'grid' : 'none');
        document.getElementById('list-view').style.display = (type === 'list' ? 'flex' : 'none');
        render();
    }

    function sortData(key) {
        items.sort((a, b) => {
            if(key === 'artist') return String(a.artist).localeCompare(String(b.artist));
            return (b[key] || 0) > (a[key] || 0) ? 1 : -1;
        });
        render();
    }

    function render() {
        const filtered = currentFilter === 'All' ? items : items.filter(i => i.country === currentFilter);
        
        // 그리드 렌더링
        document.getElementById('grid-view').innerHTML = filtered.map(i => `
            <div class="lp-item" onclick="openD('${i.id}')">
                <img src="${i.image}" loading="lazy">
                <div class="flag-badge">${i.country}</div>
            </div>
        `).join('');

        // 리스트 렌더링 (헤더 + 내용 분리)
        const listHTML = `
            <div class="list-header">
                <div>Cover</div><div>Album</div><div>Artist</div><div>Released</div><div>Purchased</div>
            </div>
            ${filtered.map(i => `
                <div class="list-item" onclick="openD('${i.id}')">
                    <img src="${i.image}" class="list-img">
                    <div class="list-title">${i.title}</div>
                    <div class="list-artist">${i.artist || '-'}</div>
                    <div class="list-date" data-label="Released">${i.release_date || '-'}</div>
                    <div class="list-date" data-label="Purchased">${i.purchase_date || '-'}</div>
                </div>
            `).join('')}
        `;
        document.getElementById('list-view').innerHTML = listHTML;
    }

    async function save() {
        const editId = document.getElementById('editId').value;
        document.getElementById('loader').style.display = 'flex';
        
        const fileInput = document.getElementById('file');
        let imageData = "";
        if (fileInput.files.length > 0) {
            imageData = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = (e) => resolve(e.target.result);
                r.readAsDataURL(fileInput.files[0]);
            });
        }

        const payload = {
            action: editId ? 'edit' : 'add',
            id: editId || Date.now(),
            title: document.getElementById('t').value,
            artist: document.getElementById('a').value,
            list_price: document.getElementById('lp_raw').value,
            purchase_price: document.getElementById('pp_raw').value,
            release_date: document.getElementById('rd').value,
            purchase_date: document.getElementById('pd').value,
            memo: document.getElementById('m').value,
            image: imageData,
            country: document.getElementById('country').value,
            ex_rate: document.getElementById('ex_rate').value
        };

        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function openD(id) {
        const i = items.find(x => x.id == id);
        document.getElementById('di').src = i.image;
        document.getElementById('dt').innerText = i.title;
        document.getElementById('da').innerText = i.artist;
        document.getElementById('dc').innerText = i.country;
        document.getElementById('dlp').innerText = i.list_price_display;
        document.getElementById('dpp').innerText = i.purchase_price_display;
        document.getElementById('drd').innerText = i.release_date || '-';
        document.getElementById('dpd').innerText = i.purchase_date || '-';
        document.getElementById('dm').innerHTML = (i.memo || '').replace(/\n/g, '<br>');
        document.getElementById('detail').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('delBtn').onclick = () => deleteItem(i.id);
        document.getElementById('editActionBtn').onclick = () => startEdit(i.id);
    }

    function startEdit(id) {
        const i = items.find(x => x.id == id);
        closeD(); go('add');
        document.getElementById('editId').value = i.id;
        document.getElementById('t').value = i.title;
        document.getElementById('a').value = i.artist;
        document.getElementById('lp_raw').value = i.list_price;
        document.getElementById('pp_raw').value = i.purchase_price;
        document.getElementById('rd').value = i.release_date;
        document.getElementById('pd').value = i.purchase_date;
        document.getElementById('m').value = i.memo;
        document.getElementById('country').value = i.country;
        document.getElementById('ex_rate').value = i.ex_rate;
    }

    function closeD() { document.getElementById('detail').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function go(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sortBar').style.display = (id === 'list' ? 'flex' : 'none');
    }
    async function deleteItem(id) {
        if(!confirm('삭제?')) return;
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
        location.reload();
    }
    window.onload = () => { if(sessionStorage.getItem('vinyl_auth') === 'true') startApp(); };
</script>
</body>
</html>
