<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --card: #111; --text: #fff; --accent: #00f2ff; --dim: #888; --border: #222; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* 부드러운 화면 전환 */
        .page { display: none; opacity: 0; transition: 0.3s ease; animation: fadeIn 0.4s forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; }
        
        .btn-s { padding: 6px 12px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); font-size: 11px; margin-right: 6px; cursor: pointer; white-space: nowrap; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .total-box { position: fixed; top: 72px; right: 15px; font-size: 13px; font-weight: bold; color: var(--accent); z-index: 950; }

        /* 뷰어: 모바일 3개씩 */
        main { padding: 120px 15px 80px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; } }
        
        .lp-item { aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent); transform: scale(0.95); }
        .lp-item.selected::after { content: '✓'; position: absolute; inset: 0; background: rgba(0,242,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: bold; }
        
        /* 밝게 투명화 */
        .is-dimmed { opacity: 0.4; filter: brightness(1.5); }

        /* 상세 페이지 50:50 */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; position: sticky; top: 0; height: 100vh; }
        .d-right { flex: 5; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { .d-flex { flex-direction: column; } .d-left { height: 45vh; position: relative; } .d-right { padding: 20px; } }

        /* 표 모드 */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #222; text-align: left; font-size: 12px; }
        .t-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        input, select, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .price-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; }
        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; z-index: 1500; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top:4px solid var(--accent); border-radius:50%; animation: spin 0.8s linear infinite;"></div><p id="lmsg" style="margin-top:15px; font-size:12px; color:var(--accent);"></p></div>

<div id="loginPage" style="display:none; text-align:center; padding-top:40vh;">
    <h1 style="letter-spacing:10px; margin-bottom:30px;">VINYL ARCHIVE</h1>
    <input type="password" id="pin" style="width:200px; text-align:center; letter-spacing:8px;" placeholder="PIN" onkeyup="if(event.keyCode==13)doLogin()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="navBack" class="btn-s" style="display:none;" onclick="go('list')">← BACK</button>
            <span style="font-weight:900; letter-spacing:2px; font-size:18px;">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <span onclick="toggleV()" id="vIcon" style="cursor:pointer; font-size:20px;">▦</span>
            <button onclick="go('add')" style="background:var(--accent); color:#000; border:none; padding:4px 12px; border-radius:20px; font-weight:bold; font-size:12px;">ADD</button>
            <span onclick="toggleE()" id="eBtn" style="cursor:pointer; color:var(--dim); font-size:13px;">EDIT</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <button id="s-id" class="btn-s active" onclick="sort('id')">등록순 ↓</button>
        <button id="s-title" class="btn-s" onclick="sort('title')">앨범명</button>
        <button id="s-artist" class="btn-s" onclick="sort('artist')">가수명</button>
        <button id="s-release_date" class="btn-s" onclick="sort('release_date')">발매일</button>
        <button id="s-purchase_date" class="btn-s" onclick="sort('purchase_date')">구매일</button>
        <button id="s-price" class="btn-s" onclick="sort('price')">가격순</button>
        <button id="s-country" class="btn-s" onclick="sort('country')">나라순</button>
        <button onclick="fC()" class="btn-s" id="fc">국가: 전체</button>
        <button onclick="fO()" class="btn-s" id="fo">상태: 전체</button>
    </div>
    <div class="total-box" id="totalCount">0</div>

    <main>
        <section id="list" class="page active">
            <div id="g-view" class="grid"></div>
            <div id="t-view" style="display:none; overflow-x:auto;">
                <table id="t-table">
                    <thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="t-body"></tbody>
                </table>
                <button class="btn-s" style="margin-top:20px;" onclick="go('list')">← BACK</button>
            </div>
        </section>

        <section id="add" class="page">
            <h2 id="fTitle">REGISTER</h2>
            <input type="hidden" id="eid">
            <label style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-weight:bold;">
                <input type="checkbox" id="f-owned" checked style="width:20px; height:20px;"> 보유 여부
            </label>
            <input type="file" id="f-img" accept="image/*" multiple onchange="handleFile(this)">
            <input type="text" id="f-title" placeholder="앨범명">
            <input type="text" id="f-artist" placeholder="가수명">
            <select id="f-country"><option value="한국">한국</option><option value="일본">일본</option><option value="기타">기타</option></select>
            
            <div class="price-row">
                <select id="f-lcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-lprice" placeholder="정가">
                <input type="number" id="f-lex" value="1" placeholder="환율">
            </div>
            <div class="price-row">
                <select id="f-pcurr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="f-pprice" placeholder="구매가">
                <input type="number" id="f-pex" value="1" placeholder="환율">
            </div>
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">발매일</label><input type="date" id="f-rd"></div>
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">구매일</label><input type="date" id="f-pd"></div>
            </div>
            <textarea id="f-memo" rows="4" placeholder="메모..."></textarea>
            <button onclick="save()" style="width:100%; padding:16px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:bold;">SAVE ARCHIVE</button>
            <button class="btn-s" style="margin-top:20px; width:100%;" onclick="go('list')">← BACK</button>
        </section>
    </main>
</div>

<div id="detail">
    <button onclick="closeD()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(0,0,0,0.5); color:#fff; border:none; width:45px; height:45px; border-radius:50%; font-size:22px;">←</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img"></div>
        <div class="d-right">
            <h1 id="d-title"></h1>
            <p id="d-artist" style="font-size:18px; color:var(--dim); margin-bottom:30px;"></p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; border-top:1px solid #222; padding-top:20px;">
                <div><label style="font-size:10px; color:var(--dim);">COUNTRY</label><div id="d-c"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">STATUS</label><div id="d-s"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">RELEASE</label><div id="d-rd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">PURCHASE</label><div id="d-pd"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">LIST PRICE</label><div id="d-lp"></div></div>
                <div><label style="font-size:10px; color:var(--dim);">PURCHASE PRICE</label><div id="d-pp"></div></div>
            </div>
            <div id="d-memo" style="margin-top:25px; background:#111; padding:15px; border-radius:6px; min-height:100px;"></div>
            <div style="margin-top:30px; display:flex; gap:15px;">
                <button onclick="startE()" style="flex:1; padding:12px; background:#222; color:#fff; border:1px solid #444; border-radius:6px;">EDIT</button>
                <button id="delBtn" style="flex:1; padding:12px; background:none; color:#ff4444; border:1px solid #ff4444; border-radius:6px;">DELETE</button>
            </div>
        </div>
    </div>
</div>

<div id="batch-bar">
    <span id="selCnt">0 SELECTED</span>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleE()" style="background:none; border:1px solid #000; padding:8px 15px; border-radius:4px;">CANCEL</button>
        <button onclick="batchDel()" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:4px;">DELETE SELECTION</button>
    </div>
</div>

<script>
    const G_URL = 'https://script.google.com/macros/s/AKfycbx8PjfyyhGgyHhBSdgDQrsN_djhEBkYggT2J04S9Q8pYCJai7RyO6sTlk4-tFtW2Ij2/exec';
    const G_PIN = '142857'; // 초기 비밀번호

    let db = [], selIds = [], isEditMode = false, vMode = 'grid', sKey = 'id', isAsc = false;
    let f_c = 'All', f_o = 'All', tempB64 = "";

    window.onload = () => { if(localStorage.getItem('v_auth') === 'true') init(); else document.getElementById('loginPage').style.display='block'; };
    
    function doLogin() { 
        if(document.getElementById('pin').value === G_PIN) { 
            localStorage.setItem('v_auth', 'true'); 
            init(); 
        } else alert('Access Denied'); 
    }

    async function init() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await load();
    }

    async function load() {
        loading(true, 'FETCHING ARCHIVE...');
        try {
            const r = await fetch(G_URL);
            db = await r.json();
            render();
        } catch(e) { console.error(e); }
        loading(false);
    }

    function go(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page).classList.add('active');
        document.getElementById('navBack').style.display = (page === 'list' ? 'none' : 'block');
        document.getElementById('toolbar').style.display = (page === 'list' ? 'flex' : 'none');
        if(page === 'add') { document.getElementById('eid').value = ""; resetF(); }
    }

    // 이미지 1:1 리사이징 및 압축
    async function procImg(file) {
        return new Promise(res => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    cvs.width = 600; cvs.height = 600;
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 600, 600);
                    res(cvs.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    async function handleFile(input) {
        if(!input.files.length) return;
        if(input.files.length > 1) {
            loading(true, `${input.files.length} ITEMS BATCH UPLOADING...`);
            for(let f of input.files) {
                const b64 = await procImg(f);
                const payload = {
                    action: 'add', id: Date.now() + Math.random().toString(36).substr(2, 5), 
                    owned: true, title: 'New Entry', artist: '-', country: '기타',
                    l_curr: '₩', l_ex: 1, p_curr: '₩', p_ex: 1, list_price: 0, purchase_price: 0,
                    release_date: '', purchase_date: getToday(), memo: '', image: b64
                };
                await fetch(G_URL, { method: 'POST', body: JSON.stringify(payload) });
            }
            location.reload();
        } else {
            tempB64 = await procImg(input.files[0]);
        }
    }

    function getToday() {
        return new Date().toISOString().split('T')[0];
    }

    function sort(key) {
        if(sKey === key) isAsc = !isAsc;
        else { sKey = key; isAsc = (key === 'id' ? false : true); }
        render();
    }

    function render() {
        const today = getToday();
        let fData = db.filter(i => (f_c === 'All' || i.country === f_c));
        if(f_o !== 'All') fData = fData.filter(i => (f_o === '보유' ? i.owned : !i.owned));
        
        // 정밀 정렬 로직 (한국어 > 일본어 > 영어 순)
        const jaCollator = new Intl.Collator('ja', { sensitivity: 'base' });
        fData.sort((a, b) => {
            let vA = a[sKey], vB = b[sKey];
            if(sKey === 'price') {
                vA = Number(a.list_price||0) * Number(a.l_ex||1);
                vB = Number(b.list_price||0) * Number(b.l_ex||1);
            } else if(sKey === 'country') {
                const p = {"한국":1, "일본":2, "기타":3};
                vA = p[vA]||9; vB = p[vB]||9;
            } else if(['title', 'artist'].includes(sKey)) {
                const getP = (s) => {
                    const c = String(s||"").charAt(0);
                    if(/[ㄱ-ㅎ가-힣]/.test(c)) return 1;
                    if(/[\u3040-\u30ff\u4e00-\u9faf]/.test(c)) return 2;
                    if(/[a-zA-Z]/.test(c)) return 3;
                    return 4;
                };
                const pA = getP(vA), pB = getP(vB);
                if(pA !== pB) return isAsc ? pA - pB : pB - pA;
                return isAsc ? jaCollator.compare(vA, vB) : jaCollator.compare(vB, vA);
            }
            if(vA < vB) return isAsc ? -1 : 1;
            if(vA > vB) return isAsc ? 1 : -1;
            return 0;
        });

        document.getElementById('totalCount').innerText = `TOTAL: ${fData.length}`;
        document.querySelectorAll('.btn-s').forEach(b => {
            b.classList.remove('active');
            if(b.id === 's-'+sKey) { b.classList.add('active'); b.innerText = b.innerText.split(' ')[0] + (isAsc ? ' ↑' : ' ↓'); }
        });

        if(vMode === 'grid') {
            document.getElementById('t-view').style.display = 'none';
            document.getElementById('g-view').style.display = 'grid';
            document.getElementById('g-view').innerHTML = fData.map(i => {
                const isFut = i.release_date && i.release_date > today;
                const dim = (!i.owned || isFut) ? 'is-dimmed' : '';
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="itemClick('${i.id}')"><img src="${i.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('g-view').style.display = 'none';
            document.getElementById('t-view').style.display = 'block';
            document.getElementById('t-body').innerHTML = fData.map((i, idx) => {
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<tr onclick="itemClick('${i.id}')" class="${sel}">
                    <td>${idx+1}</td>
                    <td><img src="${i.image}" class="t-img"></td>
                    <td>${i.title}</td><td>${i.artist}</td>
                    <td>${i.release_date || '-'}</td>
                    <td>${i.purchase_date || '-'}</td>
                </tr>`;
            }).join('');
        }
    }

    function itemClick(id) {
        if(isEditMode) {
            const sid = String(id);
            if(selIds.includes(sid)) selIds = selIds.filter(x => x !== sid);
            else selIds.push(sid);
            document.getElementById('selCnt').innerText = `${selIds.length} SELECTED`;
            render();
        } else openD(id);
    }

    function openD(id) {
        const i = db.find(x => String(x.id) === String(id)); if(!i) return;
        window.activeId = id;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title;
        document.getElementById('d-artist').innerText = i.artist;
        document.getElementById('d-c').innerText = i.country;
        document.getElementById('d-s').innerText = i.owned ? "보유 중" : "미보유";
        document.getElementById('d-rd').innerText = i.release_date || '-';
        document.getElementById('d-pd').innerText = i.purchase_date || '-';
        document.getElementById('d-memo').innerText = i.memo || "";
        
        const fmt = (v, c, e) => {
            if(!v || v == 0) return (c||'₩') + " 0";
            if(c === '₩') return `₩ ${Number(v).toLocaleString()}`;
            const won = Math.floor(v * e);
            return `${c}${Number(v).toLocaleString()} (약 ₩${won.toLocaleString()})`;
        };
        document.getElementById('d-lp').innerText = fmt(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('d-pp').innerText = fmt(i.purchase_price, i.p_curr, i.p_ex);
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => del(id);
    }

    async function save() {
        loading(true, 'SAVING...');
        const eid = document.getElementById('eid').value;
        const payload = {
            action: eid ? 'edit' : 'add', 
            id: eid || (Date.now() + Math.random().toString(36).substr(2, 5)),
            owned: document.getElementById('f-owned').checked,
            title: document.getElementById('f-title').value, 
            artist: document.getElementById('f-artist').value,
            country: document.getElementById('f-country').value, 
            l_curr: document.getElementById('f-lcurr').value,
            l_ex: document.getElementById('f-lex').value, 
            p_curr: document.getElementById('f-pcurr').value,
            p_ex: document.getElementById('f-pex').value, 
            list_price: document.getElementById('f-lprice').value,
            purchase_price: document.getElementById('f-pprice').value, 
            release_date: document.getElementById('f-rd').value,
            purchase_date: document.getElementById('f-pd').value, // 문자열로 직접 저장 (시차 오류 수정)
            memo: document.getElementById('f-memo').value,
            image: tempB64 || (eid ? db.find(x => String(x.id) === String(eid)).image : "")
        };
        await fetch(G_URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    async function del(id) { 
        if(!confirm('정말 삭제하시겠습니까?')) return; 
        loading(true, 'DELETING...'); 
        await fetch(G_URL, { method: 'POST', body: JSON.stringify({action:'delete', id:String(id)}) }); 
        location.reload(); 
    }

    async function batchDel() { 
        if(!selIds.length || !confirm('선택한 항목을 일괄 삭제하시겠습니까?')) return; 
        loading(true, 'BATCH DELETING...'); 
        await fetch(G_URL, { method: 'POST', body: JSON.stringify({action:'delete', id:selIds}) }); 
        location.reload(); 
    }

    function startE() {
        const i = db.find(x => String(x.id) === String(window.activeId));
        closeD(); go('add');
        document.getElementById('fTitle').innerText = "EDIT ARCHIVE";
        document.getElementById('eid').value = i.id; 
        document.getElementById('f-owned').checked = i.owned;
        document.getElementById('f-title').value = i.title; 
        document.getElementById('f-artist').value = i.artist;
        document.getElementById('f-country').value = i.country; 
        document.getElementById('f-lcurr').value = i.l_curr;
        document.getElementById('f-lex').value = i.l_ex; 
        document.getElementById('f-lprice').value = i.list_price;
        document.getElementById('f-pcurr').value = i.p_curr; 
        document.getElementById('f-pex').value = i.p_ex;
        document.getElementById('f-pprice').value = i.purchase_price; 
        document.getElementById('f-rd').value = i.release_date;
        document.getElementById('f-pd').value = i.purchase_date;
        document.getElementById('f-memo').value = i.memo;
    }

    function toggleV() { vMode = (vMode==='grid'?'table':'grid'); document.getElementById('vIcon').innerText = (vMode==='grid'?'▦':'≡'); render(); }
    function toggleE() { isEditMode = !isEditMode; selIds = []; document.getElementById('batch-bar').style.display = (isEditMode?'flex':'none'); render(); }
