<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINYL ARCHIVE</title>
    <style>
        :root { --bg: #000; --card: #121212; --text: #fff; --accent: #bb86fc; --dim: #888; --border: #222; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Navigation & Transition */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--border); padding: 0 15px; transition: 0.3s; }
        .back-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; display: none; }
        
        /* Toolbar */
        .toolbar { position: fixed; top: 60px; width: 100%; background: var(--bg); z-index: 900; border-bottom: 1px solid var(--border); padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .sort-scroll { display: flex; gap: 8px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .btn-s { white-space: nowrap; padding: 6px 14px; border-radius: 20px; background: #1a1a1a; border: 1px solid var(--border); color: var(--dim); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-s.active { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(187, 134, 252, 0.1); }
        .total-box { font-size: 12px; color: var(--accent); font-weight: 800; padding-left: 10px; }

        /* Main Content */
        main { padding: 130px 15px 40px; max-width: 1200px; margin: 0 auto; transition: opacity 0.3s ease; }
        section { display: none; animation: fadeIn 0.4s ease forwards; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid - 3 Columns on Mobile */
        .lp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        @media (min-width: 768px) { .lp-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; } }
        
        .lp-item { position: relative; aspect-ratio: 1/1; background: #080808; border-radius: 4px; overflow: hidden; cursor: pointer; border: 3px solid transparent; transition: transform 0.2s; }
        .lp-item img { width: 100%; height: 100%; object-fit: cover; }
        .lp-item.selected { border-color: var(--accent) !important; transform: scale(0.92); }
        .lp-item.selected::after { content: '✓'; position: absolute; top: 5px; right: 5px; background: var(--accent); color: #000; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        
        /* Bright Dimming (투명화) */
        .is-dimmed { opacity: 0.4; filter: brightness(1.7) grayscale(0.2); }

        /* Table View */
        .table-wrap { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        tr.selected { background: rgba(187, 134, 252, 0.15); }
        .t-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }

        /* Detail View 50:50 */
        #detail { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .d-flex { display: flex; min-height: 100vh; }
        .d-left { flex: 5; background: #050505; display: flex; align-items: center; justify-content: center; padding: 20px; position: sticky; top: 0; height: 100vh; }
        .d-right { flex: 5; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 800px) { .d-flex { flex-direction: column; } .d-left { height: 50vh; position: relative; } .d-right { padding: 30px 20px; } }

        /* Form Controls */
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 6px; color: #fff; margin-bottom: 12px; font-size: 14px; }
        .price-grid { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        
        /* Loader & Bars */
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #batch-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--accent); color: #000; display: none; align-items: center; justify-content: space-between; padding: 0 25px; font-weight: bold; z-index: 1500; }
    </style>
</head>
<body>

<div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top:4px solid var(--accent); border-radius:50%; animation: spin 0.8s linear infinite;"></div><p id="l-msg" style="margin-top:15px; font-size:13px; color:var(--accent);"></p></div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<div id="loginView" style="display:none; text-align:center; padding-top:40vh;">
    <h2 style="letter-spacing:12px; margin-bottom:30px;">VINYL ARCHIVE</h2>
    <input type="password" id="pw" style="width:220px; text-align:center; letter-spacing:4px;" placeholder="PASSWORD" onkeyup="if(event.keyCode==13)auth()">
</div>

<div id="app" style="display:none;">
    <nav>
        <div style="display:flex; align-items:center;">
            <button id="navBack" class="back-btn" onclick="go('list')">← BACK</button>
            <span id="logoText" style="font-weight:900; letter-spacing:3px; cursor:pointer;" onclick="go('list')">VINYL ARCHIVE</span>
        </div>
        <div style="display:flex; gap:20px; align-items:center;">
            <span onclick="toggleView()" id="vIcon" style="cursor:pointer; font-size:22px;">≡</span>
            <span onclick="go('add')" style="cursor:pointer; font-size:14px; font-weight:bold; color:var(--accent);">ADD</span>
            <span onclick="toggleEdit()" id="editBtn" style="cursor:pointer; font-size:14px; color:var(--dim);">편집</span>
        </div>
    </nav>

    <div class="toolbar" id="toolbar">
        <div class="sort-scroll">
            <button id="s-id" class="btn-s active" onclick="sortData('id')">등록순 ↓</button>
            <button id="s-title" class="btn-s" onclick="sortData('title')">앨범명</button>
            <button id="s-artist" class="btn-s" onclick="sortData('artist')">가수명</button>
            <button id="s-release_date" class="btn-s" onclick="sortData('release_date')">발매일</button>
            <button id="s-purchase_date" class="btn-s" onclick="sortData('purchase_date')">구매일</button>
            <button id="s-price" class="btn-s" onclick="sortData('price')">가격순</button>
            <button id="s-country" class="btn-s" onclick="sortData('country')">나라순</button>
            <button onclick="fC()" class="btn-s" id="f-c">국가: 전체</button>
            <button onclick="fO()" class="btn-s" id="f-o">상태: 전체</button>
        </div>
        <div class="total-box" id="totalCnt">0</div>
    </div>

    <main>
        <section id="list" class="active">
            <div id="grid-view" class="lp-grid"></div>
            <div id="table-view" class="table-wrap" style="display:none;">
                <table>
                    <thead><tr><th>No</th><th>사진</th><th>앨범명</th><th>가수명</th><th>발매일</th><th>구매일</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="add">
            <h3 id="formTitle">REGISTER VINYL</h3>
            <input type="hidden" id="editId">
            <label style="display:flex; align-items:center; gap:10px; margin-bottom:20px; font-size:15px; cursor:pointer;">
                <input type="checkbox" id="isOwned" checked style="width:20px; height:20px;"> 보유 중
            </label>
            <input type="file" id="fileIn" accept="image/*" multiple onchange="batchUpload(this)">
            <input type="text" id="in-title" placeholder="앨범명">
            <input type="text" id="in-artist" placeholder="가수명">
            <select id="in-country"><option value="한국">한국</option><option value="일본">일본</option><option value="미국">미국</option><option value="유럽">유럽</option><option value="기타">기타</option></select>
            <div class="price-grid">
                <select id="l-curr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="in-lprice" placeholder="정가">
                <input type="number" id="l-ex" placeholder="환율" value="1">
            </div>
            <div class="price-grid">
                <select id="p-curr"><option value="₩">₩</option><option value="¥">¥</option><option value="$">$</option></select>
                <input type="number" id="in-pprice" placeholder="구매가">
                <input type="number" id="p-ex" placeholder="환율" value="1">
            </div>
            <div style="display:flex; gap:15px;">
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">발매일</label><input type="date" id="in-rd"></div>
                <div style="flex:1;"><label style="font-size:11px; color:var(--dim);">구매일</label><input type="date" id="in-pd"></div>
            </div>
            <textarea id="in-memo" rows="5" placeholder="메모..."></textarea>
            <div id="singlePreview" style="margin-bottom:20px; text-align:center; display:none;">
                <img id="p-img" style="width:150px; height:150px; object-fit:cover; border-radius:4px;">
            </div>
            <button onclick="save()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:900; cursor:pointer; font-size:16px;">SAVE ARCHIVE</button>
        </section>
    </main>
</div>

<div id="batch-bar">
    <span id="selCnt">0 SELECTED</span>
    <div>
        <button onclick="toggleEdit()" style="background:none; border:1px solid #000; padding:10px 20px; border-radius:6px; margin-right:10px; font-weight:bold;">취소</button>
        <button onclick="batchDel()" style="background:#000; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-weight:bold;">일괄 삭제</button>
    </div>
</div>

<div id="detail">
    <button onclick="closeD()" style="position:fixed; top:20px; left:20px; z-index:3000; background:rgba(0,0,0,0.6); color:#fff; border:none; width:45px; height:45px; border-radius:50%; font-size:22px;">←</button>
    <div class="d-flex">
        <div class="d-left"><img id="d-img" style="max-width:90%; max-height:80%; object-fit:contain; border-radius:4px;"></div>
        <div class="d-right">
            <h1 id="d-title" style="margin:0; font-size:32px; font-weight:900;"></h1>
            <h2 id="d-artist" style="margin:10px 0 40px; font-size:20px; color:var(--dim); font-weight:normal;"></h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:25px; border-top:1px solid #222; padding-top:30px;">
                <p><b>국가:</b> <span id="d-c"></span></p>
                <p><b>상태:</b> <span id="d-s"></span></p>
                <p><b>발매일:</b> <span id="d-rd"></span></p>
                <p><b>구매일:</b> <span id="d-pd"></span></p>
                <p><b>정가:</b> <span id="d-lp"></span></p>
                <p><b>구매가:</b> <span id="d-pp"></span></p>
            </div>
            <div style="margin-top:35px; padding:25px; background:#0e0e0e; border-radius:8px; white-space:pre-wrap;" id="d-memo"></div>
            <div style="display:flex; gap:12px; margin-top:40px;">
                <button onclick="startEdit()" style="flex:1; padding:16px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:8px; font-weight:bold;">수정</button>
                <button id="delBtn" style="flex:1; padding:16px; background:none; color:#ff5555; border:1px solid #ff5555; border-radius:8px; font-weight:bold;">삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GURL = 'https://script.google.com/macros/s/AKfycbw8KPq3y8DLA8Lo5uM55SG-To6U7rLBsSLpeklpIFnbdXsP3-epT-em5AYXK7OXU_LA/exec';
    const PW = '142857';

    let db = [], selIds = [], isE = false;
    let vMode = 'grid', sKey = 'id', isAsc = false;
    let f_c = 'All', f_o = 'All';
    let currentImgB64 = "";

    window.onload = () => { if(localStorage.getItem('v_auth') === 'true') init(); else document.getElementById('loginView').style.display='block'; };
    function auth() { if(document.getElementById('pw').value === PW) { localStorage.setItem('v_auth', 'true'); init(); } else alert('Wrong Password'); }
    async function init() { document.getElementById('loginView').style.display='none'; document.getElementById('app').style.display='block'; await load(); }

    async function load() {
        loadStatus(true, 'LOADING DATA...');
        try { const r = await fetch(GURL); db = await r.json(); sortData('id'); } catch(e) { console.error(e); }
        loadStatus(false);
    }

    function go(page) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(page).classList.add('active');
        document.getElementById('navBack').style.display = (page === 'list' ? 'none' : 'block');
        document.getElementById('logoText').style.display = (page === 'list' ? 'block' : 'none');
        document.getElementById('toolbar').style.display = (page === 'list' ? 'flex' : 'none');
        if(page === 'list') render(); else if(page === 'add') resetF();
    }

    // 사진 압축 및 1:1 크롭
    function compress(file) {
        return new Promise(res => {
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const size = Math.min(img.width, img.height);
                    cvs.width = 600; cvs.height = 600;
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 600, 600);
                    res(cvs.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(file);
        });
    }

    // 일괄 업로드 - 사진부터 순차적으로 자동 업로드
    async function batchUpload(input) {
        if(!input.files.length) return;
        loadStatus(true, `UPLOADING ${input.files.length} IMAGES...`);
        for(let i=0; i < input.files.length; i++) {
            const b64 = await compress(input.files[i]);
            const payload = {
                action: 'add', id: Date.now() + i, owned: true,
                title: 'New Archive', artist: '', country: '한국',
                l_curr: '₩', l_ex: 1, p_curr: '₩', p_ex: 1,
                list_price: 0, purchase_price: 0,
                release_date: '', purchase_date: new Date().toISOString().split('T')[0],
                memo: '', image: b64
            };
            await fetch(GURL, { method: 'POST', body: JSON.stringify(payload) });
        }
        location.reload();
    }

    function sortData(key) {
        if(sKey === key) isAsc = !isAsc; else { sKey = key; isAsc = (key === 'id' ? false : true); }
        const jaCol = new Intl.Collator('ja', { sensitivity: 'base' });
        
        db.sort((a, b) => {
            let vA = a[key], vB = b[key];
            if(key === 'price') {
                vA = Number(a.list_price||0) * Number(a.l_ex||1);
                vB = Number(b.list_price||0) * Number(b.l_ex||1);
            } else if(key === 'country') {
                const p = {"한국":1, "일본":2, "미국":3, "유럽":4, "기타":5};
                vA = p[vA]||9; vB = p[vB]||9;
            } else if(['title', 'artist'].includes(key)) {
                const getP = (s) => {
                    const c = String(s||"").charAt(0);
                    if(/[ㄱ-ㅎ가-힣]/.test(c)) return 1;
                    if(/[\u3040-\u30ff\uff66-\uff9f\u4e00-\u9faf]/.test(c)) return 2;
                    if(/[a-zA-Z]/.test(c)) return 3;
                    return 4;
                };
                const pA = getP(vA), pB = getP(vB);
                if(pA !== pB) return isAsc ? pA - pB : pB - pA;
                return isAsc ? jaCol.compare(vA, vB) : jaCol.compare(vB, vA);
            }
            if(vA < vB) return isAsc ? -1 : 1; if(vA > vB) return isAsc ? 1 : -1; return 0;
        });
        document.querySelectorAll('.btn-s').forEach(b => {
            b.classList.remove('active');
            if(b.id === 's-'+key) { b.classList.add('active'); b.innerText = b.innerText.split(' ')[0] + (isAsc ? ' ↑' : ' ↓'); }
        });
        render();
    }

    function render() {
        const today = new Date().toISOString().split('T')[0];
        let filtered = db.filter(i => (f_c === 'All' || i.country === f_c));
        if(f_o !== 'All') filtered = filtered.filter(i => String(i.owned) === (f_o === '보유' ? 'true' : 'false'));
        document.getElementById('totalCnt').innerText = filtered.length;

        if(vMode === 'grid') {
            document.getElementById('grid-view').innerHTML = filtered.map(i => {
                const isFut = i.release_date && i.release_date > today;
                const dim = (!i.owned || isFut) ? 'is-dimmed' : '';
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<div class="lp-item ${dim} ${sel}" onclick="clickItem('${i.id}')"><img src="${i.image}"></div>`;
            }).join('');
        } else {
            document.getElementById('table-body').innerHTML = filtered.map((i, idx) => {
                const sel = selIds.includes(String(i.id)) ? 'selected' : '';
                return `<tr class="${sel}" onclick="clickItem('${i.id}')">
                    <td style="color:var(--accent); font-weight:bold;">${idx+1}</td>
                    <td><img src="${i.image}" class="t-img"></td><td>${i.title||'-'}</td><td>${i.artist||'-'}</td>
                    <td>${(i.release_date||"").slice(0,10)}</td><td>${(i.purchase_date||"").slice(0,10)}</td>
                </tr>`;
            }).join('');
        }
    }

    function clickItem(id) {
        const sid = String(id);
        if(isE) {
            if(selIds.includes(sid)) selIds = selIds.filter(x => x !== sid);
            else selIds.push(sid);
            document.getElementById('selCnt').innerText = `${selIds.length} SELECTED`;
            render();
        } else openD(id);
    }

    function openD(id) {
        const i = db.find(x => String(x.id) === String(id)); if(!i) return;
        document.getElementById('d-img').src = i.image;
        document.getElementById('d-title').innerText = i.title || "Untitled";
        document.getElementById('d-artist').innerText = i.artist || "Unknown";
        document.getElementById('d-c').innerText = i.country || "기타";
        document.getElementById('d-s').innerText = String(i.owned) === 'true' ? "보유 중" : "미보유";
        document.getElementById('d-rd').innerText = (i.release_date||"").slice(0,10);
        document.getElementById('d-pd').innerText = (i.purchase_date||"").slice(0,10);
        document.getElementById('d-memo').innerText = i.memo || "";
        
        const fmt = (v, c, e) => {
            if(!v || v == 0) return "₩ 0";
            const num = Number(v).toLocaleString();
            if(c === '₩') return `₩ ${num}`;
            return `${c}${num} (약 ₩ ${Math.round(v * (e||1)).toLocaleString()})`;
        };
        document.getElementById('d-lp').innerText = fmt(i.list_price, i.l_curr, i.l_ex);
        document.getElementById('d-pp').innerText = fmt(i.purchase_price, i.p_curr, i.p_ex);
        document.getElementById('detail').style.display = 'block';
        document.getElementById('delBtn').onclick = () => del(id);
        window.activeId = id;
    }

    async function save() {
        const eid = document.getElementById('editId').value;
        const img = eid ? db.find(x => String(x.id) === String(eid)).image : currentImgB64;
        
        loadStatus(true, 'SAVING...');
        const payload = {
            action: eid ? 'edit' : 'add', id: eid || Date.now(), owned: document.getElementById('isOwned').checked,
            title: document.getElementById('in-title').value, artist: document.getElementById('in-artist').value,
            country: document.getElementById('in-country').value, l_curr: document.getElementById('l_curr').value, l_ex: document.getElementById('l_ex').value || 1,
            p_curr: document.getElementById('p_curr').value, p_ex: document.getElementById('p_ex').value || 1,
            list_price: document.getElementById('in-lprice').value, purchase_price: document.getElementById('in-pprice').value,
            release_date: document.getElementById('in-rd').value, purchase_date: document.getElementById('in-pd').value,
            memo: document.getElementById('in-memo').value, image: img
        };
        await fetch(GURL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    function resetF() {
        document.getElementById('editId').value = ""; document.getElementById('in-title').value = "";
        document.getElementById('in-artist').value = ""; document.getElementById('in-lprice').value = "";
        document.getElementById('in-pprice').value = ""; document.getElementById('in-rd').value = "";
        document.getElementById('in-pd').value = ""; document.getElementById('in-memo').value = "";
        document.getElementById('singlePreview').style.display = 'none'; currentImgB64 = "";
    }
    function toggleView() { vMode = (vMode==='grid'?'table':'grid'); document.getElementById('vIcon').innerText = (vMode==='grid'?'≡':'▦'); render(); }
    function toggleEdit() { isE = !isE; selIds = []; document.getElementById('editBtn').innerText = (isE?"취소":"편집"); document.getElementById('batch-bar').style.display = (isE?"flex":"none"); render(); }
    async function batchDel() { if(!selIds.length || !confirm('삭제할까요?')) return; loadStatus(true, 'DELETING...'); await fetch(GURL, { method:'POST', body:JSON.stringify({action:'delete', id:selIds}) }); location.reload(); }
    async function del(id) { if(!confirm('삭제할까요?')) return; loadStatus(true, 'DELETING...'); await fetch(GURL, { method:'POST', body:JSON.stringify({action:'delete', id:String(id)}) }); location.reload(); }
    function startEdit() {
        const i = db.find(x => String(x.id) === String(window.activeId));
        closeD(); go('add');
        document.getElementById('editId').value = i.id; document.getElementById('isOwned').checked = i.owned;
        document.getElementById('in-title').value = i.title; document.getElementById('in-artist').value = i.artist;
        document.getElementById('in-country').value = i.country; document.getElementById('l-curr').value = i.l_curr;
        document.getElementById('l-ex').value = i.l_ex; document.getElementById('in-lprice').value = i.list_price;
        document.getElementById('p-curr').value = i.p_curr; document.getElementById('p-ex').value = i.p_ex;
        document.getElementById('in-pprice').value = i.purchase_price; document.getElementById('in-rd').value = (i.release_date||"").slice(0,10);
        document.getElementById('in-pd').value = (i.purchase_date||"").slice(0,10); document.getElementById('in-memo').value = i.memo;
    }
    function closeD() { document.getElementById('detail').style.display = 'none'; }
    function loadStatus(s, t) { document.getElementById('l-msg').innerText = t || ""; document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function fC() { const c = ['All', '한국', '일본', '미국', '유럽', '기타']; f_c = c[(c.indexOf(f_c) + 1) % c.length]; document.getElementById('f-c').innerText = `국가: ${f_c==='All'?'전체':f_c}`; render(); }
    function fO() { const o = ['All', '보유', '미보유']; f_o = o[(o.indexOf(f_o) + 1) % o.length]; document.getElementById('f-o').innerText = `상태: ${f_o==='All'?'전체':f_o}`; render(); }
</script>
